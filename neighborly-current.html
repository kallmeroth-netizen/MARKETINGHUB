<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Current Products — Neighborly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f6f3; --card:#ffffff; --ink:#1f2328; --muted:#6b7178;
    --line:rgba(31,35,40,.08); --line-soft:rgba(31,35,40,.06);
    --accent:#6280bd; --green:#7bbd91; --green-ink:#3f7a52; --green-bg:#e9f4ee;
    --radius:14px; --shadow:0 1px 2px rgba(31,35,40,.04),0 8px 24px rgba(31,35,40,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  /* ---- hub top bar (matches other Marketing Hub pages) ---- */
  .hub-top{display:flex;align-items:center;gap:14px;padding:14px 22px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .hub-top img.logo{height:26px;width:auto;display:block}
  .hub-top .hub-name{font-weight:700;font-size:15px;letter-spacing:.2px}
  .hub-top a.home{margin-left:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500}
  .hub-top a.home:hover{color:var(--ink)}
  .hub-nav{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  .hub-nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 11px;border-radius:9px}
  .hub-nav a:hover{background:#f1efe9;color:var(--ink)}
  .hub-nav a.active{background:var(--accent);color:#fff}
  /* ---- page ---- */
  .wrap{max-width:1200px;margin:0 auto;padding:30px 22px 70px}
  h1{font-size:27px;font-weight:700;margin:0 0 4px;letter-spacing:-.3px}
  .sub{color:var(--muted);margin:0 0 24px;font-size:14px}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input[type=search]{flex:1;min-width:240px;padding:11px 14px;border:1px solid var(--line);border-radius:11px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  .toolbar input[type=search]:focus{outline:none;border-color:var(--accent)}
  .stat{font-size:13px;color:var(--muted);margin-left:auto;white-space:nowrap}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
  .chip{padding:6px 13px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted)}
  .chip:hover{color:var(--ink)}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .cat-group{margin-bottom:30px}
  .cat-head{display:flex;align-items:baseline;gap:10px;margin:0 0 12px}
  .cat-head h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin:0;color:#56524b}
  .cat-head .n{color:var(--muted);font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px}
  .card .name{font-weight:600;font-size:15px;line-height:1.3}
  .card .meta{font-size:12px;color:var(--muted)}
  .pill{align-self:flex-start;margin-top:8px;font-size:11px;font-weight:600;color:var(--green-ink);background:var(--green-bg);border:1px solid #cfe9da;padding:3px 9px;border-radius:999px}
  .empty,.loading{color:var(--muted);padding:48px;text-align:center;font-size:14px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:34px}
</style>
</head>
<body>
<div class="hub-top">
  <img class="logo" src="https://beneighborly.team/NeighborlyLogo.png" alt="Neighborly">
  <span class="hub-name">Marketing Hub</span>
  <a class="home" href="index.html">← Home</a>
  <nav class="hub-nav">
    <a href="neighborly-marketplace.html">NPI Pipeline</a>
    <a href="neighborly-current.html" class="active">Current Products</a>
    <a href="neighborly-calendar.html">Calendar</a>
    <a href="neighborly-dashboard.html">Performance</a>
    <a href="neighborly-assets.html">Brand Assets</a>
  </nav>
</div>

<div class="wrap">
  <h1>Current Products</h1>
  <p class="sub">Live on shelf across all stores · pulls in real time from the marketplace database.</p>

  <div class="toolbar">
    <input id="q" type="search" placeholder="Search brand or category…" autocomplete="off">
    <span id="count" class="stat"></span>
  </div>
  <div id="chips" class="chips"></div>

  <div id="content"><div class="loading">Loading current products…</div></div>
</div>

<footer>Neighborly Marketing Hub · Current Products — on-shelf items (stage = Live)</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // Same Neighborly hub project (public client config — identical to the other pages).
  const firebaseConfig = {
    apiKey: "AIzaSyAiHIQuw3eiyY305sDqc_CoV_MoEG9CQpw",
    authDomain: "neighborly-hub-53e4b.firebaseapp.com",
    databaseURL: "https://neighborly-hub-53e4b-default-rtdb.firebaseio.com",
    projectId: "neighborly-hub-53e4b",
    storageBucket: "neighborly-hub-53e4b.firebasestorage.app",
    messagingSenderId: "847761939455",
    appId: "1:847761939455:web:d0d5dbe1795bb4f05f25ca"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let ALL = [], activeCat = 'All';
  const elContent=document.getElementById('content'), elChips=document.getElementById('chips'),
        elCount=document.getElementById('count'), elQ=document.getElementById('q');

  db.ref('marketplace-npi/launches').on('value', snap => {
    const v = snap.val() || {};
    ALL = Object.values(v)
      .filter(l => l && l.stage === 'live')
      .map(l => ({ name:l.name||'(unnamed)', category:l.category||'Uncategorized', code:l.code||'' }))
      .sort((a,b)=>a.name.localeCompare(b.name));
    buildChips(); render();
  }, err => { elContent.innerHTML='<div class="empty">Could not load products: '+(err&&err.message||err)+'</div>'; });

  function buildChips(){
    const cats=['All',...Array.from(new Set(ALL.map(p=>p.category))).sort()];
    elChips.innerHTML=cats.map(c=>`<span class="chip ${c===activeCat?'active':''}" data-cat="${c.replace(/"/g,'&quot;')}">${c}</span>`).join('');
    elChips.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{activeCat=ch.dataset.cat;buildChips();render();});
  }
  function render(){
    const q=(elQ.value||'').trim().toLowerCase();
    const items=ALL.filter(p=>(activeCat==='All'||p.category===activeCat)&&(!q||p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)));
    elCount.textContent=items.length+(items.length===1?' product':' products')+' on shelf';
    if(!items.length){elContent.innerHTML='<div class="empty">No products match.</div>';return;}
    const byCat={}; items.forEach(p=>{(byCat[p.category]=byCat[p.category]||[]).push(p);});
    elContent.innerHTML=Object.keys(byCat).sort().map(cat=>`
      <section class="cat-group">
        <div class="cat-head"><h2>${esc(cat)}</h2><span class="n">${byCat[cat].length}</span></div>
        <div class="grid">${byCat[cat].map(p=>`
          <div class="card"><div class="name">${esc(p.name)}</div>
          <div class="meta">${esc(p.category)}${p.code?' · '+esc(p.code):''}</div>
          <span class="pill">On shelf</span></div>`).join('')}</div>
      </section>`).join('');
  }
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  elQ.addEventListener('input',render);
</script>
</body>
</html>
