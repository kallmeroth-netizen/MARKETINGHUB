<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid meet">
  <!-- Approximation of the tertiary lockup poster — placeholder until the original PNG is uploaded -->
  <rect width="800" height="1000" fill="#e87142"/>
  <defs>
    <path id="np-curve-1" d="M 100 460 Q 400 380, 700 460"/>
    <path id="np-curve-2" d="M 100 600 Q 400 520, 700 600"/>
    <path id="np-curve-3" d="M 100 740 Q 400 660, 700 740"/>
  </defs>
  <g fill="#fff8f1" font-family="'Futura PT Demi', 'Jost', 'Futura', sans-serif" font-weight="700" font-size="64" letter-spacing="2">
    <text><textPath href="#np-curve-1" startOffset="50%" text-anchor="middle">EAT NEIGHBORLY.</textPath></text>
    <text><textPath href="#np-curve-2" startOffset="50%" text-anchor="middle">SHOP NEIGHBORLY.</textPath></text>
    <text><textPath href="#np-curve-3" startOffset="50%" text-anchor="middle">BE NEIGHBORLY.</textPath></text>
  </g>
  <text x="400" y="900" fill="#fff8f1" font-family="'Futura PT Demi', 'Jost', sans-serif" font-weight="700" font-size="40" letter-spacing="4" text-anchor="middle">NEIGHBORLY</text>
</svg>
