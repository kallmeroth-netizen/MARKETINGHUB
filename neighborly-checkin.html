<style>
  :root{
    --bg:#f7f6f3; --card:#ffffff; --ink:#1f2328; --muted:#6b7178; --faint:#9a9891;
    --line:rgba(31,35,40,.09); --line-soft:rgba(31,35,40,.055);
    --accent:#6280bd; --accent-ink:#2d4480;
    --ok:#2d7a4f; --ok-bg:#e9f4ee; --ok-br:#bfe3cd;
    --violet:#7c4dff;
    --radius:15px; --shadow:0 1px 2px rgba(31,35,40,.04),0 10px 30px rgba(31,35,40,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  .mono{font-family:"DM Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  button{font-family:inherit}
  a{color:inherit}

  /* ── top nav ── */
  .hub-top{display:flex;align-items:center;gap:14px;padding:13px 22px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .hub-top img.logo{height:24px;width:auto;display:block}
  .hub-top .hub-name{font-weight:700;font-size:15px;letter-spacing:.2px}
  .hub-top a.home{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500}
  .hub-top a.home:hover{color:var(--ink)}
  .hub-nav{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
  .hub-nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 11px;border-radius:9px}
  .hub-nav a:hover{background:#f1efe9;color:var(--ink)}
  .hub-nav a.active{background:var(--ink);color:#fff}

  .wrap{max-width:960px;margin:0 auto;padding:26px 22px 90px}

  /* ── board header ── */
  .board-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .title-wrap{flex:1;min-width:220px}
  .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#c9c7c1;box-shadow:0 0 0 0 rgba(45,122,79,.5)}
  .live-dot.on{background:var(--ok);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(45,122,79,.45)}70%{box-shadow:0 0 0 7px rgba(45,122,79,0)}100%{box-shadow:0 0 0 0 rgba(45,122,79,0)}}
  #title{width:100%;border:none;background:transparent;font-family:inherit;font-size:30px;font-weight:700;letter-spacing:-.4px;color:var(--ink);padding:2px 4px;margin:-2px -4px;border-radius:8px}
  #title:hover{background:#fff}
  #title:focus{outline:none;background:#fff;box-shadow:0 0 0 2px var(--accent)}
  .board-sub{font-size:13.5px;color:var(--muted);margin-top:3px;padding-left:4px}

  .head-actions{display:flex;gap:8px;align-items:center}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-weight:600;padding:9px 14px;border-radius:11px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:border-color .15s,background .15s}
  .btn:hover{border-color:rgba(31,35,40,.2)}
  .btn svg{width:15px;height:15px}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#000}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted);padding:9px 10px}
  .btn.ghost:hover{color:var(--ink);background:#f1efe9}

  /* ── toolbar / progress ── */
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .seg{display:inline-flex;background:#eceae4;border-radius:11px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;font-size:13px;font-weight:600;color:var(--muted);padding:7px 14px;border-radius:9px;cursor:pointer}
  .seg button.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .seg button .n{opacity:.55;margin-left:5px;font-weight:600}
  .count{margin-left:auto;font-size:13px;color:var(--muted);white-space:nowrap}
  .count b{color:var(--ink);font-weight:700}
  .bar{height:6px;border-radius:999px;background:#eceae4;overflow:hidden;margin-bottom:22px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#3f9b6a);border-radius:999px;width:0;transition:width .4s cubic-bezier(.4,0,.2,1)}

  /* ── grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .card{position:relative;background:var(--card);border:1.5px solid var(--line-soft);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left;width:100%;transition:border-color .18s,box-shadow .18s,transform .1s;box-shadow:0 1px 2px rgba(31,35,40,.03)}
  .card:hover{border-color:rgba(31,35,40,.16);box-shadow:var(--shadow);transform:translateY(-1px)}
  .card.in{background:var(--ok-bg);border-color:var(--ok-br)}
  .ph{width:60px;height:60px;border-radius:50%;flex-shrink:0;object-fit:cover;background:#eceae4;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--faint);overflow:hidden}
  .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
  .nm{display:block;max-width:100%;min-width:0;font-size:16px;font-weight:600;letter-spacing:-.01em;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hd{display:block;max-width:100%;min-width:0;font-size:13px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card.in .hd{color:#5a8a6e}

  /* check toggle */
  .tog{flex-shrink:0;width:52px;height:30px;border-radius:999px;border:none;background:#e2e0d9;cursor:pointer;position:relative;transition:background .2s;padding:0}
  .tog::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}
  .tog.on{background:var(--ok)}
  .tog.on::after{transform:translateX(22px)}
  .tog:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* empty */
  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty svg{width:40px;height:40px;color:#cfcdc6;margin-bottom:12px}
  .empty h3{margin:0 0 4px;font-size:16px;color:var(--ink);font-weight:600}
  .empty p{margin:0 0 16px;font-size:13.5px}

  /* ── drawer / editor ── */
  .scrim{position:fixed;inset:0;background:rgba(31,35,40,.34);opacity:0;pointer-events:none;transition:opacity .22s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:#fff;box-shadow:-14px 0 40px rgba(31,35,40,.16);z-index:50;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .dr-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
  .dr-head .t{font-size:15px;font-weight:600}
  .dr-nav{display:flex;gap:2px}
  .dr-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px}
  .photo-edit{display:flex;flex-direction:column;align-items:center;gap:12px}
  .photo-preview{width:120px;height:120px;border-radius:50%;background:#f1efe9;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:34px;font-weight:700;color:var(--faint);border:1px solid var(--line)}
  .photo-preview img{width:100%;height:100%;object-fit:cover}
  .photo-controls{display:flex;gap:8px}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;font-weight:500}
  .field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:64px}
  .url-row{display:flex;gap:8px}
  .url-row input{flex:1}
  .checkin-row{display:flex;align-items:center;justify-content:space-between;background:#f7f6f3;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .checkin-row .lab{font-size:14px;font-weight:600}
  .checkin-row .st{font-size:12px;color:var(--muted);margin-top:1px}
  .dr-foot{display:flex;gap:8px;align-items:center;padding:16px 20px;border-top:1px solid var(--line)}
  .dr-foot .btn.primary{flex:1;justify-content:center}
  .link-danger{background:none;border:none;color:#b3402f;font-size:13px;font-weight:600;cursor:pointer;padding:9px 10px;border-radius:9px}
  .link-danger:hover{background:#fbeceA}
  .hidden-file{display:none}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:560px){
    .wrap{padding:18px 14px 90px}
    #title{font-size:24px}
    .count{margin-left:0}
    .grid{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="hub-top">
  <img class="logo" src="https://beneighborly.team/NeighborlyLogo.png" alt="Neighborly">
  <span class="hub-name">Marketing Hub</span>
  <a class="home" href="index.html">← Home</a>
  <nav class="hub-nav">
    <a href="neighborly-calendar.html">Calendar</a>
    <a href="neighborly-guests.html">Guests</a>
    <a href="neighborly-checkin.html" class="active">Check-In</a>
  </nav>
</div>

<div class="wrap">
  <div class="board-head">
    <div class="title-wrap">
      <div class="eyebrow"><span class="live-dot" id="liveDot"></span><span id="liveLabel">Connecting…</span></div>
      <input id="title" value="Influencer Check-In" aria-label="Board title" spellcheck="false" autocomplete="off">
      <div class="board-sub" id="boardSub">Live board · shared in real time</div>
    </div>
    <div class="head-actions">
      <button class="btn" id="copyLink" title="Copy a link to this live board">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>
        Share
      </button>
      <button class="btn primary" id="addBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Add
      </button>
    </div>
  </div>

  <div class="toolbar">
    <div class="seg" id="seg">
      <button data-f="all" class="active">All <span class="n" id="nAll">0</span></button>
      <button data-f="in">Checked in <span class="n" id="nIn">0</span></button>
      <button data-f="out">Expected <span class="n" id="nOut">0</span></button>
    </div>
    <div class="count"><b id="cIn">0</b> of <b id="cTot">0</b> checked in</div>

  <div class="bar"><i id="barFill"></i></div>

  <div class="grid" id="grid"></div>

  <div class="empty" id="empty" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <h3>No one added yet</h3>
    <p>Add the first guest to start checking people in.</p>
    <button class="btn primary" id="addBtn2" style="display:inline-flex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add guest</button>
  </div>
</div>

<!-- editor drawer -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="dr-head">
    <span class="t" id="drTitle">Add guest</span>
    <div class="dr-nav">
      <button class="btn ghost" id="prevBtn" title="Previous" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="btn ghost" id="nextBtn" title="Next" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      <button class="btn ghost" id="closeBtn" title="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>

      <div class="photo-preview" id="photoPreview"><span id="photoInitials">?</span></div>

        <button class="btn" id="uploadBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>Upload</button>
        <button class="btn" id="clearPhoto" style="display:none">Remove</button>
      </div>

      <div><div class="lab">Checked in</div><div class="st" id="checkState">Not yet</div></div>

    <button class="btn primary" id="saveBtn">Save</button>
  </div>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';
  var db = window.__db || null;
  // Store under the already-open marketing-calendar branch so it persists live
  // with no database-rules change. The calendar writes with update(), so it
  // never touches this sub-path.
  var ref = db ? db.ref('marketing-calendar/checkin') : null;

  var state = { title: 'Influencer Check-In', guests: {} };
  var filter = 'all';
  var editId = null;          // id being edited, or null for a new guest
  var draftPhoto = '';        // photo data-url/URL held in the open editor

  // ── elements ──
  var $ = function (id) { return document.getElementById(id); };
  var grid = $('grid'), empty = $('empty');
  var titleEl = $('title'), liveDot = $('liveDot'), liveLabel = $('liveLabel');
  var drawer = $('drawer'), scrim = $('scrim');
  var photoPreview = $('photoPreview'), photoInitials = $('photoInitials');
  var fName = $('fName'), fHandle = $('fHandle'), fNote = $('fNote'), photoUrl = $('photoUrl');
  var drTog = $('drTog'), checkState = $('checkState');

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
  }); }
  function initials(name) {
    var p = String(name || '').trim().replace(/^@/, '').split(/[\s._-]+/).filter(Boolean);
    if (!p.length) return '?';
    return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
  }
  function toast(msg) {
    var t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(function () { t.classList.remove('show'); }, 1900);
  }
  function guestList() {
    return Object.keys(state.guests || {}).map(function (id) {
      var g = state.guests[id] || {}; return {
        id: id, name: g.name || '', handle: g.handle || '', photo: g.photo || '',
        note: g.note || '', checkedIn: !!g.checkedIn, ts: g.ts || 0
      };
    }).sort(function (a, b) { return (a.ts - b.ts) || (a.name < b.name ? -1 : 1); });
  }

  // ── render ──
  function render() {
    var all = guestList();
    var inCount = all.filter(function (g) { return g.checkedIn; }).length;
    var tot = all.length;
    $('nAll').textContent = tot; $('nIn').textContent = inCount; $('nOut').textContent = tot - inCount;
    $('cIn').textContent = inCount; $('cTot').textContent = tot;
    $('barFill').style.width = (tot ? Math.round(inCount / tot * 100) : 0) + '%';

    var list = all.filter(function (g) {
      return filter === 'all' || (filter === 'in' ? g.checkedIn : !g.checkedIn);
    });

    empty.style.display = tot === 0 ? '' : 'none';
    grid.style.display = tot === 0 ? 'none' : '';
    grid.innerHTML = list.map(function (g) {
      var ph = g.photo ? '<img src="' + esc(g.photo) + '" alt="">' : '<span>' + esc(initials(g.name)) + '</span>';
      return '<button class="card ' + (g.checkedIn ? 'in' : '') + '" data-id="' + esc(g.id) + '">' +
        '<span class="ph">' + ph + '</span>' +
        '<span class="meta"><span class="nm">' + esc(g.name || 'Unnamed') + '</span>' +
        (g.handle ? '<span class="hd">' + esc(g.handle) + '</span>' : '') + '</span>' +
        '<span class="tog ' + (g.checkedIn ? 'on' : '') + '" role="switch" aria-checked="' + g.checkedIn + '" data-tog="' + esc(g.id) + '" aria-label="Toggle checked in"></span>' +
        '</button>';
    }).join('');

    // keep title in sync unless the user is actively editing it
    if (document.activeElement !== titleEl) titleEl.value = state.title || 'Influencer Check-In';
  }

  // ── data writes ──
  function setCheckedIn(id, val) {
    if (!ref) return;
    ref.child('guests/' + id).update({ checkedIn: val, checkedAt: val ? Date.now() : null });
  }
  function saveTitle() {
    var t = titleEl.value.trim() || 'Influencer Check-In';
    if (ref) ref.child('title').set(t);
  }

  // ── editor drawer ──
  function openEditor(id) {
    editId = id || null;
    var g = id ? (state.guests[id] || {}) : {};
    draftPhoto = g.photo || '';
    fName.value = g.name || ''; fHandle.value = g.handle || ''; fNote.value = g.note || '';
    photoUrl.value = '';
    setChecked(!!g.checkedIn);
    paintPhoto();
    $('drTitle').textContent = id ? 'Edit guest' : 'Add guest';
    $('deleteBtn').style.display = id ? '' : 'none';
    var multi = id && guestList().length > 1;
    $('prevBtn').style.display = multi ? '' : 'none';
    $('nextBtn').style.display = multi ? '' : 'none';
    drawer.classList.add('show'); scrim.classList.add('show'); drawer.setAttribute('aria-hidden', 'false');
    setTimeout(function () { fName.focus(); }, 120);
  }
  function closeEditor() {
    drawer.classList.remove('show'); scrim.classList.remove('show'); drawer.setAttribute('aria-hidden', 'true');
    editId = null; draftPhoto = '';
  }
  function setChecked(on) {
    drTog.classList.toggle('on', on); drTog.setAttribute('aria-checked', on);
    checkState.textContent = on ? 'Here now' : 'Not yet';
  }
  function paintPhoto() {
    if (draftPhoto) { photoPreview.innerHTML = '<img src="' + esc(draftPhoto) + '" alt="">'; $('clearPhoto').style.display = ''; }
    else { photoPreview.innerHTML = '<span id="photoInitials">' + esc(initials(fName.value) ) + '</span>'; $('clearPhoto').style.display = 'none'; }
  }
  function saveEditor(thenNav) {
    var name = fName.value.trim();
    if (!name) { fName.focus(); toast('Add a name'); return false; }
    if (!ref) { toast('Offline — not saved'); return false; }
    var id = editId || ref.child('guests').push().key;
    var existing = state.guests[id] || {};
    ref.child('guests/' + id).update({
      name: name,
      handle: fHandle.value.trim(),
      note: fNote.value.trim(),
      photo: draftPhoto || '',
      checkedIn: drTog.classList.contains('on'),
      checkedAt: (drTog.classList.contains('on')) ? (existing.checkedAt || Date.now()) : null,
      ts: existing.ts || Date.now()
    });
    editId = id;
    if (!thenNav) { toast('Saved'); closeEditor(); }
    return id;
  }
  function navSibling(dir) {
    var id = saveEditor(true); if (!id) return;
    var list = guestList(); var i = list.findIndex(function (g) { return g.id === id; });
    var next = list[i + dir]; if (next) openEditor(next.id);
  }

  // ── photo intake: upload (resized) or URL ──
  function handleFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        var max = 480, w = img.width, h = img.height, s = Math.min(1, max / Math.max(w, h));
        w = Math.round(w * s); h = Math.round(h * s);
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        try { draftPhoto = c.toDataURL('image/jpeg', 0.82); } catch (e) { draftPhoto = reader.result; }
        paintPhoto();
      };
      img.onerror = function () { toast("Couldn't read that image"); };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  // ── wire up ──
  $('addBtn').addEventListener('click', function () { openEditor(null); });
  $('addBtn2').addEventListener('click', function () { openEditor(null); });
  $('closeBtn').addEventListener('click', closeEditor);
  scrim.addEventListener('click', closeEditor);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && drawer.classList.contains('show')) closeEditor(); });
  $('saveBtn').addEventListener('click', function () { saveEditor(false); });
  $('deleteBtn').addEventListener('click', function () {
    if (editId && confirm('Remove this guest?')) { if (ref) ref.child('guests/' + editId).remove(); closeEditor(); toast('Removed'); }
  });
  $('prevBtn').addEventListener('click', function () { navSibling(-1); });
  $('nextBtn').addEventListener('click', function () { navSibling(1); });
  drTog.addEventListener('click', function () { setChecked(!drTog.classList.contains('on')); });
  fName.addEventListener('input', function () { if (!draftPhoto) paintPhoto(); });
  $('uploadBtn').addEventListener('click', function () { $('fileInput').click(); });
  $('fileInput').addEventListener('change', function (e) { handleFile(e.target.files[0]); e.target.value = ''; });
  $('clearPhoto').addEventListener('click', function () { draftPhoto = ''; photoUrl.value = ''; paintPhoto(); });
  photoUrl.addEventListener('input', function () { draftPhoto = photoUrl.value.trim(); paintPhoto(); });

  // grid interactions (delegated): toggle vs open
  grid.addEventListener('click', function (e) {
    var tog = e.target.closest('[data-tog]');
    if (tog) { e.stopPropagation(); var id = tog.getAttribute('data-tog'); setCheckedIn(id, !state.guests[id] || !state.guests[id].checkedIn); return; }
    var card = e.target.closest('[data-id]');
    if (card) openEditor(card.getAttribute('data-id'));
  });

  // filter segmented
  $('seg').addEventListener('click', function (e) {
    var b = e.target.closest('button[data-f]'); if (!b) return;
    filter = b.getAttribute('data-f');
    [].forEach.call(this.querySelectorAll('button'), function (x) { x.classList.toggle('active', x === b); });
    render();
  });

  // editable board title
  titleEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
  titleEl.addEventListener('blur', saveTitle);

  // share link
  $('copyLink').addEventListener('click', function () {
    var url = 'https://beneighborly.team/neighborly-checkin.html';
    (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject()).then(function () { toast('Live link copied'); }, function () { toast(url); });
  });

  // ── live sync ──
  if (ref) {
    ref.on('value', function (snap) {
      var v = snap.val() || {};
      state = { title: v.title || 'Influencer Check-In', guests: v.guests || {} };
      render();
    }, function (err) { console.error('[checkin] read failed', err); liveLabel.textContent = 'Offline'; });

    db.ref('.info/connected').on('value', function (s) {
      var on = !!s.val();
      liveDot.classList.toggle('on', on);
      liveLabel.textContent = on ? 'Live' : 'Reconnecting…';
    });
  } else {
    liveLabel.textContent = 'Offline';
    render();
  }
})();
</script>
</body>
</html>
