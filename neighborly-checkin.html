<style>
  /* ── calendar design tokens ── */
  :root{
    --bg:#F7F6F3; --surface:#fff; --surface2:#F0EEE9;
    --line:rgba(0,0,0,.08); --line-strong:rgba(0,0,0,.14);
    --ink:#1A1916; --ink2:#6B6960; --ink3:#9E9C96; --dark:#1f2328;
    --orange:#e87142; --orange-l:#fdeee7;
    --green:#7bbd91; --green-l:#e4f5ea; --green-d:#2a5c38; --green-mid:#2f9e6b;
    --violet:#7c4dff; --violet-l:#efeaff; --violet-d:#43277a;
    --radius:14px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04); --shadow:0 1px 4px rgba(0,0,0,.05),0 10px 30px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  .mono{font-family:"DM Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .eyebrow-f{font-family:"Jost","futura-pt",sans-serif}
  button{font-family:inherit}

  /* ── top nav (calendar np-nav feel) ── */
  .nav{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav .logo{height:22px;width:auto;display:block}
  .nav .back{display:inline-flex;align-items:center;gap:6px;color:var(--ink2);text-decoration:none;font-size:13px;font-weight:500;padding:6px 10px;border-radius:9px;margin-left:2px}
  .nav .back:hover{background:var(--surface2);color:var(--ink)}
  .nav .back svg{width:14px;height:14px}
  .nav .tag{margin-left:auto;font-family:"Jost",sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3)}

  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 100px}

  /* ── board header ── */
  .head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .head .titlecol{flex:1;min-width:220px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:"Jost",sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px}
  .badge{width:20px;height:20px;border-radius:6px;background:var(--violet-l);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .badge svg{width:12px;height:12px}
  .live-dot{width:7px;height:7px;border-radius:50%;background:#c9c7c1}
  .live-dot.on{background:var(--green-mid);box-shadow:0 0 0 0 rgba(47,158,107,.4);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,158,107,.4)}70%{box-shadow:0 0 0 7px rgba(47,158,107,0)}100%{box-shadow:0 0 0 0 rgba(47,158,107,0)}}
  #title{width:100%;border:none;background:transparent;font-family:inherit;font-size:30px;font-weight:600;letter-spacing:-.03em;color:var(--ink);padding:2px 5px;margin:-2px -5px;border-radius:8px}
  #title:hover{background:var(--surface)}
  #title:focus{outline:none;background:var(--surface);box-shadow:0 0 0 2px var(--violet)}
  .sub{font-size:13px;color:var(--ink3);margin-top:3px;padding-left:5px}

  .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .btn{border:0.5px solid var(--line-strong);background:var(--surface);color:var(--ink);font-size:13px;font-weight:500;padding:8px 13px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;height:34px;transition:border-color .15s,background .15s}
  .btn:hover{border-color:rgba(0,0,0,.24)}
  .btn svg{width:15px;height:15px}
  .btn.primary{background:var(--orange);color:#fff;border-color:transparent;font-weight:600}
  .btn.primary:hover{background:#d9622f}
  .btn.icon{width:34px;padding:0;justify-content:center}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--ink3)}
  .btn.ghost:hover{background:var(--surface2);color:var(--ink)}

  /* ── toolbar: filter pills + count (calendar filter row) ── */
  .toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .fpill{display:inline-flex;align-items:center;gap:7px;border:0.5px solid var(--line-strong);background:var(--surface);color:var(--ink2);font-size:12px;font-weight:500;padding:6px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none}
  .fpill .sw{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .fpill .n{opacity:.6;font-weight:600}
  .fpill[data-f="all"] .sw{background:var(--dark)}
  .fpill[data-f="in"] .sw{background:var(--green)}
  .fpill[data-f="out"] .sw{background:var(--orange)}
  .fpill.on{color:#fff;border-color:transparent}
  .fpill.on .n{opacity:.8}
  .fpill.on[data-f="all"]{background:var(--dark)}
  .fpill.on[data-f="in"]{background:var(--green-mid)}
  .fpill.on[data-f="out"]{background:var(--orange)}
  .fpill.on .sw{background:rgba(255,255,255,.9)}
  .count{margin-left:auto;font-size:13px;color:var(--ink3);white-space:nowrap}
  .count b{color:var(--ink);font-weight:700}

  .bar{height:6px;border-radius:999px;background:#eceae4;overflow:hidden;margin-bottom:22px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-mid));border-radius:999px;width:0;transition:width .45s cubic-bezier(.4,0,.2,1)}

  /* ── face-sheet grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .card{position:relative;background:var(--surface);border:0.5px solid var(--line);border-radius:var(--radius);padding:15px;display:flex;align-items:center;gap:13px;cursor:pointer;text-align:left;width:100%;transition:border-color .18s,box-shadow .18s,transform .1s;box-shadow:var(--shadow-sm)}
  .card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .card.in{background:var(--green-l);border-color:rgba(123,189,145,.55)}
  .ph{width:58px;height:58px;border-radius:50%;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:var(--ink3);overflow:hidden}
  .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
  .nm{display:block;max-width:100%;min-width:0;font-size:16px;font-weight:600;letter-spacing:-.01em;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hd{display:block;max-width:100%;min-width:0;font-size:12.5px;color:var(--ink2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card.in .hd{color:#4e8365}
  .tog{flex-shrink:0;width:50px;height:29px;border-radius:999px;border:none;background:#e2e0d9;cursor:pointer;position:relative;transition:background .2s;padding:0}
  .tog::after{content:"";position:absolute;top:3px;left:3px;width:23px;height:23px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.22);transition:transform .2s}
  .tog.on{background:var(--green-mid)}
  .tog.on::after{transform:translateX(21px)}
  .tog:focus-visible{outline:2px solid var(--violet);outline-offset:2px}
  .pstat{display:none}

  .empty{text-align:center;padding:60px 20px;color:var(--ink3)}
  .empty svg{width:38px;height:38px;color:#cfcdc6;margin-bottom:12px}
  .empty h3{margin:0 0 4px;font-size:16px;color:var(--ink);font-weight:600}
  .empty p{margin:0 0 16px;font-size:13.5px}

  /* ── editor drawer (calendar Modal feel) ── */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .22s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:var(--surface);box-shadow:-14px 0 44px rgba(0,0,0,.18);z-index:50;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .dr-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:0.5px solid var(--line)}
  .dr-head .t{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .dr-nav{display:flex;gap:2px}
  .dr-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:15px}
  .photo-edit{display:flex;flex-direction:column;align-items:center;gap:12px}
  .photo-preview{width:112px;height:112px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:32px;font-weight:700;color:var(--ink3);border:0.5px solid var(--line)}
  .photo-preview img{width:100%;height:100%;object-fit:cover}
  .photo-controls{display:flex;gap:8px}
  .field label{display:block;font-size:11.5px;color:var(--ink2);margin-bottom:5px;font-weight:500}
  .field input,.field textarea{width:100%;border:0.5px solid var(--line-strong);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--surface)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--orange)}
  .field textarea{resize:vertical;min-height:60px}
  .checkin-row{display:flex;align-items:center;justify-content:space-between;background:var(--green-l);border:0.5px solid rgba(123,189,145,.5);border-radius:11px;padding:12px 14px}
  .checkin-row .lab{font-size:14px;font-weight:600}
  .checkin-row .st{font-size:12px;color:var(--green-d);margin-top:1px;opacity:.75}
  .dr-foot{display:flex;gap:8px;align-items:center;padding:15px 18px;border-top:0.5px solid var(--line)}
  .dr-foot .btn.primary{flex:1;justify-content:center}
  .link-danger{background:none;border:none;color:#b3402f;font-size:13px;font-weight:600;cursor:pointer;padding:9px 10px;border-radius:8px}
  .link-danger:hover{background:var(--orange-l)}
  .hidden-file{display:none}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;font-size:13px;font-weight:500;padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .print-head{display:none}

  /* ── mobile ── */
  @media (max-width:600px){
    .nav{padding:0 14px;height:48px}
    .nav .logo{height:19px}
    .nav .back span{display:none}
    .wrap{padding:18px 14px 96px}
    #title{font-size:23px}
    .head .actions{width:100%}
    .btn.primary{flex:1;justify-content:center}
    .count{margin-left:0;width:100%;order:5;margin-top:2px}
    .grid{grid-template-columns:1fr}
    .drawer{width:100%;max-width:100%}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ── print: clean face sheet ── */
  @media print{
    @page{margin:14mm}
    .nav,.toolbar,.bar,.actions,.eyebrow,.sub,#scrim,#drawer,.toast,.tog,.empty{display:none!important}
    body{background:#fff}
    .wrap{max-width:none;margin:0;padding:0}
    .head{margin-bottom:6px}
    #title{font-size:22px;padding:0;margin:0}
    .print-head{display:block;font-size:12px;color:#444;margin:0 0 14px}
    .grid{display:grid!important;grid-template-columns:repeat(2,1fr);gap:8px}
    .card{break-inside:avoid;background:#fff!important;border:1px solid #cfcdc6!important;box-shadow:none!important;transform:none!important;padding:11px}
    .card.in{background:#fff!important;border-color:#9fc9ae!important}
    .ph{width:46px;height:46px}
    .pstat{display:block;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
    .card.in .pstat{color:var(--green-d)}
    .card:not(.in) .pstat{color:#9E9C96}
  }
</style>
</head>
<body>

<div class="nav">

</div>

<div class="wrap">

      </button>
      <button class="btn" id="copyLink" title="Copy a link to this live board">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>

    <button class="btn primary" id="addBtn2" style="display:inline-flex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add guest</button>

<script>
(function () {
  'use strict';
  var db = window.__db || null;

  // Each board is namespaced by a ?board= slug, so future events/boards get
  // their own guest list. Stored under the already-open marketing-calendar
  // branch (calendar writes with update(), never touching this sub-path).
  var params = new URLSearchParams(location.search);
  var slug = (params.get('board') || 'wgc-hgp').replace(/[^a-z0-9_-]/gi, '').toLowerCase() || 'wgc-hgp';
  var defaultTitle = params.get('title') ? decodeURIComponent(params.get('title')) : 'WGC x HGP Pop-Up';
  var ref = db ? db.ref('marketing-calendar/checkin/' + slug) : null;

  var state = { title: defaultTitle, guests: {} };
  var filter = 'all', editId = null, draftPhoto = '';

  var $ = function (id) { return document.getElementById(id); };
  var grid = $('grid'), empty = $('empty');
  var titleEl = $('title'), liveDot = $('liveDot'), liveLabel = $('liveLabel');
  var drawer = $('drawer'), scrim = $('scrim');
  var photoPreview = $('photoPreview');
  var fName = $('fName'), fHandle = $('fHandle'), fNote = $('fNote'), photoUrl = $('photoUrl');
  var drTog = $('drTog'), checkState = $('checkState');
  titleEl.value = defaultTitle;

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]; }); }
  function initials(name) {
    var p = String(name || '').trim().replace(/^@/, '').split(/[\s._-]+/).filter(Boolean);
    if (!p.length) return '?';
    return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
  }
  function toast(msg) {
    var t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(function () { t.classList.remove('show'); }, 1900);
  }
  function guestList() {
    return Object.keys(state.guests || {}).map(function (id) {
      var g = state.guests[id] || {};
      return { id:id, name:g.name||'', handle:g.handle||'', photo:g.photo||'', note:g.note||'', checkedIn:!!g.checkedIn, ts:g.ts||0 };
    }).sort(function (a, b) { return (a.ts - b.ts) || (a.name < b.name ? -1 : 1); });
  }

  function render() {
    var all = guestList();
    var inCount = all.filter(function (g) { return g.checkedIn; }).length, tot = all.length;
    $('nAll').textContent = tot; $('nIn').textContent = inCount; $('nOut').textContent = tot - inCount;
    $('cIn').textContent = inCount; $('cTot').textContent = tot;
    $('barFill').style.width = (tot ? Math.round(inCount / tot * 100) : 0) + '%';
    $('printHead').textContent = inCount + ' of ' + tot + ' checked in';

    var list = all.filter(function (g) { return filter === 'all' || (filter === 'in' ? g.checkedIn : !g.checkedIn); });
    empty.style.display = tot === 0 ? '' : 'none';
    grid.style.display = tot === 0 ? 'none' : '';
    grid.innerHTML = list.map(function (g) {
      var ph = g.photo ? '<img src="' + esc(g.photo) + '" alt="">' : '<span>' + esc(initials(g.name)) + '</span>';
      return '<button class="card ' + (g.checkedIn ? 'in' : '') + '" data-id="' + esc(g.id) + '">' +
        '<span class="ph">' + ph + '</span>' +
        '<span class="meta"><span class="nm">' + esc(g.name || 'Unnamed') + '</span>' +
        (g.handle ? '<span class="hd">' + esc(g.handle) + '</span>' : '') + '</span>' +
        '<span class="pstat">' + (g.checkedIn ? '✓ Checked in' : 'Expected') + '</span>' +
        '<span class="tog ' + (g.checkedIn ? 'on' : '') + '" role="switch" aria-checked="' + g.checkedIn + '" data-tog="' + esc(g.id) + '" aria-label="Toggle checked in"></span>' +
        '</button>';
    }).join('');
    if (document.activeElement !== titleEl) titleEl.value = state.title || defaultTitle;
  }

  function setCheckedIn(id, val) { if (ref) ref.child('guests/' + id).update({ checkedIn: val, checkedAt: val ? Date.now() : null }); }
  function saveTitle() { if (ref) ref.child('title').set(titleEl.value.trim() || defaultTitle); }

  function openEditor(id) {
    editId = id || null;
    var g = id ? (state.guests[id] || {}) : {};
    draftPhoto = g.photo || '';
    fName.value = g.name || ''; fHandle.value = g.handle || ''; fNote.value = g.note || ''; photoUrl.value = '';
    setChecked(!!g.checkedIn); paintPhoto();
    $('drTitle').textContent = id ? 'Edit guest' : 'Add guest';
    $('deleteBtn').style.display = id ? '' : 'none';
    var multi = id && guestList().length > 1;
    $('prevBtn').style.display = multi ? '' : 'none';
    $('nextBtn').style.display = multi ? '' : 'none';
    drawer.classList.add('show'); scrim.classList.add('show'); drawer.setAttribute('aria-hidden', 'false');
    setTimeout(function () { fName.focus(); }, 120);
  }
  function closeEditor() {
    drawer.classList.remove('show'); scrim.classList.remove('show'); drawer.setAttribute('aria-hidden', 'true');
    editId = null; draftPhoto = '';
  }
  function setChecked(on) { drTog.classList.toggle('on', on); drTog.setAttribute('aria-checked', on); checkState.textContent = on ? 'Here now' : 'Not yet'; }
  function paintPhoto() {
    if (draftPhoto) { photoPreview.innerHTML = '<img src="' + esc(draftPhoto) + '" alt="">'; $('clearPhoto').style.display = ''; }
    else { photoPreview.innerHTML = '<span>' + esc(initials(fName.value)) + '</span>'; $('clearPhoto').style.display = 'none'; }
  }
  function saveEditor(thenNav) {
    var name = fName.value.trim();
    if (!name) { fName.focus(); toast('Add a name'); return false; }
    if (!ref) { toast('Offline — not saved'); return false; }
    var id = editId || ref.child('guests').push().key;
    var existing = state.guests[id] || {};
    ref.child('guests/' + id).update({
      name: name, handle: fHandle.value.trim(), note: fNote.value.trim(), photo: draftPhoto || '',
      checkedIn: drTog.classList.contains('on'),
      checkedAt: drTog.classList.contains('on') ? (existing.checkedAt || Date.now()) : null,
      ts: existing.ts || Date.now()
    });
    editId = id;
    if (!thenNav) { toast('Saved'); closeEditor(); }
    return id;
  }
  function navSibling(dir) {
    var id = saveEditor(true); if (!id) return;
    var list = guestList(), i = list.findIndex(function (g) { return g.id === id; });
    var next = list[i + dir]; if (next) openEditor(next.id);
  }

  function handleFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        var max = 480, w = img.width, h = img.height, s = Math.min(1, max / Math.max(w, h));
        w = Math.round(w * s); h = Math.round(h * s);
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        try { draftPhoto = c.toDataURL('image/jpeg', 0.82); } catch (e) { draftPhoto = reader.result; }
        paintPhoto();
      };
      img.onerror = function () { toast("Couldn't read that image"); };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  $('addBtn').addEventListener('click', function () { openEditor(null); });
  $('addBtn2').addEventListener('click', function () { openEditor(null); });
  $('closeBtn').addEventListener('click', closeEditor);
  scrim.addEventListener('click', closeEditor);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && drawer.classList.contains('show')) closeEditor(); });
  $('saveBtn').addEventListener('click', function () { saveEditor(false); });
  $('deleteBtn').addEventListener('click', function () {
    if (editId && confirm('Remove this guest?')) { if (ref) ref.child('guests/' + editId).remove(); closeEditor(); toast('Removed'); }
  });
  $('prevBtn').addEventListener('click', function () { navSibling(-1); });
  $('nextBtn').addEventListener('click', function () { navSibling(1); });
  drTog.addEventListener('click', function () { setChecked(!drTog.classList.contains('on')); });
  fName.addEventListener('input', function () { if (!draftPhoto) paintPhoto(); });
  $('uploadBtn').addEventListener('click', function () { $('fileInput').click(); });
  $('fileInput').addEventListener('change', function (e) { handleFile(e.target.files[0]); e.target.value = ''; });
  $('clearPhoto').addEventListener('click', function () { draftPhoto = ''; photoUrl.value = ''; paintPhoto(); });
  photoUrl.addEventListener('input', function () { draftPhoto = photoUrl.value.trim(); paintPhoto(); });
  $('printBtn').addEventListener('click', function () { window.print(); });

  grid.addEventListener('click', function (e) {
    var tog = e.target.closest('[data-tog]');
    if (tog) { e.stopPropagation(); var id = tog.getAttribute('data-tog'); var cur = state.guests[id] && state.guests[id].checkedIn; setCheckedIn(id, !cur); return; }
    var card = e.target.closest('[data-id]');
    if (card) openEditor(card.getAttribute('data-id'));
  });

  document.querySelector('.toolbar').addEventListener('click', function (e) {
    var b = e.target.closest('.fpill[data-f]'); if (!b) return;
    filter = b.getAttribute('data-f');
    [].forEach.call(this.querySelectorAll('.fpill'), function (x) { x.classList.toggle('on', x === b); });
    render();
  });

  titleEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
  titleEl.addEventListener('blur', saveTitle);

  $('copyLink').addEventListener('click', function () {
    var url = location.origin + location.pathname + '?board=' + encodeURIComponent(slug);
    (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject()).then(function () { toast('Live link copied'); }, function () { toast(url); });
  });

  if (ref) {
    ref.on('value', function (snap) {
      var v = snap.val() || {};
      state = { title: v.title || defaultTitle, guests: v.guests || {} };
      render();
    }, function (err) { console.error('[checkin] read failed', err); liveLabel.textContent = 'Offline'; });
    db.ref('.info/connected').on('value', function (s) {
      var on = !!s.val();
      liveDot.classList.toggle('on', on);
      liveLabel.textContent = on ? 'Live' : 'Reconnecting…';
    });
  } else { liveLabel.textContent = 'Offline'; render(); }
})();
</script>
</body>
</html>
