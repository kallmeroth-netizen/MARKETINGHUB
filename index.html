<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neighbors Only Portal — Neighborly</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark:   #1f2328;
    --yellow: #eace49;
    --green:  #7bbd91;
    --lav:    #cbc9d6;
    --cream:  #f2f2f2;
    --off:    #e5e3d6;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }

  .bg-blob {
    position: fixed; border-radius: 50%; filter: blur(90px);
    opacity: 0; pointer-events: none; z-index: 0;
    animation: blobFade 1.4s ease forwards;
  }
  .blob-1 { width: 560px; height: 560px; background: var(--yellow); top: -180px; right: -120px; animation-delay: 0.2s; }
  .blob-2 { width: 400px; height: 400px; background: var(--green);  bottom: -100px; left: -80px;  animation-delay: 0.5s; }
  .blob-3 { width: 260px; height: 260px; background: var(--lav);    bottom: 22%; right: 6%;     animation-delay: 0.8s; }
  @keyframes blobFade { to { opacity: 0.16; } }

  .stage {
    position: relative; z-index: 1; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
  }

  .logo-wrap {
    opacity: 0; margin-bottom: 22px;
    animation: riseInFull 0.85s ease 0.4s forwards;
  }
  .logo-wrap img {
    height: 38px; width: auto; display: block;
  }

  .portal-name {
    font-size: 12.5px; font-weight: 400;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--dark); opacity: 0; margin-bottom: 52px;
    animation: riseInFull 0.7s ease 0.7s forwards;
  }

  .divider {
    width: 0; height: 0.5px; background: var(--dark);
    opacity: 0.14; margin-bottom: 52px;
    animation: expandLine 1s ease 0.9s forwards;
  }
  @keyframes expandLine { to { width: 300px; } }

  .pills {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }

  .pill {
    display: flex; align-items: center; gap: 11px;
    padding: 13px 22px; border-radius: 100px;
    border: 1.5px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px; font-weight: 500;
    cursor: pointer; text-decoration: none; color: var(--dark);
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease, color 0.22s ease, border-color 0.22s ease;
    opacity: 0; transform: translateY(18px) scale(0.97);
  }

  .pill:nth-child(1) { animation: pillIn 0.6s cubic-bezier(0.34,1.4,0.64,1) 1.15s forwards; }
  .pill:nth-child(2) { animation: pillIn 0.6s cubic-bezier(0.34,1.4,0.64,1) 1.3s  forwards; }
  .pill:nth-child(3) { animation: pillIn 0.6s cubic-bezier(0.34,1.4,0.64,1) 1.45s forwards; }
  @keyframes pillIn { to { opacity: 1; transform: translateY(0) scale(1); } }

  .pill:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
  .pill:active { transform: translateY(-1px); }

  .pill-icon {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.22s ease;
  }
  .pill-label { font-size: 13.5px; font-weight: 600; display: block; }
  .pill-sub   { font-size: 10.5px; font-weight: 400; opacity: 0.48; display: block; margin-top: 3px; }

  .pill-perf { border-color: rgba(234,206,73,0.55); }
  .pill-perf .pill-icon { background: rgba(234,206,73,0.22); }
  .pill-perf:hover { background: var(--yellow); border-color: var(--yellow); }
  .pill-perf:hover .pill-icon { background: rgba(255,255,255,0.28); }

  .pill-cal { border-color: rgba(31,35,40,0.18); }
  .pill-cal .pill-icon { background: var(--off); }
  .pill-cal:hover { background: var(--dark); border-color: var(--dark); color: #fff; }
  .pill-cal:hover .pill-icon { background: rgba(255,255,255,0.1); }
  .pill-cal:hover svg { stroke: #fff; }

  .pill-print { border-color: rgba(123,189,145,0.55); }
  .pill-print .pill-icon { background: rgba(123,189,145,0.18); }
  .pill-print:hover { background: var(--green); border-color: var(--green); }
  .pill-print:hover .pill-icon { background: rgba(255,255,255,0.22); }

  .hub-footer {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--dark); opacity: 0; letter-spacing: 0.07em; white-space: nowrap;
    animation: riseInDim 0.6s ease 1.9s forwards;
  }

  @keyframes riseInFull {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes riseInDim {
    from { opacity: 0; } to { opacity: 0.28; }
  }
</style>
</head>
