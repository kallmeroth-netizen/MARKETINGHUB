<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Production — Neighborly</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F7F6F3;--surface:#fff;--surface2:#F0EEE9;
    --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);
    --text:#1A1916;--text-2:#6B6960;--text-3:#9E9C96;
    --dark:#1f2328;--yellow:#eace49;--green:#7bbd91;--orange:#e87142;--blue:#6280bd;--tan:#dbc6a2;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  nav{background:var(--surface);border-bottom:0.5px solid var(--border-strong);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:50}
  .nav-brand{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;text-decoration:none}
  .nav-dot{width:7px;height:7px;background:var(--yellow);border-radius:50%}
  .nav-back{font-size:12px;color:var(--text-2);text-decoration:none;display:flex;align-items:center;gap:5px;padding:5px 12px;border:0.5px solid var(--border-strong);border-radius:8px;transition:background .15s}
  .nav-back:hover{background:var(--surface2)}
  .wrap{padding:1.5rem;max-width:1200px;margin:0 auto}
  .page-header{margin-bottom:1.5rem}
  .page-header h1{font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
  .page-header p{font-size:13px;color:var(--text-2);margin-top:3px}

  /* URGENT CARDS */
  .urgent-label{font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .urgent-label::after{content:'';flex:1;height:.5px;background:var(--border-strong)}
  .urgent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.75rem}
  .uc{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:.9rem 1rem;cursor:pointer;transition:background .1s}
  .uc:hover{background:var(--surface2)}
  .uc.overdue{border-left:3px solid var(--orange);border-radius:0 12px 12px 0}
  .uc.at-risk{border-left:3px solid var(--tan);border-radius:0 12px 12px 0}
  .uc.on-track{border-left:3px solid var(--green);border-radius:0 12px 12px 0}
  .uc.done{border-left:3px solid #639922;border-radius:0 12px 12px 0}
  .uc-name{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.3}
  .uc-meta{font-size:11px;color:var(--text-3);margin-bottom:5px}
  .uc-date{font-size:11.5px;font-weight:500}
  .uc-date.overdue{color:var(--orange)}
  .uc-date.at-risk{color:#633806}
  .uc-date.on-track{color:#085041}
  .uc-date.done{color:#27500A}
  .spill{display:inline-block;font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:20px;margin-top:4px}
  .sp-done{background:#EAF3DE;color:#27500A}
  .sp-on-track{background:#E1F5EE;color:#085041}
  .sp-at-risk{background:#f7f0e4;color:#633806}
  .sp-overdue{background:#fdeee7;color:#8a3518}

  /* SECTIONS */
  .section{margin-bottom:1.75rem}
  .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .sec-title{font-size:14.5px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
  .sec-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
  .add-btn{background:none;border:0.5px solid var(--border-strong);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text-2);display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif}
  .add-btn:hover{background:var(--surface2)}
  .table-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
  .pt{width:100%;border-collapse:collapse;table-layout:fixed}
  .pt th{font-size:11px;font-weight:500;color:var(--text-3);text-align:left;padding:6px 10px;border-bottom:0.5px solid var(--border-strong)}
  .pt td{font-size:12.5px;color:var(--text);padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
  .pt tr:last-child td{border-bottom:none}
  .pt tr:hover td{background:var(--surface2)}
  .cb input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--yellow)}
  .file-lbl{display:inline-flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;color:var(--text-2);border:0.5px solid var(--border-strong);border-radius:6px;padding:3px 8px}
  .file-lbl:hover{background:var(--surface2)}
  .file-lbl.has{color:#085041;border-color:var(--green);background:#E1F5EE}
  .file-inp{display:none}
  .empty td{color:var(--text-3);font-size:12.5px;font-style:italic;text-align:center;padding:16px}

  /* FORM */
  .form-overlay{background:rgba(0,0,0,.28);display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 0;margin-top:1rem}
  .form-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;width:100%;max-width:480px}
  .form-card h3{font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--text)}
  .fr{margin-bottom:10px}
  .fr label{display:block;font-size:11.5px;color:var(--text-2);margin-bottom:3px}
  .fr input,.fr select{width:100%;border:0.5px solid var(--border-strong);border-radius:8px;padding:7px 10px;font-size:12.5px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif}
  .drop{border:1.5px dashed var(--border-strong);border-radius:8px;padding:.9rem;text-align:center;cursor:pointer;transition:background .1s}
  .drop:hover{background:var(--surface2)}
  .drop.has{border-color:var(--green);background:#E1F5EE}
  .drop-text{font-size:12.5px;color:var(--text-2)}
  .drop-text.has{color:#085041}
  .form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
  .btn-c{background:none;border:0.5px solid var(--border-strong);border-radius:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif}
  .btn-s{background:var(--dark);border:none;border-radius:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:var(--yellow);font-weight:500;font-family:'DM Sans',sans-serif}
  .btn-d{background:none;border:0.5px solid var(--orange);border-radius:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:var(--orange);font-family:'DM Sans',sans-serif}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html"><div class="nav-dot"></div>Neighborly</a>
  <a class="nav-back" href="index.html">&#8592; Portal home</a>
</nav>

<div class="wrap">
  <div class="page-header">
    <h1>Print Production</h1>
    <p>Track artwork deadlines, approvals, and delivery timelines across all print materials.</p>
  </div>

  <div class="urgent-label"><i class="ti ti-clock" style="font-size:14px"></i> Upcoming deadlines</div>
  <div class="urgent-grid" id="urgentGrid"></div>

  <div id="sectionsWrap"></div>

  <div id="formWrap" style="display:none">
    <div class="form-overlay">
      <div class="form-card">
        <h3 id="fTitle">Add print item</h3>
        <div class="fr"><label>Item name</label><input type="text" id="fName" placeholder="e.g. Summer sale poster"></div>
        <div class="fr"><label>Category</label>
          <select id="fCat">
            <option value="posters">Posters</option>
            <option value="postcards">Postcards</option>
            <option value="stickers">Stickers</option>
            <option value="popup">Pop-up materials</option>
          </select>
        </div>
        <div class="fr"><label>Finish-by date</label><input type="date" id="fFinish"></div>
        <div class="fr"><label>Sent to print date (leave blank if not sent yet)</label><input type="date" id="fPrint"></div>
        <div class="fr">
          <label>Artwork file</label>
          <div class="drop" id="fDrop" onclick="document.getElementById('fFile').click()">
            <input type="file" id="fFile" class="file-inp" accept=".pdf,.ai,.eps,.png,.jpg,.zip" onchange="pickFile(this)">
            <i class="ti ti-upload" style="font-size:20px;color:var(--text-3);display:block;margin-bottom:5px"></i>
            <div class="drop-text" id="fDropText">Click to upload · PDF, AI, EPS, PNG, ZIP</div>
          </div>
        </div>
        <div class="form-btns">
          <button class="btn-d" id="fDel" onclick="delItem()" style="display:none"><i class="ti ti-trash"></i> Delete</button>
          <button class="btn-c" onclick="closeForm()">Cancel</button>
          <button class="btn-s" onclick="saveItem()">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CATS=[
  {key:'posters',   label:'Posters',        icon:'ti-layout-board', color:'#eace49',bg:'#fdf7d8',text:'#7a6b00'},
  {key:'postcards', label:'Postcards',       icon:'ti-mail',         color:'#7bbd91',bg:'#e4f5ea',text:'#2a5c38'},
  {key:'stickers',  label:'Stickers',        icon:'ti-tag',          color:'#e87142',bg:'#fdeee7',text:'#8a3518'},
  {key:'popup',     label:'Pop-up materials',icon:'ti-layout-2',     color:'#6280bd',bg:'#eaeef8',text:'#2d4480'}
];

function uid(){return Math.random().toString(36).slice(2,9)}
function addDays(ds,n){const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}
function fmt(ds){if(!ds)return'—';return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function tod(){return new Date().toISOString().split('T')[0]}
function daysUntil(ds){return Math.round((new Date(ds+'T00:00:00')-new Date(tod()+'T00:00:00'))/(864e5))}
function catLabel(k){return CATS.find(c=>c.key===k)?.label||k}

function getStatus(it){
  if(it.approved&&it.sent)return'done';
  if(!it.finishBy)return'on-track';
  const d=daysUntil(it.finishBy);
  if(d<0)return'overdue';
  if(d<=3)return'at-risk';
  return'on-track';
}
function sLabel(s){return{done:'Done','on-track':'On track','at-risk':'At risk',overdue:'Overdue'}[s]}
function sCls(s){return{done:'sp-done','on-track':'sp-on-track','at-risk':'sp-at-risk',overdue:'sp-overdue'}[s]}

let formFile='',editId=null;
let items=[
  {id:uid(),name:"Summer sale — 18×24 poster",cat:'posters',finishBy:'2025-05-12',approved:true,sent:true,printDate:'2025-05-09',fileName:'summer_poster.pdf'},
  {id:uid(),name:"Mother's Day window cling",cat:'posters',finishBy:'2025-05-06',approved:false,sent:false,printDate:'',fileName:''},
  {id:uid(),name:'Summer promo postcard',cat:'postcards',finishBy:'2025-05-18',approved:true,sent:false,printDate:'',fileName:''},
  {id:uid(),name:'Logo sticker sheet',cat:'stickers',finishBy:'2025-05-08',approved:true,sent:true,printDate:'2025-05-07',fileName:'logo_stickers.ai'},
  {id:uid(),name:'Event table banner',cat:'popup',finishBy:'2025-05-20',approved:false,sent:false,printDate:'',fileName:''},
  {id:uid(),name:'Step-and-repeat backdrop',cat:'popup',finishBy:'2025-05-14',approved:true,sent:false,printDate:'',fileName:'backdrop_v2.pdf'},
];

function togAppr(id){items=items.map(i=>i.id===id?{...i,approved:!i.approved}:i);render()}
function togSent(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  if(!it.sent&&!it.approved){document.getElementById('cb-sent-'+id).checked=false;alert('Please approve first.');return;}
  const ns=!it.sent;
  items=items.map(i=>i.id===id?{...i,sent:ns,printDate:ns?tod():''}:i);render();
}
function trigFile(id){document.getElementById('fi-'+id)?.click()}
function rowFile(inp,id){const f=inp.files[0];if(!f)return;items=items.map(i=>i.id===id?{...i,fileName:f.name}:i);render()}
function pickFile(inp){const f=inp.files[0];if(!f)return;formFile=f.name;document.getElementById('fDropText').textContent=f.name;document.getElementById('fDropText').className='drop-text has';document.getElementById('fDrop').className='drop has'}

function openForm(cat){
  editId=null;formFile='';
  document.getElementById('fTitle').textContent='Add print item';
  document.getElementById('fName').value='';
  document.getElementById('fCat').value=cat||'posters';
  document.getElementById('fFinish').value='';
  document.getElementById('fPrint').value='';
  document.getElementById('fFile').value='';
  document.getElementById('fDropText').textContent='Click to upload · PDF, AI, EPS, PNG, ZIP';
  document.getElementById('fDropText').className='drop-text';
  document.getElementById('fDrop').className='drop';
  document.getElementById('fDel').style.display='none';
  document.getElementById('formWrap').style.display='block';
  document.getElementById('formWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function openEdit(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  editId=id;formFile=it.fileName||'';
  document.getElementById('fTitle').textContent='Edit print item';
  document.getElementById('fName').value=it.name;
  document.getElementById('fCat').value=it.cat;
  document.getElementById('fFinish').value=it.finishBy||'';
  document.getElementById('fPrint').value=it.printDate||'';
  document.getElementById('fFile').value='';
  if(it.fileName){document.getElementById('fDropText').textContent=it.fileName;document.getElementById('fDropText').className='drop-text has';document.getElementById('fDrop').className='drop has'}
  else{document.getElementById('fDropText').textContent='Click to upload · PDF, AI, EPS, PNG, ZIP';document.getElementById('fDropText').className='drop-text';document.getElementById('fDrop').className='drop'}
  document.getElementById('fDel').style.display='block';
  document.getElementById('formWrap').style.display='block';
  document.getElementById('formWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeForm(){document.getElementById('formWrap').style.display='none';editId=null}
function delItem(){if(!editId)return;items=items.filter(i=>i.id!==editId);closeForm();render()}
function saveItem(){
  const name=document.getElementById('fName').value.trim(),fb=document.getElementById('fFinish').value;
  if(!name||!fb){alert('Please fill in name and finish-by date.');return;}
  const pd=document.getElementById('fPrint').value;
  const ex=editId?items.find(i=>i.id===editId):{};
  const it={id:editId||uid(),name,cat:document.getElementById('fCat').value,finishBy:fb,approved:ex.approved||false,sent:!!pd,printDate:pd||'',fileName:formFile||ex.fileName||''};
  if(editId){items=items.map(i=>i.id===editId?it:i)}else{items.push(it)}
  closeForm();render();
}

function renderUrgent(){
  const inc=items.filter(i=>!i.sent&&i.finishBy).sort((a,b)=>new Date(a.finishBy)-new Date(b.finishBy)).slice(0,3);
  if(!inc.length){document.getElementById('urgentGrid').innerHTML=`<div style="grid-column:1/-1;font-size:13px;color:var(--text-3);font-style:italic;padding:.5rem 0">All items sent to print.</div>`;return}
  document.getElementById('urgentGrid').innerHTML=inc.map(it=>{
    const s=getStatus(it),d=daysUntil(it.finishBy);
    const dl=d<0?`${Math.abs(d)}d overdue`:d===0?'Due today':`${d}d left`;
    return `<div class="uc ${s}" onclick="openEdit('${it.id}')">
      <div class="uc-name">${it.name}</div>
      <div class="uc-meta">${catLabel(it.cat)}</div>
      <div class="uc-date ${s}">${fmt(it.finishBy)} · ${dl}</div>
      <span class="spill ${sCls(s)}">${sLabel(s)}</span>
    </div>`;
  }).join('');
}

function render(){
  renderUrgent();
  document.getElementById('sectionsWrap').innerHTML=CATS.map(cat=>{
    const ci=items.filter(i=>i.cat===cat.key).sort((a,b)=>new Date(a.finishBy||'9999')-new Date(b.finishBy||'9999'));
    const rows=!ci.length
      ?`<tr class="empty"><td colspan="8">No items yet — add one above</td></tr>`
      :ci.map(it=>{
        const s=getStatus(it),del=it.printDate?addDays(it.printDate,10):'';
        const fc=it.fileName?`<span class="file-lbl has" onclick="trigFile('${it.id}')"><i class="ti ti-file" style="font-size:11px"></i>${it.fileName}</span>`:`<span class="file-lbl" onclick="trigFile('${it.id}')"><i class="ti ti-upload" style="font-size:11px"></i>Upload</span>`;
        return `<tr>
          <td style="font-weight:500;cursor:pointer" onclick="openEdit('${it.id}')">${it.name}</td>
          <td>${fmt(it.finishBy)}</td>
          <td class="cb" style="text-align:center"><input type="checkbox" id="cb-appr-${it.id}" ${it.approved?'checked':''} onchange="togAppr('${it.id}')"></td>
          <td style="text-align:center"><input type="file" id="fi-${it.id}" class="file-inp" accept=".pdf,.ai,.eps,.png,.zip" onchange="rowFile(this,'${it.id}')">${fc}</td>
          <td class="cb" style="text-align:center"><input type="checkbox" id="cb-sent-${it.id}" ${it.sent?'checked':''} onchange="togSent('${it.id}')"></td>
          <td>${fmt(it.printDate)}</td>
          <td style="font-size:12px;color:var(--text-2)">${fmt(del)}</td>
          <td><span class="spill ${sCls(s)}">${sLabel(s)}</span></td>
        </tr>`;
      }).join('');
    return `<div class="section">
      <div class="sec-header">
        <div class="sec-title"><i class="ti ${cat.icon}" style="font-size:16px;color:${cat.color}"></i>${cat.label}<span class="sec-badge" style="background:${cat.bg};color:${cat.text}">${ci.length}</span></div>
        <button class="add-btn" onclick="openForm('${cat.key}')"><i class="ti ti-plus" style="font-size:12px"></i>Add</button>
      </div>
      <div class="table-wrap">
        <table class="pt">
          <thead><tr>
            <th style="width:26%">Item</th>
            <th style="width:11%">Finish by</th>
            <th style="width:9%;text-align:center">Approved</th>
            <th style="width:12%;text-align:center">File</th>
            <th style="width:10%;text-align:center">Sent to print</th>
            <th style="width:11%">Print date</th>
            <th style="width:12%">Est. delivery</th>
            <th style="width:9%">Status</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
