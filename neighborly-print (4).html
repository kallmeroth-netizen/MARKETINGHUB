<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Production — Neighborly</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#fff;--surface2:#F0EEE9;
  --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);
  --text:#1A1916;--text2:#6B6960;--text3:#9E9C96;
  --dark:#1f2328;
  --yellow:#eace49;--yl:#fdf7d8;--yd:#7a6b00;
  --green:#7bbd91;--gl:#e4f5ea;--gd:#2a5c38;
  --orange:#e87142;--ol:#fdeee7;--od:#8a3518;
  --blue:#6280bd;--bl:#eaeef8;--bd:#2d4480;
  --tan:#dbc6a2;--tl:#f7f0e4;--td:#5a4520;
  --lav:#cbc9d6;--ll:#f0eff5;--ld:#4a4760;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,select{font-family:inherit}

nav{background:var(--surface);border-bottom:.5px solid var(--border-strong);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:50}
.nav-brand{display:flex;align-items:center;height:50px;text-decoration:none}
.nav-brand img{height:20px;width:auto;display:block}
.nav-links{display:flex;gap:8px}
.nav-back{font-size:12px;color:var(--text2);text-decoration:none;padding:5px 12px;border:.5px solid var(--border-strong);border-radius:8px;transition:background .15s;white-space:nowrap}
.nav-back:hover{background:var(--surface2)}
.nav-back.accent{color:var(--yd);border-color:rgba(234,206,73,.5);background:var(--yl)}
.nav-back.accent:hover{background:#f5eebc}

.wrap{padding:1.5rem;max-width:1200px;margin:0 auto}
.page-header{margin-bottom:1.5rem}
.page-header h1{font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.page-header p{font-size:13px;color:var(--text2);margin-top:3px}

.sec-label{font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:.5px;background:var(--border-strong)}

.urgent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
.uc{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:.9rem 1rem;cursor:pointer;transition:background .1s}
.uc:hover{background:var(--surface2)}
.uc.overdue{border-left:3px solid var(--orange);border-radius:0 12px 12px 0}
.uc.at-risk{border-left:3px solid var(--tan);border-radius:0 12px 12px 0}
.uc.on-track{border-left:3px solid var(--green);border-radius:0 12px 12px 0}
.uc.done{border-left:3px solid #639922;border-radius:0 12px 12px 0}
.uc-name{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.35}
.uc-meta{font-size:11px;color:var(--text3);margin-bottom:5px}
.uc-date{font-size:11.5px;font-weight:500}
.uc-date.overdue{color:var(--orange)}.uc-date.at-risk{color:var(--td)}.uc-date.on-track{color:var(--gd)}.uc-date.done{color:#27500A}
.uc-empty{grid-column:1/-1;font-size:13px;color:var(--text3);font-style:italic}
.spill{display:inline-block;font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:20px;margin-top:4px}
.sp-done{background:#EAF3DE;color:#27500A}.sp-on-track{background:var(--gl);color:var(--gd)}.sp-at-risk{background:var(--tl);color:var(--td)}.sp-overdue{background:var(--ol);color:var(--od)}

.section{margin-bottom:1.75rem}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:14.5px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
.sec-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.add-btn{background:none;border:.5px solid var(--border-strong);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:5px;transition:background .15s}
.add-btn:hover{background:var(--surface2)}

.table-wrap{background:var(--surface);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.pt{width:100%;border-collapse:collapse;table-layout:fixed}
.pt th{font-size:10.5px;font-weight:500;color:var(--text3);text-align:left;padding:7px 10px;border-bottom:.5px solid var(--border-strong)}
.pt td{font-size:12.5px;color:var(--text);padding:10px;border-bottom:.5px solid var(--border);vertical-align:middle}
.pt tr:last-child td{border-bottom:none}
.pt tr:hover td{background:var(--surface2)}
.pt td input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--yellow)}
.file-lbl{display:inline-flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;color:var(--text2);border:.5px solid var(--border-strong);border-radius:6px;padding:3px 7px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-lbl:hover{background:var(--surface2)}
.file-lbl.has{color:var(--gd);border-color:var(--green);background:var(--gl)}
.file-inp{display:none}
.empty-row td{color:var(--text3);font-style:italic;text-align:center;padding:16px}

.form-overlay{background:rgba(0,0,0,.2);padding:1.5rem;border-radius:12px;margin-top:1rem;display:flex;align-items:flex-start;justify-content:center}
.form-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:1.25rem;width:100%;max-width:500px}
.form-card h3{font-size:14.5px;font-weight:500;margin-bottom:1rem;color:var(--text)}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:11.5px;color:var(--text2);margin-bottom:3px}
.fr input,.fr select{width:100%;border:.5px solid var(--border-strong);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);background:var(--surface)}
.drop{border:1.5px dashed var(--border-strong);border-radius:8px;padding:.9rem;text-align:center;cursor:pointer;transition:background .1s}
.drop:hover,.drop.has{border-color:var(--green);background:var(--gl)}
.drop-text{font-size:12.5px;color:var(--text2)}
.drop-text.has{color:var(--gd)}
.form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-c{background:none;border:.5px solid var(--border-strong);border-radius:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:var(--text)}
.btn-s{background:var(--dark);border:none;border-radius:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:var(--yellow);font-weight:500}
.btn-d{background:none;border:.5px solid var(--orange);border-radius:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:var(--orange)}
</style>
</head>

function uid(){return Math.random().toString(36).slice(2,9);}
function addDays(ds,n){if(!ds)return'';var d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function fmtDate(ds){if(!ds)return'&#8212;';return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function daysUntil(ds){return Math.round((new Date(ds+'T00:00:00')-new Date(todayStr()+'T00:00:00'))/86400000);}
function catLabel(k){var c=CATS.find(function(c){return c.key===k;});return c?c.label:k;}
function getStatus(item){
  if(item.approved&&item.sent)return'done';
  if(!item.finishBy)return'on-track';
  var d=daysUntil(item.finishBy);
  if(d<0)return'overdue';if(d<=3)return'at-risk';return'on-track';
}

function pickFile(inp){var f=inp.files[0];if(!f)return;formFileName=f.name;document.getElementById('fDropText').innerHTML='<i class="ti ti-file" style="font-size:14px;vertical-align:-2px"></i> '+f.name;document.getElementById('fDropText').className='drop-text has';document.getElementById('fDrop').className='drop has';}
function openForm(cat){editId=null;formFileName='';document.getElementById('fTitle').textContent='Add print item';document.getElementById('fName').value='';document.getElementById('fCat').value=cat||'postcards';document.getElementById('fFinish').value='';document.getElementById('fPrint').value='';document.getElementById('fFile').value='';document.getElementById('fDropText').innerHTML='Click to upload or drag &amp; drop<br><span style="font-size:11px;opacity:.7">PDF, AI, EPS, PNG, JPG, ZIP</span>';document.getElementById('fDropText').className='drop-text';document.getElementById('fDrop').className='drop';document.getElementById('fDel').style.display='none';document.getElementById('formWrap').style.display='block';document.getElementById('formWrap').scrollIntoView({behavior:'smooth',block:'nearest'});}
function openEdit(id){var item=items.find(function(i){return i.id===id;});if(!item)return;editId=id;formFileName=item.fileName||'';document.getElementById('fTitle').textContent='Edit print item';document.getElementById('fName').value=item.name;document.getElementById('fCat').value=item.cat;document.getElementById('fFinish').value=item.finishBy||'';document.getElementById('fPrint').value=item.printDate||'';document.getElementById('fFile').value='';if(item.fileName){document.getElementById('fDropText').innerHTML='<i class="ti ti-file" style="font-size:14px;vertical-align:-2px"></i> '+item.fileName;document.getElementById('fDropText').className='drop-text has';document.getElementById('fDrop').className='drop has';}else{document.getElementById('fDropText').innerHTML='Click to upload or drag &amp; drop<br><span style="font-size:11px;opacity:.7">PDF, AI, EPS, PNG, JPG, ZIP</span>';document.getElementById('fDropText').className='drop-text';document.getElementById('fDrop').className='drop';}document.getElementById('fDel').style.display='block';document.getElementById('formWrap').style.display='block';document.getElementById('formWrap').scrollIntoView({behavior:'smooth',block:'nearest'});}
function closeForm(){document.getElementById('formWrap').style.display='none';editId=null;}
function delItem(){if(!editId)return;items=items.filter(function(i){return i.id!==editId;});saveToStorage();closeForm();render();}
function saveItem(){var name=document.getElementById('fName').value.trim();var fb=document.getElementById('fFinish').value;if(!name||!fb){alert('Please fill in item name and finish-by date.');return;}var pd=document.getElementById('fPrint').value;var ex=editId?(items.find(function(i){return i.id===editId;})||{}):{};var item={id:editId||uid(),name:name,cat:document.getElementById('fCat').value,finishBy:fb,approved:ex.approved||false,sent:!!pd,printDate:pd||'',fileName:formFileName||ex.fileName||''};if(editId){items=items.map(function(i){return i.id===editId?item:i;});}else{items.push(item);}saveToStorage();closeForm();render();}
function renderUrgent() {
  var inc = items.filter(function(i){ return !i.sent && i.finishBy; })
    .sort(function(a,b){ return new Date(a.finishBy) - new Date(b.finishBy); })
    .slice(0, 3);
  var el = document.getElementById('urgentGrid');
  if (!inc.length) { el.innerHTML = '<div class="uc-empty">Nothing urgent right now &#8212; all items sent to print.</div>'; return; }
  el.innerHTML = inc.map(function(item) {
    var s = getStatus(item), d = daysUntil(item.finishBy);
    var dl = d < 0 ? Math.abs(d) + 'd overdue' : d === 0 ? 'Due today' : d + 'd left';
    return '<div class="uc ' + s + '" onclick="openEdit(\'' + item.id + '\')">' +
      '<div class="uc-name">' + item.name + '</div>' +
      '<div class="uc-meta">' + catLabel(item.cat) + '</div>' +
      '<div class="uc-date ' + s + '">' + fmtDate(item.finishBy) + ' &nbsp;&middot;&nbsp; ' + dl + '</div>' +
      '<span class="spill ' + sCls(s) + '">' + sLabel(s) + '</span>' +
    '</div>';
  }).join('');
}

function renderSections() {
  var html = '';
  CATS.forEach(function(cat) {
    var ci = items.filter(function(i){ return i.cat === cat.key; })
      .sort(function(a,b){
        if (!a.finishBy) return 1;
        if (!b.finishBy) return -1;
        return new Date(a.finishBy) - new Date(b.finishBy);
      });
    var rows = '';
    if (!ci.length) {
      rows = '<tr class="empty-row"><td colspan="8">No items yet &#8212; click Add to get started</td></tr>';
    } else {
      ci.forEach(function(item) {
        var s = getStatus(item);
        var del = item.printDate ? addDays(item.printDate, 10) : '';
        var fc = item.fileName
          ? '<span class="file-lbl has" onclick="trigFile(\'' + item.id + '\')" title="' + item.fileName + '"><i class="ti ti-file" style="font-size:11px"></i>&nbsp;' + item.fileName + '</span>'
          : '<span class="file-lbl" onclick="trigFile(\'' + item.id + '\')"><i class="ti ti-upload" style="font-size:11px"></i>&nbsp;Upload</span>';
        rows += '<tr>' +
          '<td style="font-weight:500;cursor:pointer" onclick="openEdit(\'' + item.id + '\')">' + item.name + '</td>' +
          '<td>' + fmtDate(item.finishBy) + '</td>' +
          '<td style="text-align:center"><input type="checkbox" id="cb-appr-' + item.id + '" ' + (item.approved ? 'checked' : '') + ' onchange="togAppr(\'' + item.id + '\')"></td>' +
          '<td style="text-align:center"><input type="file" id="fi-' + item.id + '" class="file-inp" accept=".pdf,.ai,.eps,.png,.jpg,.zip" onchange="rowFile(this,\'' + item.id + '\')">' + fc + '</td>' +
          '<td style="text-align:center"><input type="checkbox" id="cb-sent-' + item.id + '" ' + (item.sent ? 'checked' : '') + ' onchange="togSent(\'' + item.id + '\')"></td>' +
          '<td style="font-size:12px;color:var(--text2)">' + fmtDate(item.printDate) + '</td>' +
          '<td style="font-size:12px;color:var(--text2)">' + fmtDate(del) + '</td>' +
          '<td><span class="spill ' + sCls(s) + '">' + sLabel(s) + '</span></td>' +
        '</tr>';
      });
    }
    html += '<div class="section">' +
      '<div class="sec-header">' +
        '<div class="sec-title">' +
          '<i class="ti ' + cat.icon + '" style="font-size:16px;color:' + cat.color + '"></i>' +
          cat.label +
          '<span class="sec-badge" style="background:' + cat.bg + ';color:' + cat.text + '">' + ci.length + ' item' + (ci.length !== 1 ? 's' : '') + '</span>' +
        '</div>' +
        '<button class="add-btn" onclick="openForm(\'' + cat.key + '\')"><i class="ti ti-plus" style="font-size:12px"></i>&nbsp;Add</button>' +
      '</div>' +
      '<div class="table-wrap"><table class="pt"><thead><tr>' +
        '<th style="width:26%">Item</th>' +
        '<th style="width:12%">Finish by</th>' +
        '<th style="width:9%;text-align:center">Approved</th>' +
        '<th style="width:13%;text-align:center">File</th>' +
        '<th style="width:10%;text-align:center">Sent to print</th>' +
        '<th style="width:11%">Print date</th>' +
        '<th style="width:11%">Est. delivery</th>' +
        '<th style="width:8%">Status</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
    '</div>';
  });
  document.getElementById('sectionsWrap').innerHTML = html;
}

function render() { renderUrgent(); renderSections(); }
render();
</script>
</body>
</html>
