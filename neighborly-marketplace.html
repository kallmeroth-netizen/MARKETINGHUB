<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Marketplace NPI — Neighborly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f6f3; --card:#fff; --ink:#1f2328; --muted:#6b7178;
    --line:rgba(31,35,40,.08); --line-soft:rgba(31,35,40,.06);
    --accent:#6280bd; --radius:14px; --shadow:0 1px 2px rgba(31,35,40,.04),0 8px 24px rgba(31,35,40,.05);
    --green-ink:#3f7a52; --green-bg:#e9f4ee; --green-br:#cfe9da;
    --amber-ink:#9a6a16; --amber-bg:#fbf2e2; --amber-br:#efe0c2;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  /* top bar — marketplace only, self-contained */
  .top{display:flex;align-items:center;gap:14px;padding:13px 22px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .top img.logo{height:26px}
  .top .title{font-weight:700;font-size:15px}
  .top .tabs{margin-left:14px;display:flex;gap:4px}
  .top .tabs button{border:0;background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);padding:8px 14px;border-radius:10px;cursor:pointer}
  .top .tabs button:hover{background:#f1efe9;color:var(--ink)}
  .top .tabs button.active{background:var(--accent);color:#fff}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .top .addbtn{border:0;background:var(--ink);color:#fff;font-family:inherit;font-weight:600;font-size:13px;padding:9px 14px;border-radius:10px;cursor:pointer}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
  .switch{position:relative;width:36px;height:20px;background:#d8d5cd;border-radius:999px;cursor:pointer;transition:.15s}
  .switch.on{background:var(--green-ink)}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.15s}
  .switch.on::after{left:18px}
  .wrap{max-width:1280px;margin:0 auto;padding:24px 22px 80px}

  /* pipeline board */
  .board{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px}
  .col{flex:0 0 250px;background:#efece5;border-radius:14px;padding:10px;max-height:75vh;display:flex;flex-direction:column}
  .col h3{margin:4px 6px 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
  .col h3 .dot{width:9px;height:9px;border-radius:50%}
  .col h3 .cnt{margin-left:auto;color:var(--muted);font-weight:600}
  .col .list{overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:2px}
  .pcard{background:#fff;border:1px solid var(--line-soft);border-radius:11px;padding:11px 12px;box-shadow:var(--shadow);cursor:pointer}
  .pcard:hover{border-color:var(--accent)}
  .pcard .pn{font-weight:600;font-size:13.5px;line-height:1.25}
  .pcard .pb{font-size:11.5px;color:var(--muted);margin-top:2px}
  .pcard .bar{height:5px;background:#eee9e0;border-radius:999px;margin-top:9px;overflow:hidden}
  .pcard .bar i{display:block;height:100%;background:var(--accent);border-radius:999px}
  .pcard .code{font-size:10.5px;color:var(--muted);margin-top:6px;letter-spacing:.3px}

  /* products + brands */
  h1{font-size:25px;font-weight:700;margin:0 0 4px;letter-spacing:-.3px}
  .sub{color:var(--muted);margin:0 0 20px;font-size:14px}
  .segmented{display:inline-flex;background:#eceae4;border-radius:11px;padding:3px;margin-bottom:16px;gap:2px}
  .segmented button{border:0;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);padding:7px 15px;border-radius:9px;cursor:pointer}
  .segmented button.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input{flex:1;min-width:240px;padding:11px 14px;border:1px solid var(--line);border-radius:11px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  .toolbar input:focus{outline:none;border-color:var(--accent)}
  .stat{font-size:13px;color:var(--muted);margin-left:auto}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .chip{padding:6px 13px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted)}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .cat-head{display:flex;align-items:baseline;gap:10px;margin:0 0 12px}
  .cat-head h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin:0;color:#56524b}
  .cat-head .n{color:var(--muted);font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:28px}
  .card{background:var(--card);border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px;cursor:pointer}
  .card .name{font-weight:600;font-size:15px;line-height:1.3}
  .card .meta{font-size:12px;color:var(--muted)}
  .pill{align-self:flex-start;margin-top:8px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
  .pill.shelf{color:var(--green-ink);background:var(--green-bg);border:1px solid var(--green-br)}
  .pill.pipe{color:var(--amber-ink);background:var(--amber-bg);border:1px solid var(--amber-br)}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(31,35,40,.35);opacity:0;pointer-events:none;transition:.18s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:var(--bg);box-shadow:-12px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:.22s;z-index:50;overflow-y:auto}
  .drawer.show{transform:none}
  .dh{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:18px 22px;z-index:2}
  .dh .x{position:absolute;top:16px;right:18px;border:0;background:#f1efe9;width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;color:var(--muted)}
  .dh .dn{font-size:18px;font-weight:700;padding-right:36px}
  .dh .db{font-size:13px;color:var(--muted);margin-top:3px}
  .dh .meta2{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px;font-size:11.5px}
  .tag{background:#f1efe9;color:#56524b;padding:3px 9px;border-radius:999px;font-weight:600}
  .dbody{padding:18px 22px}
  .stagebox{background:#fff;border:1px solid var(--line-soft);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .stagebox.cur{border-color:var(--accent);box-shadow:0 0 0 2px rgba(98,128,189,.12)}
  .sb-h{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;background:#fcfbf9}
  .sb-h .dot{width:9px;height:9px;border-radius:50%}
  .sb-h .lbl{font-weight:700;font-size:13.5px}
  .sb-h .dept{font-size:11px;color:var(--muted)}
  .sb-h .pct{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:600}
  .sb-body{padding:6px 14px 14px}
  .tg{border-top:1px dashed var(--line);padding:10px 0 4px}
  .tg:first-child{border-top:0}
  .tg .tgh{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
  .tg .tgh .fired{color:var(--green-ink);background:var(--green-bg);border:1px solid var(--green-br);padding:1px 7px;border-radius:999px;letter-spacing:.2px}
  .tg .tgh .pend{color:var(--amber-ink);background:var(--amber-bg);border:1px solid var(--amber-br);padding:1px 7px;border-radius:999px;letter-spacing:.2px}
  .task{display:flex;align-items:flex-start;gap:9px;padding:5px 0;font-size:13.5px}
  .task input{margin-top:2px;width:16px;height:16px;accent-color:var(--green-ink);cursor:pointer}
  .task.done label{color:var(--muted);text-decoration:line-through}
  .task .tbody{flex:1;min-width:0}
  .task-meta{font-size:11px;color:var(--muted);opacity:.9;margin-top:2px;line-height:1.45}
  .advance{width:100%;border:0;background:var(--accent);color:#fff;font-family:inherit;font-weight:700;font-size:14px;padding:13px;border-radius:11px;cursor:pointer;margin-top:6px}
  .advance:disabled{background:#d8d5cd;cursor:not-allowed}
  .advance.live{background:var(--green-ink)}
  .log{margin-top:18px;font-size:12px}
  .log h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 8px}
  .log .e{display:flex;gap:8px;padding:4px 0;color:#56524b}
  .log .e .t{color:var(--muted);white-space:nowrap}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:600;z-index:80;opacity:0;transition:.2s;box-shadow:var(--shadow)}
  .toast.show{opacity:1}
  .empty{color:var(--muted);padding:48px;text-align:center}
  /* gantt */
  .gantt{background:#fff;border:1px solid var(--line-soft);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .grow{display:grid;grid-template-columns:230px repeat(8,1fr) 86px;align-items:center;border-top:1px solid var(--line-soft)}
  .grow.head{background:#fcfbf9;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#56524b;border-top:0}
  .grow.head>div{padding:11px 6px;text-align:center}
  .grow.head>div.lbl{text-align:left;padding-left:12px}
  .grow:not(.head):hover{background:#fcfbf9}
  .gcell{height:26px;margin:6px 2px;border-radius:6px;background:#f0ede6}
  .gcell.cur{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.45) 0 6px,transparent 6px 12px);box-shadow:0 0 0 2px rgba(98,128,189,.18) inset}
  .glabel{padding:10px 12px;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .glabel small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-top:1px}
  .gmeta{padding:0 10px;text-align:right;font-size:11px;color:var(--muted);line-height:1.5}
  .gmeta .r{font-weight:700;color:var(--ink);font-size:12.5px}
  .gmeta .stall{color:#b4493b;font-weight:700}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:14px 2px 0;font-size:11.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  /* settings */
  .setbox{background:#fff;border:1px solid var(--line-soft);border-radius:14px;box-shadow:var(--shadow);padding:22px;max-width:660px}
  .sethint{font-size:12.5px;color:var(--muted);margin:0 0 16px;line-height:1.5}
  .setrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line-soft)}
  .setrow:first-of-type{border-top:0}
  .setrow label{flex:0 0 150px;font-weight:600;font-size:13.5px}
  .setrow input[type=email],.setrow input[type=number]{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13.5px;color:var(--ink)}
  .setrow input:focus{outline:none;border-color:var(--accent)}
  .savebtn{margin-top:16px;border:0;background:var(--accent);color:#fff;font-family:inherit;font-weight:700;font-size:14px;padding:11px 18px;border-radius:10px;cursor:pointer}

  /* ---------------- mobile ---------------- */
  @media(max-width:720px){
    /* top bar: brand + controls on row 1, tabs become a scrollable strip on row 2 */
    .top{flex-wrap:wrap;gap:8px 10px;padding:9px 12px}
    .top img.logo{height:20px}
    .top .title{display:none}                 /* redundant on mobile; tabs give context */
    .top .right{order:1;margin-left:auto;gap:8px;min-width:0}
    .top .toggle{font-size:11px;gap:5px}
    .top .addbtn{font-size:0;padding:9px 13px;white-space:nowrap}
    .top .addbtn::after{content:"＋ New";font-size:12.5px;font-weight:600}
    .top .tabs{order:2;flex-basis:100%;margin-left:0;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
    .top .tabs button{flex:0 0 auto;padding:7px 12px;font-size:13px}
    .top .tabs::-webkit-scrollbar{display:none}

    .wrap{padding:16px 13px 72px}
    h1{font-size:22px}

    /* board: near-full-width, swipe-one-at-a-time columns with snap */
    .board{gap:10px;padding-bottom:10px;scroll-snap-type:x proximity}
    .col{flex-basis:86vw;max-width:320px;max-height:none;scroll-snap-align:start}

    /* product/brand toolbar + search go full width */
    .toolbar{gap:9px}
    .toolbar input{flex-basis:100%;min-width:0;width:100%}
    .stat{margin-left:0}

    /* gantt scrolls horizontally instead of overflowing the page */
    .gantt{overflow-x:auto}
    .grow{min-width:680px}

    /* drawer fills the screen; tighter padding */
    .drawer{width:100vw}
    .dh,.dbody{padding-left:16px;padding-right:16px}

    /* settings rows stack label over input */
    .setbox{padding:18px}
    .setrow{flex-wrap:wrap;gap:6px}
    .setrow label{flex-basis:100%}
    .setrow input[type=email]{flex-basis:100%}
  }
</style>
</head>
<body>
<div class="top">
  <img class="logo" src="https://beneighborly.team/NeighborlyLogo.png" alt="Neighborly">
  <span class="title">Marketplace NPI</span>
  <div class="tabs">
    <button data-tab="pipeline" class="active">Pipeline</button>
    <button data-tab="gantt">Gantt</button>
    <button data-tab="products">Products</button>
    <button data-tab="brands">Brands</button>
    <button data-tab="process">Process</button>
    <button data-tab="settings">Settings</button>
  </div>
  <div class="right">
    <div class="toggle">Notify <span id="notifySwitch" class="switch on"></span></div>
    <button class="addbtn" id="addBtn">+ New product</button>
  </div>
</div>

<div class="wrap" id="view"></div>

<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
/* ---------------- config (same Neighborly project) ---------------- */
const firebaseConfig={apiKey:"AIzaSyAiHIQuw3eiyY305sDqc_CoV_MoEG9CQpw",authDomain:"neighborly-hub-53e4b.firebaseapp.com",databaseURL:"https://neighborly-hub-53e4b-default-rtdb.firebaseio.com",projectId:"neighborly-hub-53e4b",storageBucket:"neighborly-hub-53e4b.firebasestorage.app",messagingSenderId:"847761939455",appId:"1:847761939455:web:d0d5dbe1795bb4f05f25ca"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const EMAILJS={service:"service_v4jp7sp",template:"template_eyefcer",key:"pW4-kj71suA1OsbFa"};
try{ emailjs.init(EMAILJS.key); }catch(e){}

/* ---------------- process model ---------------- */
const STAGES=[
  {key:'discovery', label:'Discovery',     dept:'Marketplace', color:'#a9a6bd'},
  {key:'sample',    label:'Sample Review', dept:'Marketplace', color:'#cbb3d6'},
  {key:'commercial',label:'Commercial',    dept:'Procurement', color:'#6280bd'},
  {key:'compliance',label:'W-9',           dept:'Compliance',  color:'#b88fb8'},
  {key:'erp',       label:'ERP / Synergy', dept:'Inventory',   color:'#69b0a5'},
  {key:'commissary',label:'Commissary',    dept:'Commissary',  color:'#dbc6a2'},
  {key:'operations',label:'Operations',    dept:'Operations',  color:'#7bbd91'},
  {key:'marketing', label:'Marketing',     dept:'Marketing',   color:'#e87142'},
  {key:'store',     label:'Store Launch',  dept:'Store Ops',   color:'#eace49'},
  {key:'live',      label:'Live · On Shelf',dept:'—',          color:'#3f7a52'},
  {key:'review',    label:'30-Day Review', dept:'Marketplace', color:'#a9a6bd'}
];
const PIPE=STAGES.filter(s=>s.key!=='live'&&s.key!=='review'); // active board columns
const stageMeta=k=>STAGES.find(s=>s.key===k)||{label:k,dept:'—',color:'#ccc'};
const stageIdx=k=>STAGES.findIndex(s=>s.key===k);
const nextStageKey=k=>{const i=stageIdx(k);return i>=0&&i<STAGES.length-1?STAGES[i+1].key:null;};
function chunk3(arr){const o=[];for(let i=0;i<arr.length;i+=3)o.push(arr.slice(i,i+3));return o;}

/* Departments (drives Settings rows + new-product broadcast). Compliance owns
   the W-9 / vendor-docs stage — set its email in Settings. */
const DEPTS=['Marketplace','Procurement','Compliance','Inventory','Commissary','Operations','Marketing','Store Ops'];

/* Curated NPI checklist. New products are built from this (owner = who's
   accountable, def = definition of done that makes checking the box honest,
   notify/notifyMsg = optional cross-team ping, blocking:false = doesn't gate
   the stage). Existing launches keep whatever tasks they already have. */
const TASK_TEMPLATES=[
  /* Discovery — Marketplace */
  {stage:'discovery',dept:'Marketplace',label:'Product intake form completed',owner:'Marketplace Lead',def:'Intake form submitted with brand, product, category & contact captured'},
  {stage:'discovery',dept:'Marketplace',label:'Brand submitted & logged',owner:'Marketplace Lead',def:'Brand record created in the pipeline'},
  {stage:'discovery',dept:'Marketplace',label:'Samples requested from brand',owner:'Marketplace Lead',def:'Sample request sent to vendor with ship-to address'},
  {stage:'discovery',dept:'Marketplace',label:'Samples received',owner:'Marketplace Lead',def:'Physical samples in hand and logged'},
  /* Sample Review — Marketplace */
  {stage:'sample',dept:'Marketplace',label:'Tasting scheduled',owner:'Marketplace Lead',def:'Tasting date on the calendar with panel invited'},
  {stage:'sample',dept:'Marketplace',label:'Taste approved',owner:'Marketplace Lead',def:'Tasting panel signed off on product quality'},
  {stage:'sample',dept:'Marketplace',label:'Margin approved',owner:'Marketplace Lead',def:'Projected margin meets or exceeds threshold'},
  {stage:'sample',dept:'Marketplace',label:'Assortment approved',owner:'Marketplace Lead',def:'SKU list confirmed for the assortment'},
  {stage:'sample',dept:'Marketplace',label:'Asset: Product images received',owner:'Marketplace Lead',def:'Hi-res product images on file',blocking:false},
  {stage:'sample',dept:'Marketplace',label:'Asset: Brand logo received',owner:'Marketplace Lead',def:'Vector/hi-res logo on file',blocking:false},
  {stage:'sample',dept:'Marketplace',label:'Asset: Brand story received',owner:'Marketplace Lead',def:'Brand story copy on file',blocking:false,notify:'Marketing',notifyMsg:'Brand story received — available for Marketing to draft product copy.'},
  /* Commercial — Procurement */
  {stage:'commercial',dept:'Procurement',label:'Vendor setup started',owner:'Procurement Coordinator',def:'Vendor record opened in the system'},
  {stage:'commercial',dept:'Procurement',label:'Confirm MOQ & case pack',owner:'Procurement Coordinator',def:'Minimum order qty and units-per-case confirmed with vendor in writing'},
  {stage:'commercial',dept:'Procurement',label:'Confirm lead times & shelf life',owner:'Procurement Coordinator',def:'Production/ship lead time and shelf-life window documented'},
  {stage:'commercial',dept:'Procurement',label:'Terms finalized',owner:'Procurement Coordinator',def:'Payment & trade terms agreed and recorded'},
  {stage:'commercial',dept:'Procurement',label:'Cost sheet approved',owner:'Procurement Manager',def:'Landed cost sheet signed off by Procurement manager'},
  {stage:'commercial',dept:'Procurement',label:'Free first fill secured',owner:'Procurement Coordinator',def:'Free first-fill agreement on file from vendor',notify:'Commissary',notifyMsg:'Free first fill secured — Commissary can expect the initial fill shipment.'},
  {stage:'commercial',dept:'Procurement',label:'Collect + upload initial invoice',owner:'Procurement Coordinator',def:'First invoice received and uploaded'},
  {stage:'commercial',dept:'Procurement',label:'Commercial terms complete — ready for vendor docs',owner:'Procurement Coordinator',def:'All commercial terms above confirmed',notify:'Compliance',notifyMsg:'Commercial terms finalized — please collect W-9 + COI before vendor goes live in the systems.'},
  /* W-9 — Compliance (gates ERP/SKU creation) */
  {stage:'compliance',dept:'Compliance',label:'Collect + upload W-9',owner:'AP Clerk',def:'W-9 PDF on file; TIN matches legal vendor name'},
  {stage:'compliance',dept:'Compliance',label:'Collect + upload Insurance (COI)',owner:'AP Clerk',def:'COI on file naming Neighborly as additional insured; expiry after launch date'},
  {stage:'compliance',dept:'Compliance',label:'Nutrition panel on file',owner:'AP Clerk',def:'Nutrition facts panel uploaded'},
  {stage:'compliance',dept:'Compliance',label:'Ingredient statement on file',owner:'AP Clerk',def:'Full ingredient statement uploaded'},
  {stage:'compliance',dept:'Compliance',label:'Allergen information on file',owner:'AP Clerk',def:'Allergen declaration uploaded'},
  {stage:'compliance',dept:'Compliance',label:'Product spec sheet on file',owner:'AP Clerk',def:'Vendor product spec sheet uploaded'},
  {stage:'compliance',dept:'Compliance',label:'Vendor documents cleared — vendor active',owner:'AP Clerk',def:'All compliance docs on file; vendor flagged active',notify:'Inventory',notifyMsg:'Vendor documents cleared — safe to create the R365/Synergy item & SKU.'},
  /* ERP / Synergy — Inventory */
  {stage:'erp',dept:'Inventory',label:'Create R365 item',owner:'Synergy Admin',def:'Item created in R365 with correct UOM'},
  {stage:'erp',dept:'Inventory',label:'Create R365 recipe',owner:'Synergy Admin',def:'Recipe/build created in R365'},
  {stage:'erp',dept:'Inventory',label:'Add Item Category 1 = Marketplace Item',owner:'Synergy Admin',def:'Category 1 set to "Marketplace Item"'},

/* ---------------- state ---------------- */
let LAUNCHES={}, BRANDS={}, SETTINGS={}, TAB='pipeline', OPEN=null;
let prodStatus='all', prodCat='All', brandSearch='';
let NOTIFY=true;
const $=id=>document.getElementById(id);

db.ref('marketplace-npi').on('value',snap=>{
  const v=snap.val()||{}; LAUNCHES=v.launches||{}; BRANDS=v.brands||{}; SETTINGS=v.settings||{};
  render(); if(OPEN&&LAUNCHES[OPEN]) renderDrawer(OPEN);
});

/* ---------------- helpers ---------------- */
function tasksOf(l){return Array.isArray(l.tasks)?l.tasks:Object.values(l.tasks||{});}
function stageTasks(l,sk){return tasksOf(l).map((t,i)=>({t,i})).filter(x=>x.t.stage===sk);}
function readiness(l){const ts=tasksOf(l);if(!ts.length)return 0;return Math.round(100*ts.filter(t=>t.done).length/ts.length);}
function brandName(l){const b=BRANDS[l.brandId];return b?b.name:'';}
function recipientFor(dept){const te=(SETTINGS.teamEmails)||{};return te[dept]||SETTINGS.notifyEmailAddr||'Kallmeroth@beneighborly.com';}
function nowTs(){return new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

async function sendEmail(toEmail,team,launch,vars){
  if(!NOTIFY) return {skipped:true};
  try{
    await emailjs.send(EMAILJS.service,EMAILJS.template,Object.assign({
      to_email:toEmail,to_name:team+' team',team:team,
      launch:launch.name||'',brand:brandName(launch),stage:vars.stage||'',
      launch_date:launch.launchDate||'',readiness:readiness(launch)+'%',
      message:vars.message||'',link:'https://beneighborly.team/neighborly-marketplace.html',
      accent:'#6280bd'
    },vars));
    return {ok:true};
  }catch(e){ return {err:String(e)}; }
}

function renderProducts(){

  if(!cats.includes(prodCat))prodCat='All';
  $('view').innerHTML=`<h1>Products</h1><p class="sub">Every brand in the marketplace — on shelf and in the pipeline.</p>
    <div class="segmented" id="seg">
      <button data-s="all" class="${prodStatus==='all'?'active':''}">All</button>

function drawProducts(pool,LBL,q){
  q=(q||'').trim().toLowerCase();

  $('pcount').textContent=`${items.length} products · ${shelf} on shelf · ${items.length-shelf} in pipeline`;
  const byCat={}; items.forEach(p=>{(byCat[p.category]=byCat[p.category]||[]).push(p);});
  $('plist').innerHTML=items.length?Object.keys(byCat).sort().map(cat=>`
    <div class="cat-head"><h2>${esc(cat)}</h2><span class="n">${byCat[cat].length}</span></div>

/* ---------------- drawer ---------------- */
function openDrawer(id){OPEN=id;$('scrim').classList.add('show');$('drawer').classList.add('show');renderDrawer(id);}
function closeDrawer(){OPEN=null;$('scrim').classList.remove('show');$('drawer').classList.remove('show');}
$('scrim').onclick=closeDrawer;

function renderDrawer(id){
  const l=LAUNCHES[id]; if(!l)return;
  const fired=l.triggersFired||[];
  const curIdx=stageIdx(l.stage);
  const body=STAGES.filter(s=>s.key!=='live').map(s=>{
    const sts=stageTasks(l,s.key); if(!sts.length&&s.key!=='review'&&!sts.length) {}
    if(!sts.length) return '';
    const groups=chunk3(sts);
    const isCur=s.key===l.stage;
    const doneN=sts.filter(x=>x.t.done).length;
    const groupsHtml=groups.map((g,gi)=>{
      const gid=s.key+'#'+gi;
      const allDone=g.every(x=>x.t.done);
      return `<div class="tg"><div class="tgh">Trigger ${gi+1} <span class="${allDone?'fired':'pend'}">${allDone?'✓ fired':'pending'}</span></div>
        ${g.map(x=>{const t=x.t;const meta=[t.owner?`👤 ${esc(t.owner)}`:'',t.def?`✓ ${esc(t.def)}`:'',t.notify?`🔔 ${esc(t.notify)}`:''].filter(Boolean).join(' · ');return `<div class="task ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} data-id="${id}" data-ti="${x.i}"><div class="tbody"><label>${esc(t.label)}</label>${meta?`<div class="task-meta">${meta}</div>`:''}</div></div>`;}).join('')}</div>`;
    }).join('');
    return `<div class="stagebox ${isCur?'cur':''}"><div class="sb-h" data-stg="${s.key}">
        <span class="dot" style="background:${s.color}"></span>
        <div><div class="lbl">${esc(s.label)}</div><div class="dept">${esc(s.dept)}</div></div>
        <span class="pct">${doneN}/${sts.length}</span></div>
      <div class="sb-body" style="${isCur?'':'display:none'}">${groupsHtml}
        ${isCur?advanceBtn(l,s):''}</div></div>`;
  }).join('');
  const log=(Array.isArray(l.log)?l.log:Object.values(l.log||{})).slice().reverse().slice(0,8);
  $('drawer').innerHTML=`<div class="dh"><button class="x" onclick="window._close()">✕</button>
      <div class="dn">${esc(l.name||'')}</div><div class="db">${esc(brandName(l))} · ${esc(l.category||'')}</div>
      <div class="meta2"><span class="tag" style="background:${stageMeta(l.stage).color}22">${esc(stageMeta(l.stage).label)}</span>
        <span class="tag">${esc(l.code||'')}</span><span class="tag">${readiness(l)}% ready</span></div></div>
    <div class="dbody">${body||'<div class="empty">No tasks.</div>'}
      <div class="log"><h4>Activity</h4>${log.map(e=>`<div class="e"><span class="t">${esc(e.ts||'')}</span><span>${esc(e.text||'')}</span></div>`).join('')||'<div style="color:#9b988f">No activity yet.</div>'}</div></div>`;
  $('drawer').querySelectorAll('.sb-h').forEach(h=>h.onclick=()=>{const b=h.nextElementSibling;b.style.display=b.style.display==='none'?'':'none';});
  $('drawer').querySelectorAll('.task input').forEach(c=>c.onchange=()=>toggleTask(c.dataset.id,+c.dataset.ti,c.checked));
}

function advanceBtn(l,s){
  const sts=stageTasks(l,s.key);
  // only "blocking" tasks gate the handoff; nice-to-haves (blocking:false) don't.
  // existing launches have no blocking field, so they still require every task.
  const done=sts.every(x=>x.t.done||x.t.blocking===false);
  const nxt=nextStageKey(s.key);
  const nxtMeta=nxt?stageMeta(nxt):null;
  if(s.key==='store'){ return `<button class="advance live" ${done?'':'disabled'} onclick="window._advance('${l.id}')">${done?'✓ Mark LIVE on shelf':'Complete required tasks to go live'}</button>`; }
  if(!nxt) return '';
  return `<button class="advance" ${done?'':'disabled'} onclick="window._advance('${l.id}')">${done?'Push to '+esc(nxtMeta.dept)+' →':'Complete required tasks to advance'}</button>`;
}

/* ---------------- actions ---------------- */
async function toggleTask(id,ti,checked){
  const l=LAUNCHES[id]; if(!l)return;
  const ts=tasksOf(l).map(t=>Object.assign({},t));
  ts[ti].done=checked; ts[ti].doneAt=checked?Date.now():null;
  // per-task cross-team ping — fires the instant a task with a notify target is checked
  if(checked && ts[ti].notify){ const nd=stageMeta(ts[ti].stage); sendEmail(recipientFor(ts[ti].notify),ts[ti].notify,l,{stage:nd.label,message:ts[ti].notifyMsg||`${ts[ti].label} completed for ${l.name}.`}); }
  // detect trigger-group completion to fire notification
  const sk=ts[ti].stage;
  const sts=ts.map((t,i)=>({t,i})).filter(x=>x.t.stage===sk);
  const groups=chunk3(sts); const gi=groups.findIndex(g=>g.some(x=>x.i===ti));
  const grp=groups[gi]; const gid=sk+'#'+gi;
  let fired=(l.triggersFired||[]).slice();
  const upd={['marketplace-npi/launches/'+id+'/tasks']:ts};
  let logEntry=null;
  if(grp&&grp.every(x=>x.t.done)&&!fired.includes(gid)){
    fired.push(gid); upd['marketplace-npi/launches/'+id+'/triggersFired']=fired;
    const sm=stageMeta(sk);
    logEntry={text:`✓ Trigger fired — ${sm.label} · step ${gi+1} complete`,ts:nowTs()};
    sendEmail(recipientFor(sm.dept),sm.dept,l,{stage:sm.label,message:`Trigger complete: ${sm.label} step ${gi+1} (${grp.map(x=>x.t.label).join(', ')}).`});
  }
  if(logEntry){const log=(Array.isArray(l.log)?l.log:Object.values(l.log||{})).slice();log.push(logEntry);upd['marketplace-npi/launches/'+id+'/log']=log;}
  await db.ref().update(upd);
  if(logEntry) toast('Trigger fired · '+stageMeta(sk).label+' step '+(gi+1));
}

async function _advance(id){
  const l=LAUNCHES[id]; if(!l)return;
  const cur=l.stage, nxt=nextStageKey(cur); if(!nxt)return;
  const sm=stageMeta(cur), nm=stageMeta(nxt);
  const log=(Array.isArray(l.log)?l.log:Object.values(l.log||{})).slice();
  if(nxt==='live'){
    log.push({text:'🎉 LIVE on shelf',ts:nowTs()});
    await db.ref().update({['marketplace-npi/launches/'+id+'/stage']:'live',['marketplace-npi/launches/'+id+'/log']:log,['marketplace-npi/launches/'+id+'/liveDate']:Date.now()});
    toast(l.name+' is LIVE on shelf 🎉'); return;
  }
  log.push({text:`Stage → ${nm.label} · ${nm.dept} notified`,ts:nowTs()});
  await db.ref().update({['marketplace-npi/launches/'+id+'/stage']:nxt,['marketplace-npi/launches/'+id+'/stageEnteredAt']:Date.now(),['marketplace-npi/launches/'+id+'/log']:log});
  const r=await sendEmail(recipientFor(nm.dept),nm.dept,l,{stage:nm.label,message:`${l.name} (${brandName(l)}) has advanced to ${nm.label}. Your team is up — open the pipeline to start your tasks.`});
  toast(r.ok?('Pushed to '+nm.dept+' · email sent'):('Pushed to '+nm.dept+(NOTIFY?' · email failed':' · notify off')));
}
window._advance=_advance;

async function addProduct(){
  const name=prompt('Product / item name?'); if(!name)return;
  const brand=prompt('Brand?')||'Unknown';
  const cat=prompt('Category?')||'Uncategorized';
  // reuse brand if exists
  let brandId=Object.keys(BRANDS).find(id=>(BRANDS[id].name||'').toLowerCase()===brand.trim().toLowerCase());
  const uid=p=>p+Math.random().toString(36).slice(2,11);
  const now=Date.now();
  const upd={};
  if(!brandId){brandId=uid('b');upd['marketplace-npi/brands/'+brandId]={id:brandId,name:brand,category:cat,status:'Proposed',source:'Added in app',createdAt:now,distributor:'',contact:'',email:'',website:'',notes:''};}
  // build the full curated checklist (owners + definitions-of-done) for the new product
  const tmpl=buildTasks();
  let maxCode=0;Object.values(LAUNCHES).forEach(l=>{const m=/(\d+)\s*$/.exec(l.code||'');if(m)maxCode=Math.max(maxCode,+m[1]);});
  const id=uid('l');
  upd['marketplace-npi/launches/'+id]={id,brandId,name,code:'NPI-2026-'+String(maxCode+1).padStart(3,'0'),category:cat,cost:'',msrp:'',casePack:'',launchDate:'',priority:'Med',stage:'discovery',stageEnteredAt:now,createdAt:now,triggersFired:[],log:[{text:'🚀 New product added — process started',ts:nowTs()}],tasks:tmpl};
  await db.ref().update(upd);
  // Trigger #0 — broadcast "new product added" to every team (kickoff announcement,
  // no task assignment; each team is pinged for real when its stage goes active)
  if(NOTIFY){
    const nl=upd['marketplace-npi/launches/'+id];
    const msg=`🚀 New product added — ${name} (${brand}). The launch process has officially begun. Each team will be notified automatically when it's your turn — nothing to do yet. Follow progress on the NPI pipeline.`;
    DEPTS.forEach(d=>sendEmail(recipientFor(d),d,nl,{stage:'Discovery',message:msg}));
  }
  toast('Added '+name);
  openDrawer(id);
}

/* ---------------- gantt tab ---------------- */
function renderGantt(){
  const inproc=Object.values(LAUNCHES).filter(l=>l.stage!=='live'&&l.stage!=='review')
    .sort((a,b)=>stageIdx(b.stage)-stageIdx(a.stage)||(a.name||'').localeCompare(b.name||''));
  const stale=SETTINGS.staleDays||3;
  const head=`<div class="grow head"><div class="lbl">Product</div>${PIPE.map(s=>`<div>${esc(s.label.split(' ')[0])}</div>`).join('')}<div>Ready</div></div>`;
  const rows=inproc.map(l=>{
    const ci=stageIdx(l.stage);
    const cells=PIPE.map((s,i)=>{
      let cls='gcell',style='';
      if(i<ci){cls+=' done';style=`background:${s.color}`;}
      else if(i===ci){cls+=' cur';style=`background:${s.color}`;}
      return `<div class="${cls}" style="${style}" title="${esc(s.label)}"></div>`;
    }).join('');
    const days=l.stageEnteredAt?Math.floor((Date.now()-l.stageEnteredAt)/86400000):0;
    const stall=days>stale;
    return `<div class="grow" data-id="${l.id}" style="cursor:pointer"><div class="glabel">${esc(l.name||'')}<small>${esc(brandName(l))} · ${esc(l.code||'')}</small></div>${cells}<div class="gmeta"><span class="r">${readiness(l)}%</span><br><span class="${stall?'stall':''}">${days}d</span></div></div>`;
  }).join('');
  $('view').innerHTML=`<h1>Pipeline Gantt</h1><p class="sub">${inproc.length} products in process · stage-by-stage progress. Filled = stage complete · striped = in progress now.</p>
    <div class="gantt">${head}${rows||'<div class="empty">No products in process.</div>'}</div>
    <div class="legend">${PIPE.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.label)}</span>`).join('')}</div>`;
  document.querySelectorAll('.gantt .grow[data-id]').forEach(r=>r.onclick=()=>openDrawer(r.dataset.id));
}

/* ---------------- settings tab (edit notification emails here) ---------------- */
function renderSettings(){
  const depts=DEPTS;
  const te=SETTINGS.teamEmails||{};
  $('view').innerHTML=`<h1>Settings</h1><p class="sub">Notification routing & pipeline rules.</p>
    <div class="setbox">
      <p class="sethint">When a product is pushed to a department (or a trigger fires), the handoff email is sent to that department's address below. One EmailJS template powers them all — only the recipient and message change.</p>
      ${depts.map(d=>`<div class="setrow"><label>${esc(d)}</label><input type="email" data-dept="${esc(d)}" value="${esc(te[d]||'')}" placeholder="name@beneighborly.com"></div>`).join('')}
      <div class="setrow"><label>Stalled after</label><input type="number" id="staleInp" min="1" value="${SETTINGS.staleDays||3}" style="flex:0 0 90px"> <span style="color:var(--muted);font-size:13px">business days in a stage flags it as stalled</span></div>
      <button class="savebtn" id="saveSet">Save settings</button>
    </div>
    <div class="setbox" style="margin-top:18px">
      <p class="sethint" style="margin-bottom:10px"><b>Back-fill existing products</b> — give the products you already imported the new checklist (owners &amp; definitions-of-done) and the W-9 stage. Every completed task is preserved; nothing is deleted. Safe to run more than once.</p>
      <button class="savebtn" id="backfillBtn" style="background:#6a5a86">Back-fill existing products</button>
    </div>`;
  $('saveSet').onclick=async()=>{
    const te2={}; document.querySelectorAll('input[data-dept]').forEach(i=>{const v=i.value.trim(); if(v) te2[i.dataset.dept]=v;});
    await db.ref('marketplace-npi/settings').update({teamEmails:te2, staleDays:+($('staleInp').value)||3});
    toast('Settings saved');
  };
  $('backfillBtn').onclick=backfillTasks;
}

/* One-time migration: bring already-imported launches up to the v2 checklist.
   Conservative + idempotent — matches tasks by (stage,label), enriches matches
   with owner/def/notify/blocking, ADDS any missing template tasks (incl. the
   whole W-9 stage), and never removes a task or clears a completion. */
async function backfillTasks(){
  const launches=Object.values(LAUNCHES);
  if(!launches.length){ toast('No products to back-fill.'); return; }
  const upd={}; let patched=0, added=0, touched=0;
  launches.forEach(l=>{
    const cur=tasksOf(l).map(t=>Object.assign({},t)); let changed=false;
    cur.forEach(t=>{
      const tpl=TASK_TEMPLATES.find(x=>x.stage===t.stage&&x.label===t.label); if(!tpl) return;
      const before=JSON.stringify([t.owner,t.def,t.notify,t.notifyMsg,t.blocking]);
      t.owner=t.owner||tpl.owner||''; t.def=t.def||tpl.def||'';
      t.notify=t.notify||tpl.notify||''; t.notifyMsg=t.notifyMsg||tpl.notifyMsg||'';
      if(t.blocking===undefined) t.blocking=tpl.blocking!==false;
      if(JSON.stringify([t.owner,t.def,t.notify,t.notifyMsg,t.blocking])!==before){ changed=true; patched++; }
    });
    TASK_TEMPLATES.forEach(tpl=>{
      if(cur.some(t=>t.stage===tpl.stage&&t.label===tpl.label)) return;
      cur.push({stage:tpl.stage,dept:tpl.dept,label:tpl.label,owner:tpl.owner||'',def:tpl.def||'',notify:tpl.notify||'',notifyMsg:tpl.notifyMsg||'',blocking:tpl.blocking!==false,done:false,doneAt:null});
      changed=true; added++;
    });
    if(changed){ upd['marketplace-npi/launches/'+l.id+'/tasks']=cur; touched++; }
  });
  if(!touched){ toast('Already up to date — nothing to back-fill.'); return; }
  if(!confirm(`Back-fill ${touched} product(s)?\n\n• ${patched} existing task(s) enriched with owner / definition-of-done\n• ${added} task(s) added (including the W-9 stage)\n\nEvery completed task is preserved. Safe to re-run.`)) return;
  await db.ref().update(upd);
  toast(`✓ Back-fill done · ${touched} products · ${patched} enriched · ${added} added`);
}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
