<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Marketplace NPI — Neighborly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="chrome-v2.js" defer></script>
<script>
  // Aggressively clear any leftover service-worker + cache entries from
  // older deployments. Without this, an SW registered before we ever
  // shipped one can keep serving stale chrome.js / HTML for a long time.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (r) { r.unregister(); });
    }).catch(function () {});
  }
  if (window.caches && caches.keys) {
    caches.keys().then(function (keys) {
      keys.forEach(function (k) { caches.delete(k); });
    }).catch(function () {});
  }
</script>
<style>
  :root{
    --bg:#f7f6f3; --card:#fff; --ink:#1f2328; --muted:#6b7178;
    --line:rgba(31,35,40,.08); --line-soft:rgba(31,35,40,.06);
    --accent:#6280bd; --radius:14px; --shadow:0 1px 2px rgba(31,35,40,.04),0 8px 24px rgba(31,35,40,.05);
    --green-ink:#3f7a52; --green-bg:#e9f4ee; --green-br:#cfe9da;
    --amber-ink:#9a6a16; --amber-bg:#fbf2e2; --amber-br:#efe0c2;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  /* top bar — adopts the hub's shared .np-nav look (theme.css), standalone (no hub launcher) */
  .np-nav{z-index:30}                          /* keep the drawer/scrim (z40-50) above the nav */
  .np-nav-brand{cursor:default}
  .np-nav-brand img{height:24px}
  .np-nav .np-tab{font-size:14px;padding:7px 13px}
  .np-nav-right{gap:10px}
  .addbtn{border:0;background:var(--ink);color:#fff;font-family:inherit;font-weight:600;font-size:13px;padding:9px 14px;border-radius:10px;cursor:pointer}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
  .switch{position:relative;width:36px;height:20px;background:#d8d5cd;border-radius:999px;cursor:pointer;transition:.15s}
  .switch.on{background:var(--green-ink)}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.15s}
  .switch.on::after{left:18px}
  .wrap{max-width:1280px;margin:0 auto;padding:24px 22px 80px}

  /* pipeline board */
  /* pipeline — horizontal swim-lanes (one row per stage) */
  .lanes{display:flex;flex-direction:column;gap:12px}
  .lane{display:flex;align-items:stretch;background:#efece5;border-radius:14px;overflow:hidden}
  .lane-head{flex:0 0 165px;display:flex;flex-direction:column;justify-content:flex-start;gap:5px;padding:14px;border-right:1px solid var(--line-soft)}
  .lane-head .lh-top{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;line-height:1.2}
  .lane-head .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .lane-head .cnt{color:var(--muted);font-weight:600;font-size:11px}
  .lane-list{flex:1;min-width:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));align-content:start;gap:9px;padding:10px}
  .lane-empty{align-self:center;color:#9b988f;font-size:12px;padding:0 6px}
  .pcard{background:#fff;border:1px solid var(--line-soft);border-radius:11px;padding:11px 12px;box-shadow:var(--shadow);cursor:pointer}
  .pcard:hover{border-color:var(--accent)}
  .pcard .pn{font-weight:600;font-size:13.5px;line-height:1.25}
  .pcard .pb{font-size:11.5px;color:var(--muted);margin-top:2px}
  .pcard .bar{height:5px;background:#eee9e0;border-radius:999px;margin-top:9px;overflow:hidden}
  .pcard .bar i{display:block;height:100%;background:var(--accent);border-radius:999px}
  .pcard .code{font-size:10.5px;color:var(--muted);margin-top:6px;letter-spacing:.3px}
  /* CPG vs Private Label badge — visible on every pipeline card + drawer
     header so the launch type reads at a glance. Filterable via the
     toggle at the top of the pipeline view. */
  .type-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:999px;line-height:1.4;margin-top:6px}
  .type-badge.cpg{background:#eaeef8;color:#2d4480}
  .type-badge.pl{background:#f0eff5;color:#4a4760}
  .pcard .type-badge{margin-top:6px}
  /* Type filter toggle above the lanes */
  .pipe-filter{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .pipe-filter-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-right:2px}
  .pipe-filter button{background:#fff;border:1px solid var(--line);color:var(--ink);font-family:inherit;font-weight:600;font-size:12px;padding:5px 11px;border-radius:999px;cursor:pointer;transition:.12s}
  .pipe-filter button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pipe-filter button:hover:not(.on){border-color:var(--line-bold,#c8c5bd)}

  /* products + brands */
  h1{font-size:25px;font-weight:700;margin:0 0 4px;letter-spacing:-.3px}
  .sub{color:var(--muted);margin:0 0 20px;font-size:14px}
  .segmented{display:inline-flex;background:#eceae4;border-radius:11px;padding:3px;margin-bottom:16px;gap:2px}
  .segmented button{border:0;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);padding:7px 15px;border-radius:9px;cursor:pointer}
  .segmented button.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input{flex:1;min-width:240px;padding:11px 14px;border:1px solid var(--line);border-radius:11px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  .toolbar input:focus{outline:none;border-color:var(--accent)}
  .stat{font-size:13px;color:var(--muted);margin-left:auto}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .chip{padding:6px 13px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted)}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .cat-head{display:flex;align-items:baseline;gap:10px;margin:0 0 12px}
  .cat-head h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin:0;color:#56524b}
  .cat-head .n{color:var(--muted);font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:28px}
  .card{background:var(--card);border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px;cursor:pointer}
  .card .name{font-weight:600;font-size:15px;line-height:1.3}
  .card .meta{font-size:12px;color:var(--muted)}
  .pill{align-self:flex-start;margin-top:8px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
  .pill.shelf{color:var(--green-ink);background:var(--green-bg);border:1px solid var(--green-br)}
  .pill.pipe{color:var(--amber-ink);background:var(--amber-bg);border:1px solid var(--amber-br)}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(31,35,40,.35);opacity:0;pointer-events:none;transition:.18s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:var(--bg);box-shadow:-12px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:.22s;z-index:50;overflow-y:auto}
  .drawer.show{transform:none}
  .dh{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:18px 22px;z-index:2}
  .dh .x{position:absolute;top:16px;right:18px;border:0;background:#f1efe9;width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;color:var(--muted)}
  .dh .dn{font-size:18px;font-weight:700;padding-right:36px}
  .dh .db{font-size:13px;color:var(--muted);margin-top:3px}
  .dh .meta2{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px;font-size:11.5px}
  .tag{background:#f1efe9;color:#56524b;padding:3px 9px;border-radius:999px;font-weight:600}
  .dbody{padding:18px 22px}
  .stagebox{background:#fff;border:1px solid var(--line-soft);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .stagebox.cur{border-color:var(--accent);box-shadow:0 0 0 2px rgba(98,128,189,.12)}
  .sb-h{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;background:#fcfbf9}
  .sb-h .dot{width:9px;height:9px;border-radius:50%}
  .sb-h .lbl{font-weight:700;font-size:13.5px}
  .sb-h .dept{font-size:11px;color:var(--muted)}
  .sb-h .pct{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:600}
  .sb-body{padding:6px 14px 14px}
  .cta{background:var(--green-bg);border:1px solid var(--green-br);color:#2f5d3f;font-size:13px;line-height:1.45;padding:10px 12px;border-radius:10px;margin:2px 0 12px}
  .cta b{color:#234a31}
  /* named mini-steps (one focused batch at a time) */
  .ministep{border:1px solid var(--line-soft);border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
  .ministep.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(98,128,189,.10)}
  .ministep.done{opacity:.7}
  .ministep.upcoming{opacity:.62}
  .ms-h{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;background:#fcfbf9;user-select:none}
  .ministep.active .ms-h{color:var(--accent)}
  .ms-ic{width:15px;text-align:center;flex:0 0 auto;color:var(--muted)}
  .ministep.done .ms-ic{color:var(--green-ink)}
  .ms-c{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted)}
  .ms-body{padding:4px 12px 10px}
  .opt{font-size:9.5px;font-weight:700;color:var(--muted);background:#f1efe9;padding:1px 6px;border-radius:999px;margin-left:6px;text-transform:uppercase;letter-spacing:.3px}
  .tg{border-top:1px dashed var(--line);padding:10px 0 4px}
  .tg:first-child{border-top:0}
  .tg .tgh{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
  .tg .tgh .fired{color:var(--green-ink);background:var(--green-bg);border:1px solid var(--green-br);padding:1px 7px;border-radius:999px;letter-spacing:.2px}
  .tg .tgh .pend{color:var(--amber-ink);background:var(--amber-bg);border:1px solid var(--amber-br);padding:1px 7px;border-radius:999px;letter-spacing:.2px}
  .task{display:flex;align-items:flex-start;gap:9px;padding:5px 0;font-size:13.5px}
  .task input{margin-top:2px;width:16px;height:16px;accent-color:var(--green-ink);cursor:pointer}
  .task.done label{color:var(--muted);text-decoration:line-through}
  .task .tbody{flex:1;min-width:0}
  .task-meta{font-size:11px;color:var(--muted);opacity:.9;margin-top:2px;line-height:1.45}
  .task-file{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px}
  .file-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--accent);border:1px dashed var(--line);border-radius:7px;padding:3px 9px;cursor:pointer}
  .file-btn:hover{border-color:var(--accent);background:rgba(98,128,189,.06)}
  .file-link{display:inline-flex;align-items:center;gap:4px;max-width:100%;font-size:11.5px;font-weight:600;color:var(--accent);text-decoration:none;background:rgba(98,128,189,.08);border-radius:7px;padding:3px 9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-link:hover{text-decoration:underline}
  .advance{width:100%;border:0;background:var(--accent);color:#fff;font-family:inherit;font-weight:700;font-size:14px;padding:13px;border-radius:11px;cursor:pointer;margin-top:6px}
  .advance:disabled{background:#d8d5cd;cursor:not-allowed}
  .advance.live{background:var(--green-ink)}
  .log{margin-top:18px;font-size:12px}
  .log h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 8px}
  .log .e{display:flex;gap:8px;padding:4px 0;color:#56524b}
  .log .e .t{color:var(--muted);white-space:nowrap}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:600;z-index:80;opacity:0;transition:.2s;box-shadow:var(--shadow)}
  .toast.show{opacity:1}
  .empty{color:var(--muted);padding:48px;text-align:center}

  /* ===== Product Info & Documents cards inside the drawer ===== */
  .info-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .info-card .ic-h{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}
  .info-card .ic-h h4{margin:0;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
  .info-card .ic-h .ic-c{font-size:11px;color:var(--muted);font-weight:600}
  .info-card .ic-h .ic-x{font-size:13px;color:var(--muted);transition:transform .15s}
  .info-card.collapsed .ic-x{transform:rotate(-90deg)}
  .info-card .ic-b{margin-top:12px}
  .info-card.collapsed .ic-b{display:none}
  /* Info cells: scannable key/value pairs laid out as a responsive grid.
     Empty fields are dropped entirely by renderProductInfo so this grid
     never shows '—' placeholder rows; tracks fit whatever fields are
     actually captured. align-items:start keeps rows from stretching to
     the tallest cell, and explicit display:block on inner spans makes
     the label stay above the value instead of being pushed by flex
     justification rules in some browsers. */
  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px 22px;align-items:start}
  @media (max-width:520px){ .info-grid{grid-template-columns:1fr;gap:10px 0} }
  .info-cell{min-width:0;line-height:1.35}
  .info-cell .k{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
  .info-cell .v{display:block;font-size:14px;font-weight:500;color:var(--ink);word-break:break-word}
  .info-cell .v a{color:var(--accent);text-decoration:none;font-weight:500}
  .info-cell .v a:hover{text-decoration:underline}
  /* Sub-section heading inside an info-card. Adds a hairline rule above
     so each cluster of related fields visually separates. */
  .info-sub{display:flex;align-items:center;gap:8px;margin:16px 0 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .info-sub::after{content:'';flex:1;height:1px;background:var(--line-soft)}
  .info-sub:first-child{margin-top:2px}
  .info-notes{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);font-size:13px;color:var(--ink);line-height:1.55}
  .info-notes .k{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}

  .doc-list{display:flex;flex-direction:column;gap:6px}
  .doc-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#fbfaf7;border:1px solid var(--line-soft);border-radius:10px}
  .doc-row .doc-ico{flex:0 0 auto;width:30px;height:30px;border-radius:8px;background:rgba(98,128,189,.10);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px}
  .doc-row .doc-meta{flex:1;min-width:0;overflow:hidden}
  .doc-row .doc-name{font-size:12.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .doc-row .doc-task{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .doc-row .doc-actions{display:flex;gap:6px;flex:0 0 auto}
  .doc-row .doc-btn{font-family:inherit;font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
  .doc-row .doc-btn:hover{border-color:var(--accent);color:var(--accent)}
  .doc-row .doc-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .doc-row .doc-btn.primary:hover{filter:brightness(0.94);color:#fff}
  .doc-empty{font-size:12px;color:var(--muted);font-style:italic;padding:6px 4px}

  /* ===== Inline document preview overlay (PDFs in an iframe, images
     inline, anything else falls back to an "Open in new tab" link). */
  .preview-overlay{position:fixed;inset:0;background:rgba(31,35,40,.78);opacity:0;pointer-events:none;transition:.18s;z-index:70;display:flex;align-items:center;justify-content:center;padding:24px}
  .preview-overlay.show{opacity:1;pointer-events:auto}
  .preview-sheet{background:#fff;border-radius:14px;width:min(960px,100%);height:min(86vh,820px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.30)}
  .preview-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);background:#fbfaf7}
  .preview-head .ph-name{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .preview-head .ph-task{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:6px}
  .preview-head a.ph-open{font-size:11.5px;font-weight:600;color:var(--accent);text-decoration:none;padding:5px 10px;border:1px solid var(--line);border-radius:8px}
  .preview-head a.ph-open:hover{border-color:var(--accent)}
  .preview-head .ph-x{border:0;background:#f1efe9;width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;color:var(--muted)}
  .preview-body{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:#1f2328;overflow:auto}
  .preview-body iframe{width:100%;height:100%;border:0;background:#fff}
  .preview-body img{max-width:100%;max-height:100%;display:block;object-fit:contain}
  .preview-body .preview-fallback{color:#fff;font-size:13px;text-align:center;padding:32px 24px;line-height:1.5}
  .preview-body .preview-fallback a{color:#fff;text-decoration:underline}

  /* ===== Per-task value inputs (sample tracking link, free first fill
     case pack qty, etc.) — siblings to the existing file-upload row.
     Renders below the task label/meta when a task template declares
     an `inputs:[{key,label,type,placeholder}]` array. Values persist
     on the task itself (task.values[key]) and write straight to
     Firebase on blur via saveTaskValue. */
  .task-inputs{display:flex;flex-direction:column;gap:6px;margin-top:8px;padding:8px 10px;background:#fbfaf7;border:1px solid var(--line-soft);border-radius:9px}
  .task-input{display:flex;align-items:center;gap:8px;font-size:11.5px;position:relative}
  .task-input label{flex:0 0 130px;color:var(--muted);font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:5px}
  .task-input label .ti-ico{font-size:11px;opacity:.7}
  .task-input input{flex:1;min-width:0;font-family:inherit;font-size:12.5px;padding:6px 30px 6px 11px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);outline:none;transition:border-color .12s;text-overflow:ellipsis}
  .task-input input:focus{border-color:var(--accent)}
  .task-input input[type=url].has-value{background:rgba(98,128,189,.05)}
  /* Brief "✓ saved" badge that fades in after a successful blur-save. */
  .task-input .ti-saved{position:absolute;right:10px;font-size:10px;font-weight:700;color:var(--green-ink);opacity:0;pointer-events:none;transition:opacity .15s}
  .task-input.saved .ti-saved{opacity:1}
  @media (max-width:520px){
    .task-input{flex-direction:column;align-items:stretch;gap:3px}
    .task-input label{flex:0 0 auto}
    .task-input input{padding-right:11px}
    .task-input .ti-saved{position:static;align-self:flex-end;margin-top:2px}
  }

  /* ===== Intake form modal — slides in like the drawer but opens
     for the "+ New product" button instead of an existing record.
     Captures the full Brand Info + Product Info up front so every
     downstream step (procurement handoff, compliance, etc.) can
     pull from one source. */
  .intake{position:fixed;top:0;right:0;height:100%;width:min(620px,96vw);background:var(--bg);box-shadow:-12px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:.22s;z-index:55;overflow-y:auto;display:flex;flex-direction:column}
  .intake.show{transform:none}
  .intake .ih{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:18px 24px;z-index:2}

        <div class="intake-field"><label for="iFounderName">Founder Name</label><input id="iFounderName" name="founderName" type="text"></div>

        <div class="intake-field wide"><label for="iWebsite">Website</label><input id="iWebsite" name="website" type="url" placeholder="https://"></div>
      </div>
    </div>

    <div class="intake-group">
      <h4>Product Info</h4>
      <div class="intake-grid">
        <div class="intake-field"><label for="iSku">SKU Name <span class="req">*</span></label><input id="iSku" name="sku" type="text" required></div>
        <div class="intake-field"><label for="iCategory">Category</label><input id="iCategory" name="category" type="text" placeholder="e.g. Pantry, Snacks"></div>

        <div class="intake-field"><label for="iCasePack">Case Pack</label><input id="iCasePack" name="casePack" type="text" placeholder="units / case"></div>

        <div class="intake-field"><label for="iCost">Wholesale Cost</label><input id="iCost" name="cost" type="text" placeholder="$"></div>
        <div class="intake-field"><label for="iMsrp">MSRP</label><input id="iMsrp" name="msrp" type="text" placeholder="$"></div>
        <div class="intake-field"><label for="iMoq">MOQ</label><input id="iMoq" name="moq" type="text" placeholder="minimum order qty"></div>

/* Pick the right template per product type so CPG and Private Label run
   different checklists end-to-end (different vendor model = different
   work). Stages are the same so the pipeline view, Gantt, and handoff
   logic all keep working unchanged. */
function buildTasks(type){
  const src=(type==='Private Label')?PL_TASK_TEMPLATES:TASK_TEMPLATES;
  return src.map(t=>({stage:t.stage,dept:t.dept,label:t.label,owner:t.owner||'',def:t.def||'',notify:t.notify||'',notifyMsg:t.notifyMsg||'',blocking:t.blocking!==false,file:t.file===true,inputs:Array.isArray(t.inputs)?t.inputs:[],values:{},done:false,doneAt:null}));
}

/* Look up the live template that matches a saved task and return its
   inputs[] array. Used by the drawer to render new capture fields
   (tracking link, free-fill case packs, landed cost, etc.) on
   launches that were created before those fields existed — no
   back-fill required. */
function templateInputsFor(launch,task){
  if(!task) return [];
  const src=(launch&&launch.type==='Private Label')?PL_TASK_TEMPLATES:TASK_TEMPLATES;
  const tpl=src.find(x=>x.stage===task.stage&&x.label===task.label);
  return (tpl&&Array.isArray(tpl.inputs))?tpl.inputs:[];
}

/* Named mini-steps per stage: small, purposeful batches so a team member only
   ever focuses on a short list. [label, taskCount] in template order. */
const STAGE_GROUPS={
  discovery:[['Intake',2],['Samples',2]],
  sample:[['Tasting',2],['Approvals',2],['Brand assets',3]],
  commercial:[['Vendor setup',3],['Terms & cost',3],['Docs & handoff',2]],
  compliance:[['Vendor docs (W-9 & COI)',2],['Product docs',4],['Clear vendor',1]],
  erp:[['Create item',3],['Order guides',3],['Toast link',1]],
  commissary:[['Intake & storage',3],['PARs & fill',3],['Receiving SOP',1]],
  operations:[['Planogram & order',3],['Tags & PARs',2],['Comms & training',2]],
  marketing:[['Creative',3],['Systems',3],['Promotion',2]],
  store:[['Order & receive',3],['Merchandise',3],['Launch day',2]],
  review:[['Performance',4],['Quality & vendor',3],['Decision',1]]
};
/* Split a stage's task list (array of {t,i} in order) into its named mini-steps.
   Any leftover tasks (e.g. on older launches) fall into a final "More" batch. */
function splitGroups(stageKey,sts){
  const defs=STAGE_GROUPS[stageKey]||[['Checklist',sts.length]];
  const out=[]; let idx=0;
  defs.forEach(([name,cnt])=>{ if(idx>=sts.length) return; out.push({name,items:sts.slice(idx,idx+cnt)}); idx+=cnt; });
  if(idx<sts.length) out.push({name:'More',items:sts.slice(idx)});
  return out.filter(g=>g.items.length);
}
const groupDone=g=>g.items.every(x=>x.t.done||x.t.blocking===false);

function tasksOf(l){return Array.isArray(l.tasks)?l.tasks:Object.values(l.tasks||{});}
function stageTasks(l,sk){return tasksOf(l).map((t,i)=>({t,i})).filter(x=>x.t.stage===sk);}
function readiness(l){const ts=tasksOf(l);if(!ts.length)return 0;return Math.round(100*ts.filter(t=>t.done).length/ts.length);}

const HUB_URL='https://beneighborly.team/neighborly-marketplace.html';
/* Build a "Procurement handoff package" snippet using the captured Product
   Info from intake + a suggested launch date 3 weeks from now. Called by
   actionMessage() when the next stage is Procurement so the email arrives
   pre-populated with everything procurement needs to act. */
function procurementHandoff(launch){
  const lines=[];
  lines.push(`📦 Procurement handoff for ${launch.name||'this product'}:`);
  lines.push(`• Approved item: ${launch.name||'—'}`);
  if(launch.sku && launch.sku!==launch.name) lines.push(`• SKU: ${launch.sku}`);
  if(launch.upc) lines.push(`• UPC: ${launch.upc}`);
  if(launch.unitSize) lines.push(`• Unit size: ${launch.unitSize}`);
  if(launch.casePack) lines.push(`• Case pack: ${launch.casePack}`);
  if(launch.moq) lines.push(`• MOQ: ${launch.moq}`);
  if(launch.cost) lines.push(`• Price (wholesale): ${launch.cost}`);
  if(launch.msrp) lines.push(`• MSRP: ${launch.msrp}`);
  if(launch.primaryDistribution) lines.push(`• Distributor: ${launch.primaryDistribution}`);
  if(launch.leadTime) lines.push(`• Lead time: ${launch.leadTime}`);
  if(launch.shelfLife) lines.push(`• Shelf life: ${launch.shelfLife}`);
  if(launch.storageReq) lines.push(`• Storage: ${launch.storageReq}`);
  // Suggested launch date = today + 3 weeks. Procurement can override.
  const d=new Date(); d.setDate(d.getDate()+21);
  const sug=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  lines.push(`• Suggested launch date: ${sug} (approval + 3 weeks)`);
  return lines.join('\n');
}
/* "It's your turn" handoff copy — names the exact tasks, adds urgency, points
   to the hub, and reminds them to check tasks off to advance the launch.
   When the next stage is Procurement (commercial) the message is prepended
   with the full handoff package so they don't have to dig for the basics. */
function actionMessage(launch,nm){
  const todo=stageTasks(launch,nm.key).filter(x=>x.t.blocking!==false).map(x=>x.t.label);
  const list=todo.length?` Your ${nm.label} checklist: ${todo.join('; ')}.`:'';
  const handoff=(nm.key==='commercial')?(procurementHandoff(launch)+'\n\n'):'';
  return handoff+`🔔 It's your turn, ${nm.dept}! ${launch.name||'A product'} (${brandName(launch)}) just advanced to the ${nm.label} stage — the whole launch is now waiting on your team.`
    +list
    +` ⏱️ Please jump on this today: nothing moves forward until your ${nm.label} tasks are done, and every day it sits here pushes ${launch.name||'the launch'}'s go-live date back.`
    +` 👉 Click here to open ${launch.name||'this product'} in the hub and work your checklist: ${HUB_URL}#${launch.id}`
    +` ✅ Don't forget — check off each task the moment you finish it. Completing them is what hands ${launch.name||'this product'} to the next team and keeps the launch on track.`;
}
async function sendEmail(toEmail,team,launch,vars){
  if(!NOTIFY) return {skipped:true};
  try{
    await emailjs.send(EMAILJS.service,EMAILJS.template,Object.assign({
      to_email:toEmail,to_name:team+' team',team:team,
      launch:launch.name||'',brand:brandName(launch),stage:vars.stage||'',
      launch_date:launch.launchDate||'',readiness:readiness(launch)+'%',
      message:vars.message||'',link:HUB_URL+(launch&&launch.id?('#'+launch.id):''),
      accent:'#6280bd'
    },vars));
    return {ok:true};
  }catch(e){ return {err:String(e)}; }
}

  const filtered=PIPE_TYPE==='all'?allItems:allItems.filter(l=>(l.type||'CPG')===PIPE_TYPE);
  const byStage={}; filtered.forEach(l=>{(byStage[l.stage]=byStage[l.stage]||[]).push(l);});
  const lanes=[...PIPE,stageMeta('live')]; // active stages + Live lane
  const counts={all:allItems.length,CPG:allItems.filter(l=>(l.type||'CPG')==='CPG').length,'Private Label':allItems.filter(l=>l.type==='Private Label').length};
  const btn=(v,lbl)=>`<button data-type="${esc(v)}" class="${PIPE_TYPE===v?'on':''}">${esc(lbl)} <span style="opacity:.6;margin-left:2px">${counts[v]||0}</span></button>`;
  const filterBar=`<div class="pipe-filter"><span class="pipe-filter-lbl">Type</span>${btn('all','All')}${btn('CPG','CPG')}${btn('Private Label','Private Label')}</div>`;
  $('view').innerHTML=filterBar+`<div class="lanes">${lanes.map(s=>{
    const items=(byStage[s.key]||[]).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    return `<div class="lane"><div class="lane-head"><div class="lh-top"><span class="dot" style="background:${s.color}"></span>${esc(s.label)}</div><span class="cnt">${items.length} ${items.length===1?'product':'products'}</span></div>
      <div class="lane-list">${items.map(l=>{
        const r=readiness(l);
        return `<div class="pcard" data-id="${l.id}"><div class="pn">${esc(l.name||'')}</div>
          <div class="pb">${esc(brandName(l))} · ${esc(l.category||'')}</div>
          ${typeBadge(l.type)}
          ${s.key!=='live'?`<div class="bar"><i style="width:${r}%;background:${s.color}"></i></div>`:''}
          <div class="code">${esc(l.code||'')}</div></div>`;
      }).join('')||'<div class="lane-empty">—</div>'}</div></div>`;
  }).join('')}</div>`;
  document.querySelectorAll('.pcard').forEach(c=>c.onclick=()=>openDrawer(c.dataset.id));
  document.querySelectorAll('.pipe-filter button').forEach(b=>b.onclick=()=>{ PIPE_TYPE=b.dataset.type; renderPipeline(); });
}

/* ---------------- products tab ---------------- */
function renderProducts(){
  const STAGE_LABEL={}; STAGES.forEach(s=>STAGE_LABEL[s.key]=s.label);
  const all=Object.values(LAUNCHES).filter(l=>l.name).map(l=>({id:l.id,name:l.name,category:l.category||'Uncategorized',stage:l.stage,live:l.stage==='live',code:l.code||''})).sort((a,b)=>a.name.localeCompare(b.name));
  const pool=all.filter(p=>prodStatus==='all'||(prodStatus==='shelf'?p.live:!p.live));
  const cats=['All',...Array.from(new Set(pool.map(p=>p.category))).sort()];
  if(!cats.includes(prodCat))prodCat='All';
  $('view').innerHTML=`<h1>Products</h1><p class="sub">Every brand in the marketplace — on shelf and in the pipeline.</p>
    <div class="segmented" id="seg">
      <button data-s="all" class="${prodStatus==='all'?'active':''}">All</button>
      <button data-s="shelf" class="${prodStatus==='shelf'?'active':''}">On shelf</button>
      <button data-s="pipe" class="${prodStatus==='pipe'?'active':''}">In pipeline</button></div>
    <div class="toolbar"><input id="pq" type="search" placeholder="Search brand or category…"><span class="stat" id="pcount"></span></div>
    <div class="chips" id="pchips">${cats.map(c=>`<span class="chip ${c===prodCat?'active':''}" data-c="${esc(c)}">${esc(c)}</span>`).join('')}</div>
    <div id="plist"></div>`;
  $('seg').querySelectorAll('button').forEach(b=>b.onclick=()=>{prodStatus=b.dataset.s;renderProducts();});
  $('pchips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{prodCat=c.dataset.c;renderProducts();});
  const q0=$('pq'); q0.oninput=()=>drawProducts(pool,STAGE_LABEL,q0.value);
  drawProducts(pool,STAGE_LABEL,'');
}
function drawProducts(pool,LBL,q){
  q=(q||'').trim().toLowerCase();
  const items=pool.filter(p=>(prodCat==='All'||p.category===prodCat)&&(!q||p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)));
  const shelf=items.filter(p=>p.live).length;
  $('pcount').textContent=`${items.length} products · ${shelf} on shelf · ${items.length-shelf} in pipeline`;
  const byCat={}; items.forEach(p=>{(byCat[p.category]=byCat[p.category]||[]).push(p);});
  $('plist').innerHTML=items.length?Object.keys(byCat).sort().map(cat=>`
    <div class="cat-head"><h2>${esc(cat)}</h2><span class="n">${byCat[cat].length}</span></div>
    <div class="grid">${byCat[cat].map(p=>`<div class="card" data-id="${p.id}"><div class="name">${esc(p.name)}</div>
      <div class="meta">${esc(p.category)}${p.code?' · '+esc(p.code):''}</div>
      ${p.live?'<span class="pill shelf">On shelf</span>':'<span class="pill pipe">In pipeline · '+esc(LBL[p.stage]||p.stage)+'</span>'}</div>`).join('')}</div>`).join(''):'<div class="empty">No products match.</div>';
  document.querySelectorAll('#plist .card').forEach(c=>c.onclick=()=>openDrawer(c.dataset.id));
}

/* ---------------- brands tab ---------------- */
let BRAND_VIEW=null; // brand.id when drilled in, null on the list view

function renderBrands(){
  if(BRAND_VIEW) return renderBrandDetail(BRAND_VIEW);
  const byBrand={}; Object.values(LAUNCHES).forEach(l=>{(byBrand[l.brandId]=byBrand[l.brandId]||[]).push(l);});
  let rows=Object.values(BRANDS).map(b=>{
    const ls=byBrand[b.id]||[];
    return {id:b.id,name:b.name,category:b.category||'',total:ls.length,shelf:ls.filter(l=>l.stage==='live').length};
  }).filter(b=>b.total>0).sort((a,b)=>a.name.localeCompare(b.name));
  $('view').innerHTML=`<h1>Brands</h1><p class="sub">${rows.length} brands · ${Object.values(LAUNCHES).length} total products. Click any brand to see its products.</p>
    <div class="toolbar"><input id="bq" type="search" placeholder="Search brands…"></div>
    <div class="grid" id="blist"></div>`;
  const draw=()=>{
    const q=($('bq').value||'').trim().toLowerCase();
    $('blist').innerHTML=rows.filter(b=>!q||b.name.toLowerCase().includes(q)).map(b=>
      `<div class="card brand-card" data-bid="${esc(b.id)}" style="cursor:pointer">
        <div class="name">${esc(b.name)}</div>
        <div class="meta">${esc(b.category)} · ${b.total} ${b.total===1?'product':'products'}</div>
        <span class="pill ${b.shelf?'shelf':'pipe'}">${b.shelf} on shelf · ${b.total-b.shelf} in pipeline</span>
      </div>`).join('')||'<div class="empty">No brands.</div>';
    document.querySelectorAll('.brand-card').forEach(c=>c.onclick=()=>{ BRAND_VIEW=c.dataset.bid; renderBrands(); window.scrollTo({top:0,behavior:'smooth'}); });
  };
  $('bq').oninput=draw; draw();
}

/* Brand detail — shown when a brand card is clicked. Header pulls the
   full Brand Info captured at intake (founder, email, phone, website).
   Below: every product on that brand with the key product-info fields
   inline, type badge, stage badge, and an "Open" button that pops the
   product drawer. */
function renderBrandDetail(bid){
  const b=BRANDS[bid];
  if(!b){ BRAND_VIEW=null; return renderBrands(); }
  const items=Object.values(LAUNCHES).filter(l=>l.brandId===bid).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const onShelf=items.filter(l=>l.stage==='live').length;
  const inPipe =items.length-onShelf;
  const valOr=(v,d)=>{const s=(v==null?'':String(v).trim()); return s?esc(s):`<span style="color:#bcb9b1;font-style:italic">${d||'—'}</span>`;};
  const link=(v,kind)=>{
    const s=(v||'').trim(); if(!s) return `<span style="color:#bcb9b1;font-style:italic">—</span>`;
    if(kind==='url'){ const h=/^https?:\/\//.test(s)?s:'https://'+s; return `<a href="${esc(h)}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">${esc(s)}</a>`; }
    if(kind==='email') return `<a href="mailto:${esc(s)}" style="color:var(--accent);text-decoration:none">${esc(s)}</a>`;
    if(kind==='tel')   return `<a href="tel:${esc(s)}" style="color:var(--accent);text-decoration:none">${esc(s)}</a>`;
    return esc(s);
  };

  const header=`
    <div style="margin-bottom:8px"><button id="brandBack" type="button" style="background:#f1efe9;color:var(--ink);border:0;font-family:inherit;font-weight:600;font-size:12px;padding:6px 12px;border-radius:9px;cursor:pointer">← Back to Brands</button></div>
    <h1 style="margin-bottom:4px">${esc(b.name)}</h1>
    <p class="sub">${esc(b.category||'Uncategorized')} · ${items.length} ${items.length===1?'product':'products'} · ${onShelf} on shelf · ${inPipe} in pipeline</p>
    <div class="info-card" style="margin-bottom:18px">
      <div class="ic-h"><h4>Brand Contact</h4><span class="ic-c">Captured at intake</span><span class="ic-x">▾</span></div>
      <div class="ic-b">
        <div class="info-grid">
          <div class="info-cell"><span class="k">Founder</span><span class="v">${valOr(b.founderName||b.contact)}</span></div>
          <div class="info-cell"><span class="k">Email</span><span class="v">${link(b.email,'email')}</span></div>
          <div class="info-cell"><span class="k">Phone</span><span class="v">${link(b.phone,'tel')}</span></div>
          <div class="info-cell"><span class="k">Website</span><span class="v">${link(b.website,'url')}</span></div>
          <div class="info-cell"><span class="k">Distributor</span><span class="v">${valOr(b.distributor)}</span></div>
          <div class="info-cell"><span class="k">Source</span><span class="v">${valOr(b.source)}</span></div>
        </div>
      </div>
    </div>`;

  const list=items.length
    ? `<div style="display:flex;flex-direction:column;gap:12px">${items.map(l=>{
        const sm=stageMeta(l.stage);
        return `<div class="card brand-product" data-pid="${esc(l.id)}" style="cursor:pointer;padding:14px 16px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap">
            <div style="min-width:0;flex:1">
              <div class="name" style="font-size:15px">${esc(l.name||'')}</div>
              <div class="meta">${esc(l.category||'Uncategorized')} · ${esc(l.code||'')}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end">
              <span class="tag" style="background:${sm.color}22">${esc(sm.label)}</span>
              ${typeBadge(l.type)}
              <span class="tag">${readiness(l)}% ready</span>
            </div>
          </div>
          <div class="info-grid" style="margin-top:12px">
            <div class="info-cell"><span class="k">SKU</span><span class="v">${valOr(l.sku||l.name)}</span></div>
            <div class="info-cell"><span class="k">UPC</span><span class="v">${valOr(l.upc)}</span></div>
            <div class="info-cell"><span class="k">Unit Size</span><span class="v">${valOr(l.unitSize)}</span></div>
            <div class="info-cell"><span class="k">Case Pack</span><span class="v">${valOr(l.casePack)}</span></div>
            <div class="info-cell"><span class="k">Wholesale Cost</span><span class="v">${valOr(l.cost)}</span></div>
            <div class="info-cell"><span class="k">MSRP</span><span class="v">${valOr(l.msrp)}</span></div>
            <div class="info-cell"><span class="k">MOQ</span><span class="v">${valOr(l.moq)}</span></div>
            <div class="info-cell"><span class="k">Lead Time</span><span class="v">${valOr(l.leadTime)}</span></div>
            <div class="info-cell"><span class="k">Shelf Life</span><span class="v">${valOr(l.shelfLife)}</span></div>
            <div class="info-cell"><span class="k">Storage</span><span class="v">${valOr(l.storageReq)}</span></div>
            <div class="info-cell"><span class="k">Primary Distribution</span><span class="v">${valOr(l.primaryDistribution)}</span></div>
            <div class="info-cell"><span class="k">Product Dim</span><span class="v">${valOr(l.productDim)}</span></div>
          </div>
          <div style="margin-top:12px;display:flex;justify-content:flex-end"><button type="button" class="brand-product-open" data-pid="${esc(l.id)}" style="background:var(--accent);color:#fff;border:0;font-family:inherit;font-weight:600;font-size:12px;padding:7px 14px;border-radius:9px;cursor:pointer">Open in drawer →</button></div>
        </div>`;

    : '<div class="empty">No products on this brand yet.</div>';

  $('view').innerHTML=header+list;
  // Wire interactions
  const back=document.getElementById('brandBack');
  if(back) back.onclick=()=>{ BRAND_VIEW=null; renderBrands(); window.scrollTo({top:0,behavior:'smooth'}); };
  // Collapsible Brand Contact card
  $('view').querySelectorAll('.info-card .ic-h').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('collapsed'));

/* ---------------- process tab ---------------- */
function renderProcess(){
  $('view').innerHTML=`<h1>Process</h1><p class="sub">Start-to-finish flow. Each stage is owned by one department — finish its checklist, then hand off to the next team. Each handoff auto-emails the next department that it's their turn.</p>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">${PIPE.map((s,i)=>{
      const nxt=PIPE[i+1]||stageMeta('live');
      return `<div class="card" style="cursor:default"><div class="name"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${s.color};margin-right:7px"></span>${i+1}. ${esc(s.label)}</div>
        <div class="meta">Owner: ${esc(s.dept)}</div>
        <div class="meta" style="margin-top:6px">→ hands off to <b>${esc(nxt.dept==='—'?'Live · On shelf':nxt.dept)}</b></div></div>`;

}

/* ---------------- drawer ---------------- */
function openDrawer(id){OPEN=id;$('scrim').classList.add('show');$('drawer').classList.add('show');renderDrawer(id);}
function closeDrawer(){OPEN=null;$('scrim').classList.remove('show');$('drawer').classList.remove('show');}
$('scrim').onclick=closeDrawer;

function renderDrawer(id){
  const l=LAUNCHES[id]; if(!l)return;
  const fired=l.triggersFired||[];
  const curIdx=stageIdx(l.stage);
  const body=STAGES.filter(s=>s.key!=='live').map(s=>{
    const sts=stageTasks(l,s.key); if(!sts.length&&s.key!=='review'&&!sts.length) {}
    if(!sts.length) return '';
    const isCur=s.key===l.stage;
    const doneN=sts.filter(x=>x.t.done).length;
    const groups=splitGroups(s.key,sts);
    let activeIdx=groups.findIndex(g=>!groupDone(g)); if(activeIdx<0) activeIdx=groups.length-1;
    const stepsHtml=groups.map((g,gi)=>{
      const gdone=groupDone(g);
      const active=isCur&&gi===activeIdx&&!gdone;
      const upcoming=isCur&&gi>activeIdx&&!gdone;
      const open=active;                       // in the active stage only the current batch is open
      const gN=g.items.filter(x=>x.t.done).length;
      const ic=gdone?'✓':(active?'▸':(upcoming?'›':'·'));
      const cls=gdone?'done':(active?'active':(upcoming?'upcoming':''));
      const tasksHtml=g.items.map(x=>{const t=x.t;const meta=[t.owner?`👤 ${esc(t.owner)}`:'',t.def?`✓ ${esc(t.def)}`:'',t.notify?`🔔 notifies ${esc(t.notify)}`:''].filter(Boolean).join(' · ');
        const fileHtml=t.file?`<div class="task-file">${t.fileUrl
          ?`<a class="file-link" href="${esc(t.fileUrl)}" target="_blank" rel="noopener">📎 ${esc(t.fileName||'View file')}</a><label class="file-btn">Replace<input type="file" hidden data-id="${id}" data-ti="${x.i}"></label>`
          :`<label class="file-btn">⬆ Upload file<input type="file" hidden data-id="${id}" data-ti="${x.i}"></label>`}</div>`:'';
        // Per-task value inputs (sample tracking link, free-first-fill qty,
        // landed cost, etc.). Falls back to the live template's inputs
        // array when the saved task has none — so launches created before
        // the input fields existed still surface the new capture boxes
        // without needing a back-fill.
        const inputs=(Array.isArray(t.inputs)&&t.inputs.length)
          ? t.inputs
          : (templateInputsFor(l,t)||[]);
        const inputsHtml=inputs.length?`<div class="task-inputs">${inputs.map(f=>{
          const cur=(t.values&&t.values[f.key])||'';
          const type=f.type||'text';
          // Small inline icon per type so the field reads at a glance
          const ico={url:'🔗',date:'📅',email:'✉️',tel:'☎️',number:'#'}[type]||'';
          const hasValue=cur?'has-value':'';
          return `<div class="task-input${cur?' has-saved':''}"><label>${ico?`<span class="ti-ico">${ico}</span>`:''}${esc(f.label||f.key)}</label><input type="${esc(type)}" class="${hasValue}" placeholder="${esc(f.placeholder||'')}" value="${esc(cur)}" data-id="${id}" data-ti="${x.i}" data-vk="${esc(f.key)}"><span class="ti-saved">✓ saved</span></div>`;
        }).join('')}</div>`:'';
        return `<div class="task ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} data-id="${id}" data-ti="${x.i}"><div class="tbody"><label>${esc(t.label)}${t.blocking===false?' <span class="opt">optional</span>':''}</label>${meta?`<div class="task-meta">${meta}</div>`:''}${fileHtml}${inputsHtml}</div></div>`;}).join('');
      return `<div class="ministep ${cls}"><div class="ms-h"><span class="ms-ic">${ic}</span>${esc(g.name)}<span class="ms-c">${gN}/${g.items.length}</span></div><div class="ms-body" style="${open?'':'display:none'}">${tasksHtml}</div></div>`;
    }).join('');
    const nxtK=nextStageKey(s.key), nxtM=nxtK?stageMeta(nxtK):null;
    const nextWho=nxtM?(nxtM.dept==='—'?'Live · on shelf':nxtM.dept):'the next team';
    const activeName=isCur&&groups[activeIdx]?groups[activeIdx].name:'';
    const cta=isCur?`<div class="cta">👉 <b>${esc(s.dept)}</b>, you're up on <b>${esc(l.name||'this product')}</b>.${activeName?` Current step: <b>${esc(activeName)}</b>.`:''} Work the open batch below${nxtK?`, then tap <b>Push to ${esc(nextWho)}</b>`:''} to keep the launch moving.</div>`:'';
    return `<div class="stagebox ${isCur?'cur':''}"><div class="sb-h" data-stg="${s.key}">
        <span class="dot" style="background:${s.color}"></span>
        <div><div class="lbl">${esc(s.label)}</div><div class="dept">${esc(s.dept)}</div></div>
        <span class="pct">${doneN}/${sts.length}</span></div>
      <div class="sb-body" style="${isCur?'':'display:none'}">${cta}${stepsHtml}
        ${isCur?advanceBtn(l,s):''}</div></div>`;
  }).join('');
  const log=(Array.isArray(l.log)?l.log:Object.values(l.log||{})).slice().reverse().slice(0,8);
  const infoHtml=renderProductInfo(l);
  const docsHtml=renderDocs(l);
  $('drawer').innerHTML=`<div class="dh"><button class="x" onclick="window._close()">✕</button>
      <div class="dn">${esc(l.name||'')}</div><div class="db">${esc(brandName(l))} · ${esc(l.category||'')}</div>
      <div class="meta2"><span class="tag" style="background:${stageMeta(l.stage).color}22">${esc(stageMeta(l.stage).label)}</span>
        <span class="tag">${esc(l.code||'')}</span><span class="tag">${readiness(l)}% ready</span>${typeBadge(l.type)}</div></div>
    <div class="dbody">
      ${infoHtml}
      ${docsHtml}
      ${body||'<div class="empty">No tasks.</div>'}
      ${l.stage==='live'?`<button class="advance" style="margin-top:6px" onclick="window._advance('${id}')">Start 30-Day Review →</button>`:''}
      <div class="log"><h4>Activity</h4>${log.map(e=>`<div class="e"><span class="t">${esc(e.ts||'')}</span><span>${esc(e.text||'')}</span></div>`).join('')||'<div style="color:#9b988f">No activity yet.</div>'}</div></div>`;
  $('drawer').querySelectorAll('.sb-h').forEach(h=>h.onclick=()=>{const b=h.nextElementSibling;b.style.display=b.style.display==='none'?'':'none';});
  $('drawer').querySelectorAll('.ms-h').forEach(h=>h.onclick=()=>{const b=h.nextElementSibling;b.style.display=b.style.display==='none'?'':'none';});
  $('drawer').querySelectorAll('.task input[type=checkbox]').forEach(c=>c.onchange=()=>toggleTask(c.dataset.id,+c.dataset.ti,c.checked));
  $('drawer').querySelectorAll('.task input[type=file]').forEach(f=>f.onchange=()=>uploadTaskFile(f.dataset.id,+f.dataset.ti,f));
  // Persist per-task values (tracking link, free-fill qty, landed cost, etc.)
  // on blur so users can tab through fields without firing a write each
  // keystroke. Writes to launches/{id}/tasks/{ti}/values/{key}.
  $('drawer').querySelectorAll('.task-input input').forEach(inp=>{
    inp.onblur=()=>saveTaskValue(inp.dataset.id,+inp.dataset.ti,inp.dataset.vk,inp.value,inp);
    inp.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); inp.blur(); } };
  });
  // Collapsible Product Info / Documents cards
  $('drawer').querySelectorAll('.info-card .ic-h').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('collapsed'));
  // Wire each Preview button to open the inline modal with the right URL/name
  $('drawer').querySelectorAll('[data-preview-url]').forEach(btn=>{
    btn.onclick=e=>{ e.preventDefault(); previewDoc(btn.dataset.previewUrl,btn.dataset.previewName,btn.dataset.previewTask); };
  });
}

/* Build the Product Info summary block shown at the top of the drawer.
   Reads from the launch record's intake fields. Collapsible. Each cell
   shows label + value, with empty fields rendered as a quiet '—' so
   the layout doesn't bounce when fields are partially filled. */
function renderProductInfo(l){
  const b=BRANDS[l.brandId]||{};
  // One labelled cell. Empty values return an empty string so the cell
  // never renders at all — keeps the grid tight and avoids the dense
  // wall of '—' placeholders that made the card hard to scan.
  const cell=(k,v,opts)=>{
    const o=opts||{};
    const raw=(v==null?'':String(v).trim());
    if(!raw) return '';
    let html=esc(raw);
    if(o.link==='url'){ const h=/^https?:\/\//.test(raw)?raw:'https://'+raw; html=`<a href="${esc(h)}" target="_blank" rel="noopener">${esc(raw)}</a>`; }
    else if(o.link==='email'){ html=`<a href="mailto:${esc(raw)}">${esc(raw)}</a>`; }
    else if(o.link==='tel'){ html=`<a href="tel:${esc(raw)}">${esc(raw)}</a>`; }
    return `<div class="info-cell"><span class="k">${esc(k)}</span><span class="v">${html}</span></div>`;
  };
  // Render a labelled sub-section. If every cell came back empty (nothing
  // to show in this cluster) drop the section heading too so the card
  // stays clean instead of showing four bare eyebrows above empty space.
  const sub=(label,cells)=>{
    const filled=cells.filter(c=>c);
    if(!filled.length) return '';
    return `<div class="info-sub">${esc(label)}</div><div class="info-grid">${filled.join('')}</div>`;
  };

  const brand=sub('Brand',[
    cell('Brand',b.name||brandName(l)),
    cell('Founder',b.founderName||b.contact||''),
    cell('Type',l.type||'CPG'),
    cell('Email',b.email||'',{link:'email'}),
    cell('Phone',b.phone||'',{link:'tel'}),
    cell('Website',b.website||'',{link:'url'})
  ]);
  const ident=sub('Identification',[
    cell('SKU',l.sku||l.name||''),
    cell('UPC',l.upc||''),
    cell('Category',l.category||'')
  ]);
  const pack=sub('Pack & Dimensions',[
    cell('Unit Size',l.unitSize||''),
    cell('Case Pack',l.casePack||''),
    cell('MOQ',l.moq||''),
    cell('Product Dim',l.productDim||''),
    cell('Case Dim',l.caseDim||'')
  ]);
  const commercial=sub('Commercial',[
    cell('Wholesale Cost',l.cost||''),
    cell('MSRP',l.msrp||'')
  ]);
  const logistics=sub('Logistics',[
    cell('Lead Time',l.leadTime||''),
    cell('Shelf Life',l.shelfLife||''),
    cell('Storage',l.storageReq||''),
    cell('Primary Distribution',l.primaryDistribution||'')
  ]);
  // Captured during process — pulls every populated task.values{}
  // back into Product Info so the tracking links, landed cost, Toast
  // item ID, Olo URL, etc. all read in one place alongside intake.
  // Empty if nothing's been captured on any task yet.
  const captured=(function(){
    const ts=tasksOf(l);
    const cells=[];
    ts.forEach(t=>{
      if(!t.values) return;
      const inputs=(Array.isArray(t.inputs)&&t.inputs.length)?t.inputs:templateInputsFor(l,t);
      const byKey={}; inputs.forEach(i=>{byKey[i.key]=i;});
      Object.entries(t.values).forEach(([k,v])=>{
        if(v==null||String(v).trim()==='') return;
        const def=byKey[k]||{label:k,type:'text'};
        const opts=def.type==='url'?{link:'url'}:def.type==='email'?{link:'email'}:def.type==='tel'?{link:'tel'}:{};
        cells.push(cell(def.label||k,v,opts));
      });
    });
    return sub('Captured during process',cells);
  })();
  const notes=l.notes?`<div class="info-notes"><span class="k">Notes</span>${esc(l.notes)}</div>`:'';

  return `<div class="info-card" id="infoCard">
    <div class="ic-h"><h4>Product Info</h4><span class="ic-c">Brand · Product</span><span class="ic-x">▾</span></div>
    <div class="ic-b">${brand}${ident}${pack}${commercial}${logistics}${captured}${notes}</div>
  </div>`;
}

/* Gather every file that's been uploaded across this launch's tasks
   (any task with task.fileUrl), build a list with a Preview button per
   row. PDFs and images get inline preview; other types fall through
   to a link. */
function renderDocs(l){
  const ts=tasksOf(l);
  const docs=ts.map((t,i)=>t.fileUrl?{
    name:t.fileName||'Document',
    url:t.fileUrl,
    task:t.label||'',
    stage:t.stage||''
  }:null).filter(Boolean);
  const ext=name=>(name.split('.').pop()||'').toLowerCase();
  const ico=name=>{const e=ext(name); if(e==='pdf')return '📄'; if(['png','jpg','jpeg','gif','webp','svg','heic'].includes(e)) return '🖼️'; if(['doc','docx'].includes(e))return '📝'; if(['xls','xlsx','csv'].includes(e))return '📊'; return '📎';};
  const body=docs.length?`<div class="doc-list">${docs.map(d=>{
    const tEsc=esc(d.task), uEsc=esc(d.url), nEsc=esc(d.name);
    return `<div class="doc-row">
      <span class="doc-ico">${ico(d.name)}</span>
      <div class="doc-meta"><div class="doc-name">${nEsc}</div><div class="doc-task">From: ${tEsc}</div></div>
      <div class="doc-actions">
        <button type="button" class="doc-btn primary" data-preview-url="${uEsc}" data-preview-name="${nEsc}" data-preview-task="${tEsc}">Preview</button>
        <a class="doc-btn" href="${uEsc}" target="_blank" rel="noopener" download>Download</a>
      </div>
    </div>`;
  }).join('')}</div>`:'<div class="doc-empty">No documents uploaded yet. Files attached to tasks (W-9, COI, spec sheets, brand assets, etc.) will appear here for preview.</div>';
  return `<div class="info-card${docs.length?'':' collapsed'}" id="docsCard">
    <div class="ic-h"><h4>Documents</h4><span class="ic-c">${docs.length} file${docs.length===1?'':'s'}</span><span class="ic-x">▾</span></div>
    <div class="ic-b">${body}</div>
  </div>`;
}

/* Inline preview overlay. PDFs in an iframe (browser-native viewer),
   images inline, anything else falls through to an "Open in new tab"
   link inside the body so users still get to the file. */
function previewDoc(url, name, task){
  if(!url)return;
  const ov=document.getElementById('previewOverlay');
  const body=document.getElementById('previewBody');
  const nameEl=document.getElementById('previewName');
  const taskEl=document.getElementById('previewTask');
  const openEl=document.getElementById('previewOpen');
  nameEl.textContent=name||'Document';
  taskEl.textContent=task?`from “${task}”`:'';
  openEl.href=url;
  const ext=(name||'').split('.').pop().toLowerCase().split('?')[0];
  const isPdf=ext==='pdf'||/\.pdf(\?|$)/i.test(url);
  const isImg=['png','jpg','jpeg','gif','webp','svg'].includes(ext)||/\.(png|jpe?g|gif|webp|svg)(\?|$)/i.test(url);
  if(isPdf){
    body.innerHTML=`<iframe src="${esc(url)}#toolbar=1" title="${esc(name||'PDF preview')}"></iframe>`;
  } else if(isImg){
    body.innerHTML=`<img src="${esc(url)}" alt="${esc(name||'Image preview')}">`;
  } else {
    body.innerHTML=`<div class="preview-fallback">Preview not supported for this file type.<br><a href="${esc(url)}" target="_blank" rel="noopener">Open ${esc(name||'document')} in a new tab →</a></div>`;
  }
  ov.classList.add('show');
}
function closePreview(){
  const ov=document.getElementById('previewOverlay');
  ov.classList.remove('show');
  // Drop the iframe/img so we don't keep loading the file in the background.
  setTimeout(()=>{ document.getElementById('previewBody').innerHTML=''; },180);
}
window._closePreview=closePreview;
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ const ov=document.getElementById('previewOverlay'); if(ov&&ov.classList.contains('show')) closePreview(); } });
document.addEventListener('click',e=>{ const ov=document.getElementById('previewOverlay'); if(ov&&ov.classList.contains('show')&&e.target===ov) closePreview(); });

async function saveTaskValue(id,ti,key,val,inputEl){
  if(!LAUNCHES[id])return;
  const v=(val||'').trim();
  const path=`marketplace-npi/launches/${id}/tasks/${ti}/values/${key}`;
  try {
    await db.ref(path).set(v||null);
    // Flash a brief "✓ saved" badge so the user sees their data made it
    // to Firebase. The wrapper class is the toggle; we clear it 1.6s
    // later so subsequent edits get their own flash.
    if(inputEl && inputEl.parentElement){
      const wrap=inputEl.parentElement;
      wrap.classList.add('saved');
      inputEl.classList.toggle('has-value',!!v);
      clearTimeout(wrap._t);
      wrap._t=setTimeout(()=>wrap.classList.remove('saved'),1600);
    }
  }
  catch(e){ console.error('[task value] save failed', e); toast('Couldn’t save — check console'); }
}

function advanceBtn(l,s){
  const sts=stageTasks(l,s.key);
  // only "blocking" tasks gate the handoff; nice-to-haves (blocking:false) don't.
  // existing launches have no blocking field, so they still require every task.
  const done=sts.every(x=>x.t.done||x.t.blocking===false);
  const nxt=nextStageKey(s.key);
  const nxtMeta=nxt?stageMeta(nxt):null;
  if(s.key==='store'){ return `<button class="advance live" ${done?'':'disabled'} onclick="window._advance('${l.id}')">${done?'✓ Mark LIVE on shelf':'Complete required tasks to go live'}</button>`; }
  if(!nxt) return '';
  return `<button class="advance" ${done?'':'disabled'} onclick="window._advance('${l.id}')">${done?'Push to '+esc(nxtMeta.dept)+' →':'Complete required tasks to advance'}</button>`;
}

/* ---------------- actions ---------------- */
async function toggleTask(id,ti,checked){
  const l=LAUNCHES[id]; if(!l)return;
  const ts=tasksOf(l).map(t=>Object.assign({},t));
  ts[ti].done=checked; ts[ti].doneAt=checked?Date.now():null;
  const sk=ts[ti].stage, sm=stageMeta(sk);
  const upd={['marketplace-npi/launches/'+id+'/tasks']:ts};
  // per-task cross-team ping — fires the instant a task with a notify target is checked.
  // Any per-task values captured in the task.values block (sample tracking link,
  // free-fill case packs, landed cost, lead time, etc.) get appended so the
  // receiving team gets the actual numbers, not just a "done" ping.
  if(checked && ts[ti].notify){
    const vs=ts[ti].values||{};
    const vlines=Object.entries(vs).filter(([,v])=>v!=null&&String(v).trim()).map(([k,v])=>{
      const inputs=Array.isArray(ts[ti].inputs)?ts[ti].inputs:[];
      const def=inputs.find(i=>i.key===k);
      return `• ${(def&&def.label)||k}: ${v}`;
    });
    const detail=vlines.length?`\n\nCaptured details:\n${vlines.join('\n')}`:'';
    sendEmail(recipientFor(ts[ti].notify),ts[ti].notify,l,{stage:sm.label,message:(ts[ti].notifyMsg||`${ts[ti].label} completed for ${l.name}.`)+detail});
  }
  let fired=(l.triggersFired||[]).slice(), firedChg=false;
  const logs=(Array.isArray(l.log)?l.log:Object.values(l.log||{})).slice(); let logChg=false, toastMsg=null;
  if(checked){
    const sts=ts.map((t,i)=>({t,i})).filter(x=>x.t.stage===sk);
    const groups=splitGroups(sk,sts);
    const grp=groups.find(g=>g.items.some(x=>x.i===ti));
    // mini-step finished → in-app momentum (toast + activity); next batch opens on re-render
    if(grp&&groupDone(grp)){
      const gid=sk+'#'+grp.name;
      if(!fired.includes(gid)){
        fired.push(gid); firedChg=true;
        const after=groups.slice(groups.indexOf(grp)+1).find(g=>!groupDone(g));
        logs.push({text:`✓ ${sm.label}: “${grp.name}” done${after?` — next: ${after.name}`:''}`,ts:nowTs()}); logChg=true;
        toastMsg=`✓ ${grp.name} done${after?` · next: ${after.name}`:''}`;
      }
    }
    // whole stage's required tasks done → one hand-off nudge email to the owning dept
    const stageReady=sts.every(x=>x.t.done||x.t.blocking===false);
    const rid=sk+'#ready';
    if(stageReady&&sk===l.stage&&!fired.includes(rid)){
      fired.push(rid); firedChg=true;
      const nxtK=nextStageKey(sk), nxtM=nxtK?stageMeta(nxtK):null;
      if(!nxtK){ // terminal stage (30-Day Review)
        logs.push({text:`✅ ${sm.label} complete`,ts:nowTs()}); logChg=true;
        sendEmail(recipientFor(sm.dept),sm.dept,l,{stage:sm.label,message:`✅ ${sm.label} complete for ${l.name} (${brandName(l)}) — nice work closing the loop. ${HUB_URL}#${l.id}`});
        toastMsg=`${sm.label} complete`;
      } else {
        const pushLbl=nxtM.dept!=='—'?('Push to '+nxtM.dept):'Mark LIVE on shelf';
        const handTo=nxtM.dept!=='—'?('hand to '+nxtM.dept):'go live';
        logs.push({text:`✅ ${sm.label} complete — ready to ${handTo}`,ts:nowTs()}); logChg=true;
        sendEmail(recipientFor(sm.dept),sm.dept,l,{stage:sm.label,message:`✅ All your ${sm.label} tasks for ${l.name} (${brandName(l)}) are done — great work! Last step: open the hub and tap “${pushLbl}” to hand ${l.name} to the next team. ${HUB_URL}#${l.id}`});
        toastMsg=`${sm.label} complete — tap “${pushLbl}”`;
      }
    }
  }
  if(firedChg) upd['marketplace-npi/launches/'+id+'/triggersFired']=fired;
  if(logChg) upd['marketplace-npi/launches/'+id+'/log']=logs;
  await db.ref().update(upd);
  if(toastMsg) toast(toastMsg);
}

/* Upload a supporting document for a file-flagged task to Firebase Storage,
   then save its download URL + name onto the task so the whole team can open it. */
async function uploadTaskFile(id,ti,fileEl){
  const file=fileEl.files&&fileEl.files[0]; if(!file)return;
  const l=LAUNCHES[id]; if(!l)return;
  if(file.size>15*1024*1024){ toast('File too large — 15MB max'); fileEl.value=''; return; }
  toast(`Uploading ${file.name}…`);
  try{
    const safe=file.name.replace(/[^\w.\-]+/g,'_');
    const ref=storage.ref(`marketplace-npi/${id}/${ti}-${Date.now()}-${safe}`);
    await ref.put(file);
    const url=await ref.getDownloadURL();
    const ts=tasksOf(l).map(t=>Object.assign({},t));
    ts[ti].fileUrl=url; ts[ti].fileName=file.name;
    const logs=(Array.isArray(l.log)?l.log:Object.values(l.log||{})).slice();
    logs.push({text:`📎 File uploaded for “${ts[ti].label}”: ${file.name}`,ts:nowTs()});
    await db.ref().update({['marketplace-npi/launches/'+id+'/tasks']:ts,['marketplace-npi/launches/'+id+'/log']:logs});
    toast(`✓ Uploaded ${file.name}`);
  }catch(e){ console.error(e); toast('Upload failed — '+((e&&e.code)||e)); fileEl.value=''; }
}

async function _advance(id){
  const l=LAUNCHES[id]; if(!l)return;
  const cur=l.stage, nxt=nextStageKey(cur); if(!nxt)return;
  const sm=stageMeta(cur), nm=stageMeta(nxt);
  const log=(Array.isArray(l.log)?l.log:Object.values(l.log||{})).slice();
  if(nxt==='live'){
    log.push({text:'🎉 LIVE on shelf',ts:nowTs()});
    await db.ref().update({['marketplace-npi/launches/'+id+'/stage']:'live',['marketplace-npi/launches/'+id+'/log']:log,['marketplace-npi/launches/'+id+'/liveDate']:Date.now()});
    toast(l.name+' is LIVE on shelf 🎉'); return;
  }
  log.push({text:`Stage → ${nm.label} · ${nm.dept} notified`,ts:nowTs()});
  await db.ref().update({['marketplace-npi/launches/'+id+'/stage']:nxt,['marketplace-npi/launches/'+id+'/stageEnteredAt']:Date.now(),['marketplace-npi/launches/'+id+'/log']:log});
  const r=await sendEmail(recipientFor(nm.dept),nm.dept,l,{stage:nm.label,message:actionMessage(l,nm)});
  toast(r.ok?('Pushed to '+nm.dept+' · email sent'):('Pushed to '+nm.dept+(NOTIFY?' · email failed':' · notify off')));
}
window._advance=_advance;

async function submitIntake(){
  const f=document.getElementById('intakeForm');
  const v=k=>{const el=f.elements.namedItem(k);return el?(el.value||'').trim():'';};
  const name=v('sku');
  if(!name){ toast('SKU Name required'); document.getElementById('iSku').focus(); return; }
  const brand=v('brandName')||'Unknown';
  const cat =v('category')||'Uncategorized';
  const type=v('type')||'CPG';

  const btn=document.getElementById('intakeSubmit');
  if(btn) btn.disabled=true;
  try {
    const uid=p=>p+Math.random().toString(36).slice(2,11);
    const now=Date.now();
    const upd={};

    // Reuse brand if name matches; otherwise create + populate full Brand Info.
    let brandId=Object.keys(BRANDS).find(id=>(BRANDS[id].name||'').toLowerCase()===brand.toLowerCase());
    if(!brandId){
      brandId=uid('b');
      upd['marketplace-npi/brands/'+brandId]={
        id:brandId, name:brand, category:cat,
        status:'Proposed', source:'Added in app', createdAt:now,
        founderName:v('founderName'), email:v('email'), phone:v('phone'),
        website:v('website'), distributor:v('primaryDistribution'),
        contact:v('founderName'), notes:''
      };
    } else {
      // Fold any newly-provided Brand Info into the existing brand record
      // without clobbering fields the user left blank in this intake.
      const merge={};
      const fold=(k,val)=>{ if(val) merge['marketplace-npi/brands/'+brandId+'/'+k]=val; };
      fold('founderName',v('founderName'));
      fold('email',v('email'));
      fold('phone',v('phone'));
      fold('website',v('website'));
      fold('distributor',v('primaryDistribution'));
      Object.assign(upd,merge);
    }

    let maxCode=0;
    Object.values(LAUNCHES).forEach(l=>{const m=/(\d+)\s*$/.exec(l.code||'');if(m)maxCode=Math.max(maxCode,+m[1]);});
    const id=uid('l');
    // CPG and Private Label run different checklists (different vendor
    // model) — buildTasks(type) picks the right template set.
    const tmpl=buildTasks(type);

    upd['marketplace-npi/launches/'+id]={
      id, brandId, name, type,
      code:'NPI-2026-'+String(maxCode+1).padStart(3,'0'),
      category:cat,
      // Product Info (the full set from the intake form)
      sku:name, upc:v('upc'),
      unitSize:v('unitSize'), casePack:v('casePack'),
      productDim:v('productDim'), caseDim:v('caseDim'),
      cost:v('cost'), msrp:v('msrp'), moq:v('moq'),
      shelfLife:v('shelfLife'), storageReq:v('storageReq'),
      leadTime:v('leadTime'),
      primaryDistribution:v('primaryDistribution'),
      notes:v('notes'),
      launchDate:'', priority:'Med',
      stage:'discovery', stageEnteredAt:now, createdAt:now,
      triggersFired:[],
      log:[{text:`🚀 New ${type} product added — process started`,ts:nowTs()}],
      tasks:tmpl
    };

    await db.ref().update(upd);

    // Kickoff broadcast — every team is notified now, then again when its
    // stage goes active. Keeps procurement / compliance heads-up so they
    // can plan ahead.
    if(NOTIFY){
      const nl=upd['marketplace-npi/launches/'+id];
      const msg=`🚀 New product added — ${name} (${brand}, ${type}). The launch process has officially begun. Each team will be notified automatically when it's your turn — nothing to do yet. Follow progress on the NPI pipeline.`;
      DEPTS.forEach(d=>sendEmail(recipientFor(d),d,nl,{stage:'Discovery',message:msg}));
    }
    toast('Added '+name);
    closeIntake();
    openDrawer(id);
  } catch(err) {
    console.error('[intake] save failed', err);
    toast('Save failed — check console');
  } finally {
    if(btn) btn.disabled=false;
  }
}

/* ---------------- gantt tab ---------------- */
function renderGantt(){
  const inproc=Object.values(LAUNCHES).filter(l=>l.stage!=='live'&&l.stage!=='review')
    .sort((a,b)=>stageIdx(b.stage)-stageIdx(a.stage)||(a.name||'').localeCompare(b.name||''));
  const stale=SETTINGS.staleDays||3;
  const gcols=`--gn:${PIPE.length}`;
  const head=`<div class="grow head" style="${gcols}"><div class="lbl">Product</div>${PIPE.map(s=>`<div>${esc(s.label.split(' ')[0])}</div>`).join('')}<div>Ready</div></div>`;
  const rows=inproc.map(l=>{
    const ci=stageIdx(l.stage);
    const cells=PIPE.map((s,i)=>{
      let cls='gcell',style='';
      if(i<ci){cls+=' done';style=`background:${s.color}`;}
      else if(i===ci){cls+=' cur';style=`background:${s.color}`;}
      return `<div class="${cls}" style="${style}" title="${esc(s.label)}"></div>`;
    }).join('');
    const days=l.stageEnteredAt?Math.floor((Date.now()-l.stageEnteredAt)/86400000):0;
    const stall=days>stale;
    return `<div class="grow" data-id="${l.id}" style="cursor:pointer;${gcols}"><div class="glabel">${esc(l.name||'')}<small>${esc(brandName(l))} · ${esc(l.code||'')}</small></div>${cells}<div class="gmeta"><span class="r">${readiness(l)}%</span><br><span class="${stall?'stall':''}">${days}d</span></div></div>`;
  }).join('');
  $('view').innerHTML=`<h1>Pipeline Gantt</h1><p class="sub">${inproc.length} products in process · stage-by-stage progress. Filled = stage complete · striped = in progress now.</p>
    <div class="gantt">${head}${rows||'<div class="empty">No products in process.</div>'}</div>
    <div class="legend">${PIPE.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.label)}</span>`).join('')}</div>`;
  document.querySelectorAll('.gantt .grow[data-id]').forEach(r=>r.onclick=()=>openDrawer(r.dataset.id));
}

    <div class="setbox" style="margin-top:18px">

      <button class="savebtn" id="testEmailBtn" style="background:#3f7a52">Email me sample notifications</button>
    </div>`;
  const bindRemove=btn=>{btn.onclick=()=>btn.closest('.emailrow').remove();};
  document.querySelectorAll('.rmmail').forEach(bindRemove);
  document.querySelectorAll('.addmail').forEach(b=>b.onclick=()=>{
    const row=document.createElement('div'); row.innerHTML=emailRowHtml(b.dataset.add,'');
    const el=row.firstElementChild; b.parentElement.insertBefore(el,b);
    bindRemove(el.querySelector('.rmmail')); el.querySelector('input').focus();
  });
  $('saveSet').onclick=async()=>{
    const te2={}; document.querySelectorAll('input[data-dept]').forEach(i=>{const v=i.value.trim(); if(!v) return; const d=i.dataset.dept; te2[d]=te2[d]?te2[d]+', '+v:v;});
    await db.ref('marketplace-npi/settings').update({teamEmails:te2, staleDays:+($('staleInp').value)||3});
    toast('Settings saved');
  };
  $('backfillBtn').onclick=backfillTasks;
  $('testEmailBtn').onclick=sendTestEmails;
}

const TEST_EMAIL='kallmeroth@beneighborly.com, jbrooks@beneighborly.com';
/* Send one of every notification type to TEST_EMAIL using a throwaway sample
   launch — so you can preview exactly what each team gets. Sends sequentially
   to respect EmailJS rate limits. Writes nothing to the database. */
async function sendTestEmails(){
  if(!window.emailjs){ toast('EmailJS not loaded'); return; }
  if(!confirm(`Send a full set of sample emails to ${TEST_EMAIL}? (about a dozen, one of each type)`)) return;
  const wasNotify=NOTIFY; NOTIFY=true;
  const prevBrand=BRANDS['__testbrand']; BRANDS['__testbrand']={id:'__testbrand',name:'Sample Brand'};
  const sample={id:'TESTLAUNCH',name:'Test Product',brandId:'__testbrand',category:'Pantry',launchDate:'',stage:'discovery',tasks:buildTasks()};
  const jobs=[];
  // new-product broadcast
  jobs.push({team:'Marketplace',vars:{stage:'Discovery',message:`🚀 [TEST] New product added — ${sample.name} (Sample Brand). The launch process has officially begun. Each team will be notified automatically when it's your turn — nothing to do yet.`}});
  // each stage's "it's your turn" handoff
  STAGES.filter(s=>s.dept&&s.dept!=='—').forEach(s=>jobs.push({team:s.dept,vars:{stage:s.label,message:`[TEST · ${s.dept} handoff] `+actionMessage(sample,s)}}));
  // a cross-team dependency ping
  jobs.push({team:'Inventory',vars:{stage:'W-9',message:'[TEST · cross-team ping] Vendor documents cleared — safe to create the R365/Synergy item & SKU. '+HUB_URL+'#'+sample.id}});
  // a stage-complete nudge
  jobs.push({team:'Procurement',vars:{stage:'Commercial',message:`[TEST · stage complete] ✅ All your Commercial tasks for ${sample.name} are done — great work! Last step: open the hub and tap "Push to Compliance" to hand it to the next team. `+HUB_URL+'#'+sample.id}});
  toast(`Sending ${jobs.length} sample emails to ${TEST_EMAIL}…`);
  let ok=0,fail=0;
  for(const j of jobs){ const r=await sendEmail(TEST_EMAIL,j.team,sample,j.vars); if(r&&r.ok)ok++; else fail++; await new Promise(res=>setTimeout(res,1200)); }
  if(prevBrand) BRANDS['__testbrand']=prevBrand; else delete BRANDS['__testbrand'];
  NOTIFY=wasNotify;
  toast(`✓ ${ok} sample emails sent${fail?` · ${fail} failed`:''} to ${TEST_EMAIL}`,fail?'#a32d2d':'');
}

/* One-time migration: bring already-imported launches up to the v2 checklist.
   Conservative + idempotent — matches tasks by (stage,label), enriches matches
   with owner/def/notify/blocking, ADDS any missing template tasks (incl. the
   whole W-9 stage), and never removes a task or clears a completion. */
async function backfillTasks(){
  const launches=Object.values(LAUNCHES);
  if(!launches.length){ toast('No products to back-fill.'); return; }
  const upd={}; let patched=0, added=0, touched=0;
  launches.forEach(l=>{
    // Pick the right template set for this launch's type — CPG launches
    // never get PL tasks injected (and vice versa), so back-fill is safe
    // to run across the whole pipeline regardless of mix.
    const tpls=(l.type==='Private Label')?PL_TASK_TEMPLATES:TASK_TEMPLATES;
    const cur=tasksOf(l).map(t=>Object.assign({},t)); let changed=false;
    cur.forEach(t=>{
      const tpl=tpls.find(x=>x.stage===t.stage&&x.label===t.label); if(!tpl) return;
      const before=JSON.stringify([t.owner,t.def,t.notify,t.notifyMsg,t.blocking,t.file]);
      t.owner=t.owner||tpl.owner||''; t.def=t.def||tpl.def||'';
      t.notify=t.notify||tpl.notify||''; t.notifyMsg=t.notifyMsg||tpl.notifyMsg||'';
      if(t.blocking===undefined) t.blocking=tpl.blocking!==false;
      if(t.file===undefined) t.file=tpl.file===true;
      if(JSON.stringify([t.owner,t.def,t.notify,t.notifyMsg,t.blocking,t.file])!==before){ changed=true; patched++; }
    });
    tpls.forEach(tpl=>{
      if(cur.some(t=>t.stage===tpl.stage&&t.label===tpl.label)) return;
      cur.push({stage:tpl.stage,dept:tpl.dept,label:tpl.label,owner:tpl.owner||'',def:tpl.def||'',notify:tpl.notify||'',notifyMsg:tpl.notifyMsg||'',blocking:tpl.blocking!==false,file:tpl.file===true,inputs:Array.isArray(tpl.inputs)?tpl.inputs:[],values:{},done:false,doneAt:null});
      changed=true; added++;
    });
    if(changed){ upd['marketplace-npi/launches/'+l.id+'/tasks']=cur; touched++; }
  });
  if(!touched){ toast('Already up to date — nothing to back-fill.'); return; }
  if(!confirm(`Back-fill ${touched} product(s)?\n\n• ${patched} existing task(s) enriched with owner / definition-of-done\n• ${added} task(s) added (the right template set per product type)\n\nEvery completed task is preserved. Safe to re-run.`)) return;
  await db.ref().update(upd);
  toast(`✓ Back-fill done · ${touched} products · ${patched} enriched · ${added} added`);
}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
</script>
