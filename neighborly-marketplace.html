<style>
  :root{
    --mp:#5a4a7a; --mp-light:#f0eff5; --mp-deep:#5a4a7a;
  }
  *{box-sizing:border-box;}

  /* Neighborly-orange scrollbars (this page only) */
  *{ scrollbar-width:thin; scrollbar-color:var(--brand-orange) transparent; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--brand-orange); border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover{ background:var(--brand-orange-deep); }
  .np-nav-page-tag.mp{ background:var(--mp-light); color:var(--mp-deep); }

  /* ---- header row ---- */
  .mp-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:var(--s-4); flex-wrap:wrap; }
  .mp-head h1{ font-family:var(--f-sans); font-weight:700; font-size:var(--t-section); margin:0; line-height:1.15; color:var(--ink); }
  .mp-head .eyebrow{ font-family:var(--f-eyebrow); font-size:var(--t-eyebrow); letter-spacing:.1em; text-transform:uppercase; color:var(--mp-deep); }
  .mp-actions{ display:flex; gap:8px; flex-wrap:wrap; }

  /* ---- process overview strip (sleek, collapsible) ---- */
  .mp-process{ background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--r-lg); padding:14px 16px 5px; margin-bottom:16px; }
  .mp-process-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:13px; }
  .mp-process-title{ font-family:var(--f-eyebrow); font-size:var(--t-eyebrow); letter-spacing:.1em; text-transform:uppercase; color:var(--text-2); font-weight:600; display:flex; align-items:baseline; gap:11px; flex-wrap:wrap; }
  .mp-process-sub{ font-family:var(--f-sans); font-size:11px; letter-spacing:0; text-transform:none; color:var(--text-3); font-weight:500; }
  .mp-process-toggle{ border:1px solid var(--line-strong); background:var(--surface); color:var(--text-3); font-size:11px; font-weight:600; padding:5px 12px; border-radius:var(--r-pill); cursor:pointer; transition:.15s; white-space:nowrap; }
  .mp-process-toggle:hover{ border-color:var(--line-bold); color:var(--text-2); }
  .mp-process.collapsed .mp-process-flow{ display:none; }
  .mp-process-flow{ display:flex; align-items:stretch; gap:0; overflow-x:auto; padding-bottom:12px; }
  .mp-pstage{ flex:1 0 152px; min-width:152px; border-top:3px solid var(--c); background:var(--surface-2); border-radius:0 0 var(--r-md) var(--r-md); padding:10px 12px 11px; display:flex; flex-direction:column; }
  .mp-pstage .pteam{ font-size:12px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:7px; }
  .mp-pstage .pteam .d{ width:8px; height:8px; border-radius:50%; background:var(--c); flex:0 0 auto; }
  .mp-pstage .pstg{ font-size:10.5px; color:var(--text-3); margin:3px 0 10px 15px; }
  .mp-pstage .ptrig{ margin-top:auto; font-size:10px; color:var(--text-2); display:flex; align-items:center; gap:5px; border-top:1px dashed var(--line-strong); padding-top:8px; }
  .mp-pstage .ptrig .env{ color:var(--brand-orange); }
  .mp-pstage .ptrig b{ color:var(--text); font-weight:700; }
  .mp-parrow{ flex:0 0 22px; display:flex; align-items:center; justify-content:center; color:var(--text-mute); }
  .mp-plive{ flex:0 0 auto; align-self:center; display:flex; align-items:center; gap:7px; background:var(--brand-green-light); color:var(--brand-green-deep); font-size:11px; font-weight:700; padding:9px 14px; border-radius:var(--r-pill); margin-left:4px; white-space:nowrap; }
  .mp-plive .d{ width:7px; height:7px; border-radius:50%; background:var(--brand-green-deep); }

  .mp-btn{ display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line-strong); background:var(--surface);
    color:var(--text); font-family:var(--f-sans); font-size:13px; font-weight:600; padding:9px 14px; border-radius:var(--r-pill);
    cursor:pointer; transition:.15s; white-space:nowrap; }
  .mp-btn:hover{ border-color:var(--line-bold); background:var(--surface-2); }
  .mp-btn.primary{ background:var(--mp); border-color:var(--mp); color:#fff; }
  .mp-btn.primary:hover{ background:var(--mp-deep); }
  .mp-btn.sm{ padding:6px 11px; font-size:12px; }
  .mp-btn svg{ width:15px; height:15px; }

  /* ---- tabs ---- */
  .mp-tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line-strong); margin-bottom:var(--s-4); overflow-x:auto; }
  .mp-tab{ border:none; background:none; font-family:var(--f-sans); font-size:13px; font-weight:600; color:var(--text-3);
    padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; display:flex; align-items:center; gap:6px; }
  .mp-tab.active{ color:var(--mp-deep); border-bottom-color:var(--mp); }
  .mp-tab .count{ background:var(--surface-2); color:var(--text-3); font-size:10px; font-weight:700; padding:1px 6px; border-radius:var(--r-pill); }
  .mp-tab.active .count{ background:var(--mp-light); color:var(--mp-deep); }
  .mp-tab .ph{ display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%; background:var(--surface-2); color:var(--text-3); font-family:var(--f-mono); font-size:9px; font-weight:700; margin-right:6px; }
  .mp-tab.active .ph{ background:var(--mp); color:#fff; }

  /* ---- KPI strip ---- */
  .mp-kpis{ display:grid; grid-template-columns:repeat(5,1fr); gap:var(--s-3); margin-bottom:var(--s-4); }
  @media(max-width:760px){ .mp-kpis{ grid-template-columns:repeat(2,1fr); } }
  .mp-kpi{ background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--r-lg); padding:12px 14px; }
  .mp-kpi .l{ font-size:var(--t-caption-sm); color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
  .mp-kpi .v{ font-family:var(--f-mono); font-size:24px; color:var(--text); margin-top:3px; line-height:1; }
  .mp-kpi .s{ font-size:11px; color:var(--text-3); margin-top:3px; }

  /* ---- board ---- */
  .mp-board{ display:flex; gap:12px; overflow-x:auto; padding:8px 4px 18px; }
  .mp-col{ flex:0 0 268px; width:268px; background:var(--surface-2); border-radius:var(--r-lg); padding:10px; display:flex; flex-direction:column; }
  .mp-col-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; padding:0 2px; }
  .mp-col-title{ display:flex; align-items:center; gap:7px; font-size:12px; font-weight:700; color:var(--text); }
  .mp-col-title .dot{ width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
  .mp-col-owner{ font-size:10px; color:var(--text-3); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .mp-col-count{ font-size:11px; font-weight:700; color:var(--text-3); }
  .mp-col-body{ display:flex; flex-direction:column; gap:8px; min-height:24px; }

  .mp-card{ background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--r-md); padding:11px 12px; cursor:pointer; transition:.15s; }
  .mp-card:hover{ border-color:var(--line-bold); box-shadow:0 4px 14px rgba(31,35,40,.06); }
  .mp-card .code{ font-family:var(--f-mono); font-size:10px; color:var(--text-3); letter-spacing:.02em; }
  .mp-card .brand{ font-size:11px; color:var(--mp-deep); font-weight:700; text-transform:uppercase; letter-spacing:.03em; margin-top:2px; }
  .mp-card .name{ font-size:14px; font-weight:600; color:var(--text); line-height:1.25; margin-top:1px; }
  .mp-card .meta{ display:flex; align-items:center; gap:8px; margin-top:9px; flex-wrap:wrap; }
  .mp-pri{ font-size:9.5px; font-weight:800; padding:2px 7px; border-radius:var(--r-pill); text-transform:uppercase; letter-spacing:.04em; }
  .mp-pri.High{ background:var(--brand-orange-light); color:var(--brand-orange-deep); }
  .mp-pri.Med{ background:var(--brand-yellow-light); color:var(--brand-yellow-deep); }
  .mp-pri.Low{ background:var(--surface-2); color:var(--text-3); }
  .mp-date{ font-size:11px; color:var(--text-3); display:inline-flex; align-items:center; gap:4px; }
  .mp-date.soon{ color:var(--brand-orange-deep); font-weight:700; }

  /* readiness bar */
  .mp-ready{ margin-top:9px; }
  .mp-ready .track{ height:5px; background:var(--surface-2); border-radius:var(--r-pill); overflow:hidden; }
  .mp-ready .fill{ height:100%; border-radius:var(--r-pill); transition:width .3s; }
  .mp-ready .lbl{ display:flex; justify-content:space-between; font-size:10px; color:var(--text-3); margin-top:4px; }
  .mp-ready .lbl b{ color:var(--text-2); font-family:var(--f-mono); }

  .mp-card .advance{ margin-top:9px; width:100%; justify-content:center; }

  /* per-card start→finish stepper */
  .mp-card-steps{ display:flex; gap:3px; margin-top:10px; }
  .mp-card-steps i{ flex:1; height:3px; border-radius:2px; background:var(--surface-2); transition:background .3s; }
  .mp-card-steps i.done{ background:var(--brand-green); }

  /* ---- pipeline overview rail (whole funnel, start → finish) ---- */
  .mp-rail{ display:flex; align-items:center; gap:1px; overflow-x:auto; background:var(--surface); border:1px solid var(--line-strong);
    border-radius:var(--r-lg); padding:12px 14px; margin-bottom:16px; }
  .mp-rail-lead{ flex:0 0 auto; padding-right:14px; margin-right:8px; border-right:1px solid var(--line); text-align:center; }
  .mp-rail-lead .t{ font-family:var(--f-eyebrow); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-3); }
  .mp-rail-lead .v{ font-family:var(--f-mono); font-size:22px; line-height:1; color:var(--mp-deep); margin-top:3px; }
  .mp-rail-node{ flex:0 0 auto; min-width:78px; text-align:center; padding:4px 6px 5px; border-radius:var(--r-md); cursor:pointer; transition:background .15s, transform .15s; }
  .mp-rail-node:hover{ background:var(--surface-2); transform:translateY(-1px); }
  .mp-rail-node .cnt{ font-family:var(--f-mono); font-size:20px; line-height:1; font-weight:600; color:var(--text); }
  .mp-rail-node.empty .cnt{ color:var(--text-mute); }
  .mp-rail-node .lbl{ display:flex; align-items:center; justify-content:center; gap:5px; font-size:9.5px; font-weight:700; color:var(--text-3);
    text-transform:uppercase; letter-spacing:.02em; margin-top:7px; white-space:nowrap; }
  .mp-rail-node .lbl .d{ width:7px; height:7px; border-radius:50%; flex:0 0 auto; }
  .mp-rail-arrow{ flex:0 0 auto; color:var(--text-mute); font-size:15px; padding:0 1px; align-self:flex-start; margin-top:5px; }

  /* ---- detail slide-over ---- */
  .mp-overlay{ position:fixed; inset:0; background:rgba(31,35,40,.32); opacity:0; pointer-events:none; transition:.2s; z-index:200; }
  .mp-overlay.open{ opacity:1; pointer-events:auto; }
  .mp-panel{ position:fixed; top:0; right:0; height:100%; width:min(560px,100%); background:var(--surface);
    box-shadow:-10px 0 40px rgba(31,35,40,.14); transform:translateX(100%); transition:transform .25s var(--easing); z-index:201; overflow-y:auto; }
  .mp-panel.open{ transform:translateX(0); }
  .mp-panel-head{ position:sticky; top:0; background:var(--surface); border-bottom:1px solid var(--line); padding:18px 22px 14px; z-index:2; }
  .mp-panel-head .row{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .mp-panel-head .code{ font-family:var(--f-mono); font-size:11px; color:var(--text-3); }
  .mp-panel-head h2{ font-family:var(--f-amp); font-size:22px; margin:3px 0 0; line-height:1.1; }
  .mp-panel-head .brand{ font-size:12px; color:var(--mp-deep); font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-top:3px; }
  .mp-close{ border:none; background:var(--surface-2); width:32px; height:32px; border-radius:50%; cursor:pointer; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:var(--text-2); }
  .mp-close:hover{ background:var(--line-strong); }
  .mp-panel-body{ padding:18px 22px 60px; }

  /* stage stepper */
  .mp-stepper{ display:flex; gap:4px; margin:14px 0 6px; overflow-x:auto; padding-bottom:4px; }
  .mp-step{ flex:1 0 auto; min-width:0; }
  .mp-step .bar{ height:5px; border-radius:var(--r-pill); background:var(--surface-2); }
  .mp-step.done .bar{ background:var(--brand-green); }
  .mp-step.cur .bar{ background:var(--mp); }
  .mp-step .t{ font-size:9px; color:var(--text-3); margin-top:4px; white-space:nowrap; }
  .mp-step.cur .t{ color:var(--mp-deep); font-weight:700; }

  .mp-stage-row{ display:flex; align-items:center; gap:10px; margin:14px 0; flex-wrap:wrap; }
  .mp-stage-chip{ display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:700; padding:7px 14px; border-radius:var(--r-pill); }
  .mp-ring{ position:relative; width:54px; height:54px; flex:0 0 auto; }
  .mp-ring svg{ transform:rotate(-90deg); }
  .mp-ring .pct{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--f-mono); font-size:14px; font-weight:600; }

  .mp-sec{ margin-top:22px; }
  .mp-sec-title{ font-family:var(--f-eyebrow); font-size:var(--t-eyebrow); letter-spacing:.1em; text-transform:uppercase; color:var(--text-3); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .mp-sec-title .pct{ font-family:var(--f-mono); margin-left:auto; color:var(--text-2); }

  /* dept task group */
  .mp-dept{ border:1px solid var(--line-strong); border-radius:var(--r-lg); margin-bottom:10px; overflow:hidden; }
  .mp-dept-head{ display:flex; align-items:center; gap:9px; padding:11px 14px; cursor:pointer; background:var(--surface); }
  .mp-dept-head:hover{ background:var(--surface-2); }
  .mp-dept-head .dot{ width:9px; height:9px; border-radius:50%; }
  .mp-dept-head .nm{ font-size:13px; font-weight:700; color:var(--text); }
  .mp-dept-head .mini{ margin-left:auto; display:flex; align-items:center; gap:9px; }
  .mp-dept-head .minibar{ width:64px; height:5px; background:var(--surface-2); border-radius:var(--r-pill); overflow:hidden; }
  .mp-dept-head .minibar i{ display:block; height:100%; }
  .mp-dept-head .mpct{ font-family:var(--f-mono); font-size:11px; color:var(--text-3); min-width:34px; text-align:right; }
  .mp-dept-head .chev{ width:14px; height:14px; color:var(--text-3); transition:transform .2s; }
  .mp-dept.open .chev{ transform:rotate(90deg); }
  .mp-tasks{ display:none; padding:4px 14px 12px; border-top:1px solid var(--line); }
  .mp-dept.open .mp-tasks{ display:block; }
  .mp-task{ display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); }
  .mp-task:last-child{ border-bottom:none; }
  .mp-check{ width:19px; height:19px; border:2px solid var(--line-bold); border-radius:6px; flex:0 0 auto; cursor:pointer; margin-top:1px; display:flex; align-items:center; justify-content:center; background:var(--surface); transition:.15s; }
  .mp-check.on{ background:var(--brand-green-deep); border-color:var(--brand-green-deep); }
  .mp-check svg{ width:12px; height:12px; color:#fff; opacity:0; }
  .mp-check.on svg{ opacity:1; }
  .mp-task .body{ flex:1; min-width:0; }
  .mp-task .lab{ font-size:13px; color:var(--text); line-height:1.3; }
  .mp-task.done .lab{ color:var(--text-3); text-decoration:line-through; }
  .mp-task .sub{ font-size:10.5px; color:var(--text-3); margin-top:2px; }

  /* spec grid */
  .mp-specs{ display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line-strong); border:1px solid var(--line-strong); border-radius:var(--r-lg); overflow:hidden; }
  .mp-spec{ background:var(--surface); padding:10px 13px; }
  .mp-spec .l{ font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:.05em; font-weight:600; }
  .mp-spec .v{ font-size:13px; color:var(--text); margin-top:2px; font-weight:500; }

  /* activity log */
  .mp-log{ list-style:none; padding:0; margin:0; }
  .mp-log li{ display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:12px; color:var(--text-2); }
  .mp-log li:last-child{ border-bottom:none; }
  .mp-log .ts{ font-family:var(--f-mono); font-size:10px; color:var(--text-3); flex:0 0 92px; }

  /* ---- brand CRM table ---- */
  .mp-table-wrap{ background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--r-lg); overflow:hidden; overflow-x:auto; }
  table.mp-table{ width:100%; border-collapse:collapse; font-size:13px; min-width:680px; }
  .mp-table th{ text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); font-weight:700; padding:11px 14px; border-bottom:1px solid var(--line-strong); white-space:nowrap; }
  .mp-table td{ padding:11px 14px; border-bottom:1px solid var(--line); color:var(--text-2); vertical-align:middle; }
  .mp-table tr:last-child td{ border-bottom:none; }
  .mp-table tr.clickable{ cursor:pointer; }
  .mp-table tr.clickable:hover td{ background:var(--surface-2); }
  .mp-table .bn{ font-weight:700; color:var(--text); }
  .mp-status{ font-size:10px; font-weight:800; padding:3px 9px; border-radius:var(--r-pill); text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; }
  .mp-status.Prospect{ background:var(--surface-2); color:var(--text-3); }
  .mp-status.Testing{ background:var(--brand-yellow-light); color:var(--brand-yellow-deep); }
  .mp-status.Approved{ background:var(--brand-blue-light); color:var(--brand-blue-deep); }
  .mp-status.Active{ background:var(--brand-green-light); color:var(--brand-green-deep); }
  .mp-status.Rejected{ background:var(--brand-orange-light); color:var(--brand-orange-deep); }

  /* ---- team dashboard ---- */
  .mp-team-bar{ display:flex; align-items:center; gap:8px; margin-bottom:var(--s-4); flex-wrap:wrap; }
  .mp-team-pill{ border:1px solid var(--line-strong); background:var(--surface); border-radius:var(--r-pill); padding:7px 14px; font-size:12px; font-weight:600; cursor:pointer; color:var(--text-2); display:inline-flex; align-items:center; gap:7px; }
  .mp-team-pill .dot{ width:8px; height:8px; border-radius:50%; }
  .mp-team-pill.active{ border-color:var(--mp); background:var(--mp-light); color:var(--mp-deep); }
  .mp-team-pill .n{ font-family:var(--f-mono); font-size:11px; opacity:.8; }
  .mp-tasklist{ display:flex; flex-direction:column; gap:8px; }
  .mp-trow{ display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--r-md); padding:11px 14px; }
  .mp-trow .body{ flex:1; min-width:0; }
  .mp-trow .lab{ font-size:14px; font-weight:600; color:var(--text); }
  .mp-trow .ctx{ font-size:11px; color:var(--text-3); margin-top:2px; }
  .mp-trow .ctx a{ color:var(--mp-deep); font-weight:600; text-decoration:none; }

  /* ---- modal ---- */

/* ---------------------------------------------------------------- STATE ---- */
function defaultSettings(){ return { notifyEmail:false, teamEmails:{} }; }
let state = { brands:{}, launches:{}, settings:defaultSettings() };
let openLaunchId = null;
let teamFilter = 'Marketplace';
let ganttPx = 18;
let _bootstrapped = false;
const revealed = {};

/* ---------------------------------------------------------------- UTIL ----- */
const $ = s => document.querySelector(s);
const uid = p => p + Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-3);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmtDate(d){ if(!d) return '—'; const x=new Date(d+'T12:00:00'); return isNaN(x)?'—':x.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function daysUntil(d){ if(!d) return null; const x=new Date(d+'T12:00:00'), n=new Date(); n.setHours(12,0,0,0); return Math.round((x-n)/864e5); }
function nowTs(){ return new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
function brandName(id){ return (state.brands[id]||{}).name || '—'; }
/* active pipeline = everything that hasn't been rejected/archived */
function liveLaunches(){ return Object.values(state.launches).filter(l=>!l.archived); }

/* ---------------------------------------------------------------- FIREBASE - */
let _saveT = null;
function save(){
  if(_saveT) clearTimeout(_saveT);
  _saveT = setTimeout(()=>{
    if(window.__fbDb){ try { __fbDb.ref(CONFIG.FB_PATH).set(state); } catch(e){ console.warn('save failed',e); } }
  }, 250);
}
function subscribe(){
  if(!window.__fbDb){ bootstrapIfEmpty(); renderAll(); return; }
  __fbDb.ref(CONFIG.FB_PATH).on('value', snap=>{
    const v = snap.val();
    state = { brands:(v&&v.brands)||{}, launches:(v&&v.launches)||{}, settings:(v&&v.settings)||defaultSettings() };
    // normalise: ensure tasks object exists
    Object.values(state.launches).forEach(l=>{ if(!l.tasks) l.tasks={}; if(!l.log) l.log=[]; });
    bootstrapIfEmpty();
    renderAll();
    if(openLaunchId && state.launches[openLaunchId]) renderDetail(openLaunchId);
  });
}

/* ---------------------------------------------------------------- TASKS ---- */
function buildTasks(){
  const t = {};
  TASK_TEMPLATES.forEach((tpl,i)=>{
    t['t'+i] = { label:tpl.label, dept:tpl.dept, stage:tpl.stage, done:false, owner:'', doneAt:null,
      notify:tpl.notify||null, notifyMsg:tpl.notifyMsg||'' };
  });
  return t;
}
function readiness(l){
  const tasks = Object.values(l.tasks||{});
  const live = tasks.filter(t=>t.stage!=='review'); // review tasks excluded from launch readiness
  const done = live.filter(t=>t.done).length;
  const overall = live.length ? Math.round(done/live.length*100) : 0;
  const byDept = {};
  DEPTS.forEach(d=>{
    const dt = tasks.filter(t=>t.dept===d.key);
    byDept[d.key] = { total:dt.length, done:dt.filter(t=>t.done).length };
  });
  return { overall, byDept, done, total:live.length };
}
function stageReady(l, stageKey){
  const dt = Object.values(l.tasks||{}).filter(t=>t.stage===stageKey);
  if(!dt.length) return true;
  return dt.every(t=>t.done);
}

/* ---------------------------------------------------------------- AUTOMATION */
function logEvent(l, text){ (l.log = l.log||[]).unshift({ ts:nowTs(), text }); if(l.log.length>40) l.log.length=40; }

function advanceStage(id, toKey){
  const l = state.launches[id]; if(!l) return;
  const from = stageOf(l.stage), to = stageOf(toKey);
  const toIdx = stageIdx(toKey);

  // gate: can't reach Live until overall readiness >= LAUNCH_GATE
  if(toKey==='live'){
    const r = readiness(l);
    if(r.overall < CONFIG.LAUNCH_GATE){
      toast(`Can't launch yet — ${r.overall}% ready (need ${CONFIG.LAUNCH_GATE}%).`, null, '#a32d2d');
      return;
    }
  }
  l.stage = toKey;
  logEvent(l, `Stage → ${to.label}${to.dept!=='—'?'  ·  '+to.dept+' activated':''}`);

  // TRIGGER #1 — Marketplace approval → Procurement. Hand off the launch brief:
  // approved item name, requested case-pack qty for the free first fill, the
  // auto-calculated suggested launch date (approval date + 3 weeks), price and
  // distributor (auto-filled from the product/brand info).
  if(toKey==='commercial'){
    if(!l.launchDate){ l.launchDate = isoIn(21); logEvent(l, `Suggested launch date set ${fmtDate(l.launchDate)} (approval + 3 weeks)`); }
    const b = state.brands[l.brandId] || {};
    const distributor = l.primaryDist || b.distributor || '—';
    const price = l.msrp ? `$${l.msrp}` : (l.cost ? `$${l.cost} cost` : '—');
    const firstFill = l.casePack ? `${l.casePack}/case` : 'TBD';
    logEvent(l, `📋 Launch brief → Procurement · first fill ${firstFill} · ${price} · ${distributor}`);
    notifyTeam(l, 'Procurement',
      `Approved for launch: ${l.name} (${brandName(l.brandId)}). Requested case-pack qty for free first fill: ${firstFill}. Suggested launch date ${fmtDate(l.launchDate)}. Price ${price}. Distributor ${distributor}.`);
  } else if(to.dept && to.dept!=='—'){
    // AUTOMATION: notify the newly-responsible team & surface their tasks
    const dt = Object.values(l.tasks).filter(t=>t.stage===toKey);
    const open = dt.filter(t=>!t.done).length;
    notifyTeam(l, to.dept, `${to.label} stage is now active for ${l.name} (${brandName(l.brandId)}). ${open} task${open!==1?'s':''} assigned to ${to.dept}.`);
  }
  if(toKey==='live'){ logEvent(l, '🎉 Product is LIVE on shelf'); notifyTeam(l,'Marketplace',`${l.name} is LIVE.`); }
  save();
  renderAll();
  if(openLaunchId===id) renderDetail(id);
  toast(`Advanced to <b>${to.label}</b>`);
}

function toggleTask(id, taskId){
  const l = state.launches[id]; if(!l||!l.tasks[taskId]) return;
  const t = l.tasks[taskId];
  t.done = !t.done; t.doneAt = t.done ? Date.now() : null;
  // AUTOMATION: task-level notification triggers (e.g. planogram approval →
  // Marketplace, Toast button created → Inventory/ERP) fire on completion.
  if(t.done && t.notify){
    notifyTeam(l, t.notify, t.notifyMsg || `${t.label} completed for ${l.name} (${brandName(l.brandId)}).`);
  }
  save();
  // AUTOMATION: when a stage's tasks all complete, offer 1-click advance to next stage
  if(t.done && CONFIG.AUTO_ADVANCE){
    const sk = t.stage;
    if(stageReady(l, sk) && l.stage===sk){
      const ni = stageIdx(sk)+1;
      if(ni < STAGES.length){
        const next = STAGES[ni];
        const nextLabel = next.key;
        toast(`<b>${stageOf(sk).dept}</b> done for ${esc(l.name)} → advance to ${next.label}?`,
              { label:'Advance', fn:()=>advanceStage(id, nextLabel) }, null, 6000);
      }
    }
  }
  renderAll();
  if(openLaunchId===id) renderDetail(id);
}

function emailVars(l, dept, message){
  const base = location.href.split('#')[0].split('?')[0];
  return {
    to_name:     dept,
    team:        dept,
    launch:      l.name,
    brand:       brandName(l.brandId),
    stage:       stageOf(l.stage).label,
    launch_date: l.launchDate ? fmtDate(l.launchDate) : 'TBD',
    readiness:   readiness(l).overall + '%',
    accent:      deptColor(dept),
    link:        base,
    message:     message,
    // backward-compat with the existing calendar template's variable names:
    event_name:     `${l.name} — ${stageOf(l.stage).label} stage active`,
    event_date:     l.launchDate ? fmtDate(l.launchDate) : 'TBD',
    event_category: `${brandName(l.brandId)} · ${dept}`,
    event_notes:    message
  };
}

function notifyTeam(l, dept, message){
  logEvent(l, `🔔 ${dept} notified`);
  // outbound email — only if alerts are ON and this team has an address on file
  const s = state.settings || {};
  if(!s.notifyEmail || !window.emailjs) return;
  const to = (s.teamEmails && s.teamEmails[dept]) || '';
  if(!to) return;
  const vars = emailVars(l, dept, message); vars.to_email = to;
  try{
    emailjs.send(CONFIG.EMAILJS.serviceId, CONFIG.EMAILJS.templateId, vars)
      .then(()=>toast(`📧 Emailed ${dept}`))
      .catch(err=>{
        console.error('EmailJS error →', err);
        toast(`⚠️ Email to ${dept} failed — check console`, null, '#a32d2d');
      });
  }catch(e){ console.warn('EmailJS send failed', e); }
}

/* Auto-notify the brand/founder directly (intake confirmation, reject notice).
   Uses the brand's own email on file rather than a team address. */
function notifyBrand(l, message){
  const b = state.brands[l.brandId] || {};
  logEvent(l, `🔔 Brand notified — ${b.name||'brand'}`);
  const s = state.settings || {};
  if(!s.notifyEmail || !window.emailjs) return;
  const to = b.email || '';
  if(!to) return;
  const vars = emailVars(l, 'Marketplace', message);
  vars.to_email = to; vars.to_name = b.contact || b.name || 'there'; vars.team = b.name || 'Brand';
  try{
    emailjs.send(CONFIG.EMAILJS.serviceId, CONFIG.EMAILJS.templateId, vars)
      .then(()=>toast(`📧 Emailed ${esc(b.name||'brand')}`))
      .catch(err=>{ console.error('EmailJS error →', err); });
  }catch(e){ console.warn('EmailJS send failed', e); }
}

/* ---------------------------------------------------------------- TOASTS --- */
function toast(html, action, color, ms){
  const wrap = $('#mpToasts'); const el = document.createElement('div');
  el.className='mp-toast'; if(color) el.style.background=color;
  el.innerHTML = html;
  if(action){ const a=document.createElement('span'); a.className='act'; a.textContent=action.label; a.onclick=()=>{ action.fn(); el.remove(); }; el.appendChild(a); }
  wrap.appendChild(el); requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),250); }, ms||3600);
}

/* ---------------------------------------------------------------- RENDER --- */
function renderAll(){ renderKpis(); renderCounts(); renderBoard();
  if($('#tab-timeline').style.display!=='none') renderTimeline();
  if($('#tab-teams').style.display!=='none') renderTeams();
  if($('#tab-brands').style.display!=='none') renderBrands();
  if(!revealed._init){ revealed._init=true; setTimeout(()=>revealTab('board'),30); } }

/* add .mp-anim to a tab so its stagger animation plays once, then strip it so
   subsequent in-place re-renders (task toggles, advances) stay static */
function revealTab(name){ const el=$('#tab-'+name); if(!el) return; el.classList.add('mp-anim'); setTimeout(()=>el.classList.remove('mp-anim'),950); }
function countUp(el,to,suf,dur){ const t0=performance.now(); (function f(t){ const p=Math.min((t-t0)/dur,1); const e=1-Math.pow(1-p,3); el.textContent=Math.round(to*e)+(suf||''); if(p<1) requestAnimationFrame(f); })(performance.now()); }

function renderCounts(){
  const launches = liveLaunches();
  $('#cBoard').textContent = launches.filter(l=>l.stage!=='review'||true).length;
  let openTasks=0; launches.forEach(l=>Object.values(l.tasks||{}).forEach(t=>{ if(!t.done) openTasks++; }));
  $('#cTeams').textContent = openTasks;
  $('#cBrands').textContent = Object.keys(state.brands).length;
}

function renderKpis(){
  const launches = liveLaunches();
  const active = launches.filter(l=>!['live','review'].includes(l.stage));
  const live30 = launches.filter(l=>{ const d=daysUntil(l.launchDate); return d!=null && d>=0 && d<=30 && l.stage!=='live'; });
  const atRisk = active.filter(l=>{ const d=daysUntil(l.launchDate); return d!=null && d<7 && readiness(l).overall<CONFIG.LAUNCH_GATE; });
  const avgReady = active.length ? Math.round(active.reduce((a,l)=>a+readiness(l).overall,0)/active.length) : 0;
  const liveCount = launches.filter(l=>l.stage==='live').length;
  const k = [
    { l:'In pipeline', v:active.length, suf:'', s:'active launches' },
    { l:'Launching ≤30d', v:live30.length, suf:'', s:'next 30 days' },
    { l:'Avg readiness', v:avgReady, suf:'%', s:'across active' },
    { l:'At risk', v:atRisk.length, suf:'', s:'<7d & under gate' },
    { l:'Live', v:liveCount, suf:'', s:'on shelf' }
  ];
  const first = !revealed.kpi;
  const wrap = $('#mpKpis');
  wrap.innerHTML = k.map(x=>`<div class="mp-kpi"><div class="l">${x.l}</div><div class="v" data-to="${x.v}" data-suf="${x.suf}">${first?('0'+x.suf):(x.v+x.suf)}</div><div class="s">${x.s}</div></div>`).join('');
  if(first){
    revealed.kpi = true;
    wrap.classList.add('mp-anim'); setTimeout(()=>wrap.classList.remove('mp-anim'),950);
    wrap.querySelectorAll('.v').forEach(el=>countUp(el, +el.dataset.to, el.dataset.suf, 850));
  }
}

function renderBoard(){
  const cols = STAGES.filter(s=>s.key!=='review'); // review handled in detail; keep board focused
  const launches = liveLaunches();

  // pipeline overview rail — the whole funnel, start → finish, with live counts
  const counts = {}; launches.forEach(l=>{ counts[l.stage]=(counts[l.stage]||0)+1; });
  const activeCount = launches.filter(l=>!['live','review'].includes(l.stage)).length;
  const railNodes = STAGES.map((s,i)=>{
    const c = counts[s.key]||0;
    const node = `<div class="mp-rail-node ${c?'':'empty'}" onclick="MP.scrollStage('${s.key}')" title="${esc(s.label)}${s.dept!=='—'?' · '+esc(s.dept):''}">
      <div class="cnt">${c}</div>
      <div class="lbl"><span class="d" style="background:${s.color}"></span>${esc(s.label)}</div>
    </div>`;

  }).join('');

  const html = cols.map(s=>{
    const items = launches.filter(l=>l.stage===s.key).sort((a,b)=>(a.launchDate||'9').localeCompare(b.launchDate||'9'));
    const cards = items.map(l=>cardHtml(l)).join('') || `<div style="font-size:11px;color:var(--text-mute);text-align:center;padding:14px 0">—</div>`;
    return `<div class="mp-col" id="mpcol-${s.key}">
      <div class="mp-col-head">
        <div class="mp-col-title"><span class="dot" style="background:${s.color}"></span>${esc(s.label)}</div>

  }).join('');
  $('#tab-board').innerHTML = `${rail}<div class="mp-board mp-stagger">${html}</div>`;
}

function cardHtml(l){
  const r = readiness(l); const d = daysUntil(l.launchDate);
  const si = stageIdx(l.stage), next = STAGES[si+1];
  const canAdvance = next && next.key!=='review';
  const dateCls = (d!=null && d>=0 && d<=14) ? 'soon' : '';
  const steps = STAGES.filter(s=>s.key!=='review').map(s=>{
    const idx=stageIdx(s.key);
    if(idx<si) return '<i class="done"></i>';
    if(idx===si) return `<i style="background:${stageOf(l.stage).color}"></i>`;
    return '<i></i>';
  }).join('');
  return `<div class="mp-card" onclick="MP.openDetail('${l.id}')">
    <div class="code">${esc(l.code||'')}</div>
    <div class="brand">${esc(brandName(l.brandId))}</div>
    <div class="name">${esc(l.name||'Untitled')}</div>
    <div class="meta">
      ${l.priority?`<span class="mp-pri ${esc(l.priority)}">${esc(l.priority)}</span>`:''}
      ${l.launchDate?`<span class="mp-date ${dateCls}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>${fmtDate(l.launchDate)}${d!=null&&d>=0?` · ${d}d`:''}</span>`:''}
    </div>
    <div class="mp-ready">
      <div class="track"><div class="fill" style="width:${r.overall}%;background:${readyColor(r.overall)}"></div></div>
      <div class="lbl"><span>Readiness</span><b>${r.overall}%</b></div>
    </div>
    <div class="mp-card-steps" title="Stage ${si+1} of ${STAGES.length-1}">${steps}</div>
    ${canAdvance?`<button class="mp-btn sm advance" onclick="event.stopPropagation();MP.advance('${l.id}','${next.key}')">Advance → ${esc(next.label)}</button>`:
      (next&&next.key==='review'?`<button class="mp-btn sm advance" onclick="event.stopPropagation();MP.advance('${l.id}','review')">Start 30-day review</button>`:'')}
  </div>`;
}

/* ---- detail slide-over ---- */
function renderDetail(id){
  const l = state.launches[id]; if(!l) return;
  const r = readiness(l); const si = stageIdx(l.stage); const cur = stageOf(l.stage);
  const C = 2*Math.PI*23; const off = C*(1-r.overall/100);

  const stepper = STAGES.filter(s=>s.key!=='review').map((s,i)=>{
    const cls = i<si?'done':(i===si?'cur':'');
    return `<div class="mp-step ${cls}"><div class="bar"></div><div class="t">${esc(s.label)}</div></div>`;
  }).join('');

  // department task groups (ordered as the pipeline flows)
  const deptOrder = ['Marketplace','Procurement','Inventory','Commissary','Operations','Marketing','Store Ops'];
  const groups = deptOrder.map(dep=>{
    const tasks = Object.entries(l.tasks).filter(([,t])=>t.dept===dep);
    if(!tasks.length) return '';
    const done = tasks.filter(([,t])=>t.done).length, tot=tasks.length;
    const pct = tot?Math.round(done/tot*100):0;
    const isCur = cur.dept===dep;
    const rows = tasks.map(([tid,t])=>`
      <div class="mp-task ${t.done?'done':''}">
        <div class="mp-check ${t.done?'on':''}" onclick="MP.toggle('${l.id}','${tid}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="body"><div class="lab">${esc(t.label)}</div>${t.done&&t.doneAt?`<div class="sub">done ${new Date(t.doneAt).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`:''}</div>
      </div>`).join('');
    return `<div class="mp-dept ${isCur?'open':''}">
      <div class="mp-dept-head" onclick="this.parentNode.classList.toggle('open')">
        <span class="dot" style="background:${deptColor(dep)}"></span>
        <span class="nm">${esc(dep)}</span>
        <span class="mini">
          <span class="minibar"><i style="width:${pct}%;background:${readyColor(pct)}"></i></span>
          <span class="mpct">${done}/${tot}</span>
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </div>
      <div class="mp-tasks">${rows}</div>
    </div>`;
  }).join('');

  const next = STAGES[si+1];
  const b = state.brands[l.brandId] || {};

/* ---- gantt timeline ---- */
const STAGE_DUR = { discovery:5, sample:5, commercial:5, erp:2, commissary:3, operations:3, marketing:4, store:2 };
const GSTAGES = ['discovery','sample','commercial','erp','commissary','operations','marketing','store'];
const GSHORT  = { discovery:'Disc', sample:'Sample', commercial:"Comm'l", erp:'ERP', commissary:'Whse', operations:'Ops', marketing:'Mktg', store:'Store' };
const DAYMS = 864e5;
const gtotal = () => GSTAGES.reduce((a,k)=>a+STAGE_DUR[k],0);
function hexA(h,a){ const n=parseInt(h.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

/* Back-schedule each launch: stages end at the launch date (countdown). If no
   launch date, run forward from when it was created. */
function scheduleOf(l){
  const tot = gtotal();
  let end = l.launchDate ? new Date(l.launchDate+'T12:00:00') : new Date((l.createdAt||Date.now())+tot*DAYMS);
  end.setHours(12,0,0,0);
  const start = new Date(end.getTime()-tot*DAYMS);
  let cur=new Date(start); const segs=[];
  GSTAGES.forEach(k=>{ const s=new Date(cur), e=new Date(cur.getTime()+STAGE_DUR[k]*DAYMS); segs.push({key:k,s,e}); cur=e; });
  return { start, end, segs };
}

function renderTimeline(){
  const host=$('#tab-timeline');
  const launches=liveLaunches();
  if(!launches.length){ host.innerHTML=`<div class="mp-empty">No launches yet — create one to see the timeline.</div>`; return; }
  const rows=launches.map(l=>({l,sc:scheduleOf(l)})).sort((a,b)=>a.sc.end-b.sc.end);
  const today=new Date(); today.setHours(12,0,0,0);
  const minMs=Math.min(today.getTime(), ...rows.map(r=>r.sc.start.getTime()));
  const maxMs=Math.max(today.getTime(), ...rows.map(r=>r.sc.end.getTime()));
  const startN=Math.floor(minMs/DAYMS)-3, endN=Math.ceil(maxMs/DAYMS)+5;
  const PX=ganttPx, W=(endN-startN)*PX;
  const x=ms=>(Math.floor(ms/DAYMS)-startN)*PX;
  const todayX=x(today.getTime());

  // axis ticks (month labels + weekly day numbers) and matching grid lines
  let ticks='', grid='', lastMonth=-1;
  for(let n=startN;n<=endN;n++){
    const d=new Date(n*DAYMS), left=(n-startN)*PX, mo=d.getUTCMonth(), dow=d.getUTCDay();
    if(mo!==lastMonth){ lastMonth=mo;
      ticks+=`<div class="mp-g-tick month" style="left:${left}px"><span class="lab">${d.toLocaleDateString('en-US',{month:'short',timeZone:'UTC'})}</span></div>`;
      grid+=`<div class="mp-g-grid" style="left:${left}px"></div>`;
    } else if(dow===1){
      ticks+=`<div class="mp-g-tick" style="left:${left}px"><span class="lab">${d.getUTCDate()}</span></div>`;
      grid+=`<div class="mp-g-grid" style="left:${left}px"></div>`;
    }
  }

  const body=rows.map(({l,sc})=>{
    const ci=stageIdx(l.stage), launched=(l.stage==='live'||l.stage==='review'), r=readiness(l);
    const segHtml=sc.segs.map(sg=>{
      const left=x(sg.s.getTime()), w=Math.max((sg.e-sg.s)/DAYMS*PX-2,6), col=stageOf(sg.key).color, si=stageIdx(sg.key);
      let cls,style;
      if(launched||si<ci){ cls='done'; style=`background:${col}`; }
      else if(si===ci){ cls='cur'; style=`background:${col};color:${col}`; }
      else { cls='future'; style=`background:${hexA(col,.14)};border:1px solid ${hexA(col,.45)}`; }
      const lbl = w>=34 ? GSHORT[sg.key] : '';
      const inner = cls==='cur' ? `<span style="color:#1f2328">${lbl}</span>` : lbl;
      return `<div class="mp-seg ${cls}" style="left:${left}px;width:${w}px;${style}" title="${esc(stageOf(sg.key).label)} · ${esc(stageOf(sg.key).dept)}">${inner}</div>`;
    }).join('');
    const mx=x(sc.end.getTime());
    const milestone=`<div class="mp-milestone" title="Go live: ${l.launchDate?esc(fmtDate(l.launchDate)):'TBD'}" style="left:${mx}px;${launched?'background:var(--brand-green)':'background:#fff;border:2px solid '+stageOf('store').color}"></div>`;
    const openCur=Object.values(l.tasks||{}).filter(t=>t.stage===l.stage&&!t.done).length;
    const st = launched ? '🟢 Live' : `${stageOf(l.stage).label}${openCur?` · ${openCur} open`:''}`;
    return `<div class="mp-g-row" onclick="MP.openDetail('${l.id}')">
      <div class="mp-g-label">
        <div class="br">${esc(brandName(l.brandId))}</div>
        <div class="nm">${esc(l.name)}</div>
        <div class="st">${esc(st)} · ${r.overall}%</div>
      </div>
      <div class="mp-g-track" style="width:${W}px">${grid}${segHtml}${milestone}<div class="mp-today" style="left:${todayX}px"></div></div>
    </div>`;
  }).join('');

  const legend = GSTAGES.map(k=>`<span class="it"><span class="sw" style="background:${stageOf(k).color}"></span>${esc(stageOf(k).label)}</span>`).join('')
    + `<span class="it"><span class="sw" style="transform:rotate(45deg);border-radius:2px;background:#fff;border:2px solid ${stageOf('store').color}"></span>Go-live</span>`
    + `<span class="it"><span class="sw" style="background:var(--brand-orange)"></span>Today</span>`;
  const zoom = `<span class="mp-zoom">
      <button class="mp-btn sm ${PX<=14?'primary':''}" onclick="MP.ganttZoom(12)">Fit</button>
      <button class="mp-btn sm ${PX>14&&PX<24?'primary':''}" onclick="MP.ganttZoom(18)">Comfort</button>
      <button class="mp-btn sm ${PX>=24?'primary':''}" onclick="MP.ganttZoom(28)">Wide</button>
    </span>`;

  host.innerHTML = `
    <div class="mp-legend">${legend}${zoom}</div>
    <div class="mp-gantt" style="--gl-w:200px">
      <div class="mp-g-head"><div class="mp-g-corner"></div><div class="mp-g-axis" style="width:${W}px">${ticks}<div class="mp-today" style="left:${todayX}px"><span class="dot"></span></div></div></div>
      <div class="mp-g-rows mp-stagger">${body}</div>
    </div>`;
}

  const bid1=uid('b'), bid2=uid('b'), bid3=uid('b');
  state.brands[bid1]={ id:bid1, name:'Cotto', contact:'Jane Doe', email:'jane@getcotto.com', phone:'(310) 555-0142', website:'getcotto.com', distributor:'KeHE', category:'Refrigerated Dip', source:'Expo West', status:'Approved', notes:'West Coast exclusive — sample.' };
  state.brands[bid2]={ id:bid2, name:'Fishwife', contact:'Becca Millstein', email:'hi@fishwife.co', phone:'(415) 555-0188', website:'fishwife.co', distributor:'UNFI', category:'Tinned Fish', source:'Founder intro', status:'Testing', notes:'Sample data.' };
  state.brands[bid3]={ id:bid3, name:'Magic Spoon', contact:'Gabi Lewis', email:'team@magicspoon.com', phone:'(212) 555-0119', website:'magicspoon.com', distributor:'Direct', category:'Cereal', source:'Inbound', status:'Prospect', notes:'Sample data.' };

  function mk(over){
    const id=uid('l'); const tasks=buildTasks();
    // mark tasks done up to current stage for realism
    const curIdx = stageIdx(over.stage);
    Object.values(tasks).forEach(t=>{ if(stageIdx(t.stage)<curIdx) t.done=true, t.doneAt=Date.now(); });
    const l = Object.assign({ id, code:'NPI-'+CONFIG.YEAR+'-'+String(Object.keys(state.launches).length+1).padStart(3,'0'),
      tasks, log:[{ts:nowTs(),text:'Launch created (sample data)'}], priority:'Med', createdAt:Date.now() }, over);
    state.launches[id]=l;
  }
  mk({ name:'Cotto Ranch Dip', brandId:bid1, category:'Refrigerated', launchDate:isoIn(21), stage:'operations', priority:'High', cost:'3.25', msrp:'6.99', casePack:'12', storageType:'Refrigerated', storeCount:'6', upc:'850001234567', unitSize:'8 oz', moq:'48', leadTime:'2 weeks', shelfLife:'60 days', productDim:'3 × 3 × 4 in', caseDim:'12 × 9 × 6 in', primaryDist:'KeHE' });
  mk({ name:'Fishwife Smoked Salmon', brandId:bid2, category:'Tinned Fish', launchDate:isoIn(35), stage:'commercial', priority:'Med', cost:'5.10', msrp:'10.99', casePack:'12', storageType:'Ambient', storeCount:'6' });
  mk({ name:'Magic Spoon Cocoa', brandId:bid3, category:'Cereal', launchDate:isoIn(60), stage:'sample', priority:'Low', cost:'4.00', msrp:'8.99', casePack:'8', storageType:'Ambient', storeCount:'6' });
  save();
}
function isoIn(days){ const d=new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }

/* ---------------------------------------------------------------- PUBLIC API */
window.MP = {
  tab(name){
    document.querySelectorAll('.mp-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
    ['board','timeline','teams','brands'].forEach(n=>$('#tab-'+n).style.display = n===name?'':'none');
    if(name==='timeline') renderTimeline(); if(name==='teams') renderTeams(); if(name==='brands') renderBrands();
    revealTab(name);
  },
  team(d){ teamFilter=d; renderTeams(); },
  ganttZoom(px){ ganttPx=px; renderTimeline(); },
  toggleProcess(){
    const el=$('#mpProcess'); const c=el.classList.toggle('collapsed');
    try{ localStorage.setItem('mpProcessCollapsed', c?'1':'0'); }catch(e){}
    el.querySelector('.mp-process-toggle').textContent = c?'Show':'Hide';
  },
  scrollStage(key){
    const el = document.getElementById('mpcol-'+key);
    if(el){ el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'}); el.style.transition='box-shadow .3s'; el.style.boxShadow='0 0 0 2px var(--mp)'; setTimeout(()=>el.style.boxShadow='',900); }
    else { const b=document.querySelector('.mp-board'); if(b) b.scrollTo({left:b.scrollWidth, behavior:'smooth'}); } // review has no column
  },
  openDetail(id){ openLaunchId=id; renderDetail(id); $('#mpOverlay').classList.add('open'); $('#mpPanel').classList.add('open'); document.body.style.overflow='hidden'; },
  closeDetail(){ openLaunchId=null; $('#mpOverlay').classList.remove('open'); $('#mpPanel').classList.remove('open'); document.body.style.overflow=''; },
  toggle(id,tid){ toggleTask(id,tid); },
  advance(id,to){ advanceStage(id,to); },
  openLaunchModal(){ launchModal(null); },
  editLaunch(id){ launchModal(state.launches[id]); },
  openBrandModal(){ brandModal(null); },
  editBrand(id){ brandModal(state.brands[id]); },
  openSettings(){ settingsModal(); },
  saveSettings(){
    const s = state.settings = state.settings || defaultSettings();
    s.notifyEmail = $('#se_toggle').checked;
    s.teamEmails = s.teamEmails || {};
    DEPTS.forEach((d,i)=>{ const el=$('#se_'+i); if(el) s.teamEmails[d.key]=el.value.trim(); });
    save(); closeModal();
    toast(s.notifyEmail ? 'Email alerts <b>ON</b>' : 'Settings saved — alerts off');
  },
  sendTest(){
    if(!window.emailjs){ toast('EmailJS not loaded.',null,'#a32d2d'); return; }
    let to=''; DEPTS.forEach((d,i)=>{ const el=$('#se_'+i); if(el && el.value.trim() && !to) to=el.value.trim(); });
    if(!to){ toast('Enter at least one team email first.',null,'#a32d2d'); return; }
    const msg = 'If you received this, NPI team email alerts are working. 🎉';
    emailjs.send(CONFIG.EMAILJS.serviceId, CONFIG.EMAILJS.templateId, {
      to_email:to, to_name:'Marketplace team', team:'Marketplace', launch:'Test Launch', brand:'Neighborly',
      stage:'Sample Review', launch_date:fmtDate(isoIn(21)), readiness:'42%', accent:'#5a4a7a',
      link:location.href.split('#')[0].split('?')[0], message:msg,
      event_name:'NPI test notification', event_date:fmtDate(isoIn(0)), event_category:'Marketplace NPI · test', event_notes:msg
    }).then(()=>toast(`📧 Test sent to ${esc(to)}`)).catch(err=>{ console.error(err); toast('Test failed — check console.',null,'#a32d2d'); });
  },
  closeModal,
  _brandSel(sel){ $('#f_newbrand').style.display = sel.value==='__new'?'block':'none'; },
  saveLaunch(id){
    const v = s => { const el=$('#'+s); return el?el.value.trim():''; };
    const name = v('f_name'); if(!name){ toast('Product name required.',null,'#a32d2d'); return; }
    let brandId = v('f_brand');
    if(brandId==='__new'){
      const nb = v('f_newbrandname'); if(!nb){ toast('Enter the new brand name.',null,'#a32d2d'); return; }
      brandId = uid('b'); state.brands[brandId] = { id:brandId, name:nb, status:'Approved', notes:'' };
    }
    const fields = { name, brandId, category:v('f_cat'), launchDate:v('f_date'), cost:v('f_cost'), msrp:v('f_msrp'),
      casePack:v('f_case'), priority:v('f_pri'), upc:v('f_upc'), storageType:v('f_store'), storeCount:v('f_count'),
      unitSize:v('f_unit'), moq:v('f_moq'), leadTime:v('f_lead'), productDim:v('f_pdim'), caseDim:v('f_cdim'),
      shelfLife:v('f_shelf'), primaryDist:v('f_dist') };
    if(id){ Object.assign(state.launches[id], fields); logEvent(state.launches[id],'Details updated'); }
    else{
      const nid=uid('l'); const n=Object.keys(state.launches).length+1;
      const nl = state.launches[nid] = Object.assign({ id:nid, code:'NPI-'+CONFIG.YEAR+'-'+String(n).padStart(3,'0'),
        stage:'discovery', tasks:buildTasks(), log:[{ts:nowTs(),text:'Launch created'}], createdAt:Date.now() }, fields);
      logEvent(nl, `Marketplace · Discovery activated`);
      // AUTOMATION: auto-notify the brand that their intake was received.
      notifyBrand(nl, `Thanks for submitting ${nl.name} to the Neighborly Marketplace. We've logged your intake and our team is reviewing — we'll be in touch with next steps.`);
      toast('Intake submitted — checklist generated, brand notified.');
    }
    save(); closeModal(); renderAll(); if(id&&openLaunchId===id) renderDetail(id);
  },
  saveBrand(id){
    const v = s => { const el=$('#'+s); return el?el.value.trim():''; };
    const name=v('b_name'); if(!name){ toast('Brand name required.',null,'#a32d2d'); return; }
    const f={ name, contact:v('b_contact'), email:v('b_email'), phone:v('b_phone'), website:v('b_web'), distributor:v('b_dist'),
      category:v('b_cat'), source:v('b_src'), status:v('b_status'), notes:v('b_notes') };
    if(id) Object.assign(state.brands[id], f);
    else { const nid=uid('b'); state.brands[nid]=Object.assign({id:nid},f); }
    save(); closeModal(); renderAll();
  },
  rejectLaunch(id){
    const l = state.launches[id]; if(!l) return;
    if(!confirm('Reject this launch? The brand will be notified and the launch archived out of the active pipeline.')) return;
    l.archived = true; l.archivedReason = 'Rejected'; l.archivedAt = Date.now();
    logEvent(l, '✗ Rejected — brand notified & archived');
    notifyBrand(l, `Thank you for submitting ${l.name} to the Neighborly Marketplace. After review, we won't be moving forward with this product at this time. We appreciate the opportunity and hope to stay in touch.`);
    // mark the brand record rejected too, when it isn't tied to other live launches
    const b = state.brands[l.brandId];
    if(b && !liveLaunches().some(x=>x.brandId===l.brandId && x.id!==id)) b.status = 'Rejected';
    save(); this.closeDetail(); renderAll();
    toast(`<b>${esc(l.name)}</b> rejected & archived`);
  },
  deleteLaunch(id){ if(!confirm('Delete this launch? This cannot be undone.')) return; delete state.launches[id]; save(); this.closeDetail(); renderAll(); },
  deleteBrand(id){
    const used = Object.values(state.launches).some(l=>l.brandId===id);
    if(used){ toast('Can\'t delete — brand has launches.',null,'#a32d2d'); return; }
    if(!confirm('Delete this brand?')) return; delete state.brands[id]; save(); closeModal(); renderAll();
  }
};

/* ---------------------------------------------------------------- INIT ----- */
if(window.emailjs){ try{ emailjs.init({ publicKey: CONFIG.EMAILJS.publicKey }); }catch(e){} }
renderProcess();
(function(){ try{ if(localStorage.getItem('mpProcessCollapsed')==='1'){ const el=$('#mpProcess'); el.classList.add('collapsed'); el.querySelector('.mp-process-toggle').textContent='Show'; } }catch(e){} })();
subscribe();

})();
</script>
