// ── MODAL COMPONENT ───────────────────────────────────────────────────────────
function Modal({ open, onClose, children, width=560 }) {
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [open, onClose]);

  if (!open) return null;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.32)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}} onClick={(e)=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.surface,borderRadius:12,border:`0.5px solid ${C.border}`,padding:"1.75rem",width,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}}>
        {children}
      </div>
    </div>
  );
}


// ── CAT ICON SVG ──────────────────────────────────────────────────────────────
function CatIcon({ path, color, size=10 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 12 12" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d={path}/>
    </svg>
  );
}

// ── SIDEBAR COMPONENT ─────────────────────────────────────────────────────────
function Sidebar({ event, mode, onClose, onEdit, onDelete, onUpdateActions }) {
  const [actionText, setActionText] = useState("");
  const inputRef = useRef(null);
  if (!event) return null;
  const cat = CATS[event.cat] || CATS.campaign;

  const addAction = () => {
    if (!actionText.trim()) return;
    const newActions = [...(event.actions||[]), {text: actionText.trim(), done: false}];
    onUpdateActions(event.id, newActions);
    setActionText("");
    setTimeout(()=>inputRef.current?.focus(), 50);
  };

  const toggleAction = (idx) => {
    const newActions = (event.actions||[]).map((a,i)=> i===idx ? {...a,done:!a.done} : a);
    onUpdateActions(event.id, newActions);
  };

  const dateStr = event.start===event.end ? fmtDate(event.start) : fmtDate(event.start)+" – "+fmtDate(event.end);
  const doneCount = (event.actions||[]).filter(a=>a.done).length;

  return (
    <div style={{width:340,flexShrink:0,background:C.surface,borderLeft:`0.5px solid ${C.borderStrong}`,display:"flex",flexDirection:"column",overflowY:"auto",height:"100%"}}>
      {/* Header */}
      <div style={{padding:"1.1rem 1.1rem .8rem",borderBottom:`0.5px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:8}}>
          <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:10,fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",padding:"3px 9px",borderRadius:20,background:cat.bg,color:cat.text}}>
            <CatIcon path={cat.icon} color={cat.text} size={10}/> {cat.label}
            {event.hold && <span style={{marginLeft:4,background:C.tl,color:C.td,padding:"1px 6px",borderRadius:20}}>HOLD</span>}
          </span>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.text3,fontSize:18,lineHeight:1,padding:4,borderRadius:6,flexShrink:0}}>&#215;</button>
        </div>
        <div style={{fontSize:18,fontWeight:600,letterSpacing:"-.02em",color:C.text,lineHeight:1.25,marginBottom:6}}>{event.name}</div>
        <div style={{fontSize:12,color:C.text3,display:"flex",flexDirection:"column",gap:3}}>
          <span style={{display:"flex",alignItems:"center",gap:5}}>
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="2" width="10" height="9" rx="1"/><path d="M1 5h10M4 1v2M8 1v2"/></svg>
            {dateStr}
          </span>
          {event.sub && <span style={{display:"flex",alignItems:"center",gap:5}}>
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 6l4-4 6 6M3 8l1-1"/></svg>
            {event.sub}
          </span>}
        </div>
      </div>

      {/* Body */}
      <div style={{padding:"1rem 1.1rem",display:"flex",flexDirection:"column",gap:16,flex:1}}>

        {/* Notes */}
        <div>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",color:C.text3,marginBottom:7}}>Notes</div>
          <div style={{fontSize:13,color:event.notes?C.text2:C.text3,fontStyle:event.notes?"normal":"italic",background:C.surface2,borderRadius:8,padding:"9px 11px",lineHeight:1.6}}>
            {event.notes || "No notes added yet"}
          </div>
        </div>

        {/* People */}
        {(event.people||[]).length > 0 && (
          <div>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",color:C.text3,marginBottom:7}}>Team</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {(event.people||[]).map(init => {
                const p = PEOPLE.find(x=>x.initials===init);
                return (
                  <div key={init} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:C.surface2,fontSize:11.5,fontWeight:500,color:C.text2}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:p?.color||C.tan,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>{init}</div>
                    {p?.name||init}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Departments */}
        {(event.depts||[]).length > 0 && (
          <div>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",color:C.text3,marginBottom:7}}>Department</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {(event.depts||[]).map(d=>(
                <span key={d} style={{display:"inline-flex",padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:500,background:C.surface2,color:C.text2}}>{d}</span>
              ))}
            </div>
          </div>
        )}

        {/* Action Items */}
        <div>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",color:C.text3,marginBottom:7,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>Action items {(event.actions||[]).length>0 && <span style={{color:C.text3,fontWeight:400,fontSize:10,textTransform:"none",letterSpacing:0}}>({doneCount}/{(event.actions||[]).length})</span>}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {(event.actions||[]).length === 0 && <div style={{fontSize:12,color:C.text3,fontStyle:"italic",padding:"6px 0"}}>No action items yet</div>}
            {(event.actions||[]).map((a,i)=>(
              <div key={i} onClick={()=>toggleAction(i)} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 10px",background:C.surface2,borderRadius:8,cursor:"pointer",transition:"background .1s"}}
                onMouseEnter={e=>e.currentTarget.style.background="#e8e6e1"}
                onMouseLeave={e=>e.currentTarget.style.background=C.surface2}>
                <input type="checkbox" checked={a.done} onChange={()=>{}} onClick={e=>{e.stopPropagation();toggleAction(i);}} style={{width:14,height:14,accentColor:C.orange,flexShrink:0,marginTop:2,cursor:"pointer"}}/>
                <span style={{fontSize:12.5,color:a.done?C.text3:C.text,textDecoration:a.done?"line-through":"none",lineHeight:1.4,flex:1}}>{a.text}</span>
              </div>

          </div>
          <div style={{display:"flex",gap:6,marginTop:8}}>
            <input ref={inputRef} value={actionText} onChange={e=>setActionText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addAction();}} placeholder="Add action item…"
              style={{flex:1,border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:"6px 10px",fontSize:12.5,color:C.text,background:C.surface,outline:"none",fontFamily:"inherit"}}
              onFocus={e=>e.target.style.borderColor=C.orange} onBlur={e=>e.target.style.borderColor=C.borderStrong}/>
            <button onClick={addAction} style={{background:C.orange,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:500,fontFamily:"inherit",whiteSpace:"nowrap"}}>Add</button>
          </div>
        </div>
      </div>

      {/* Footer — edit mode only */}
      {mode === "edit" && (
        <div style={{padding:"1rem 1.1rem",borderTop:`0.5px solid ${C.border}`,display:"flex",gap:8,flexShrink:0}}>
          <button onClick={()=>onEdit(event.id)} style={{flex:1,background:C.dark,border:"none",borderRadius:8,padding:"9px 16px",fontSize:13,cursor:"pointer",color:C.yellow,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6,fontFamily:"inherit"}}>
            Edit event
          </button>
          <button onClick={()=>{if(confirm("Delete this event?"))onDelete(event.id);}} style={{background:"none",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:"9px 12px",fontSize:13,cursor:"pointer",color:C.text3,fontFamily:"inherit"}}
            onMouseEnter={e=>{e.target.style.borderColor=C.orange;e.target.style.color=C.orange;}}
            onMouseLeave={e=>{e.target.style.borderColor=C.borderStrong;e.target.style.color=C.text3;}}>
            <svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h8M5 3V2h2v1M10 3l-.5 7a1 1 0 01-1 .9H3.5a1 1 0 01-1-.9L2 3"/></svg>
          </button>
        </div>
      )}
    </div>
  );
}

// ── EVENT FORM ────────────────────────────────────────────────────────────────
function EventForm({ open, onClose, onSave, onDelete, editEvent }) {
  const [name, setName]     = useState("");
  const [start, setStart]   = useState("");
  const [end, setEnd]       = useState("");
  const [cat, setCat]       = useState("campaign");
  const [sub, setSub]       = useState("");
  const [notes, setNotes]   = useState("");
  const [hold, setHold]     = useState(false);
  const [depts, setDepts]   = useState([]);
  const [people, setPeople] = useState([]);

  useEffect(()=>{
    if (!open) return;
    if (editEvent) {
      setName(editEvent.name||""); setStart(editEvent.start||""); setEnd(editEvent.end||"");
      setCat(editEvent.cat||"campaign"); setSub(editEvent.sub||""); setNotes(editEvent.notes||"");
      setHold(!!editEvent.hold); setDepts([...(editEvent.depts||[])]); setPeople([...(editEvent.people||[])]);
    } else {
      setName(""); setCat("campaign"); setSub(""); setNotes(""); setHold(false); setDepts([]); setPeople([]);
    }
  }, [open, editEvent]);

  const togDept = (d) => setDepts(prev => prev.includes(d) ? prev.filter(x=>x!==d) : [...prev,d]);
  const togPerson = (p) => setPeople(prev => prev.includes(p) ? prev.filter(x=>x!==p) : [...prev,p]);

  const handleSave = () => {
    if (!name.trim()||!start) { alert("Please add a name and start date."); return; }
    onSave({ id: editEvent?.id||uid(), name:name.trim(), start, end:end||start, cat, sub, notes, hold, depts, people, actions:editEvent?.actions||[] });
    onClose();
  };

  const FLabel = ({children}) => <div style={{fontSize:11.5,color:C.text2,marginBottom:3}}>{children}</div>;
  const FInput = ({...props}) => (
    <input {...props} style={{width:"100%",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.text,background:C.surface,outline:"none",fontFamily:"inherit",...props.style}}
      onFocus={e=>e.target.style.borderColor=C.orange} onBlur={e=>e.target.style.borderColor=C.borderStrong}/>
  );

  return (
    <Modal open={open} onClose={onClose} width={580}>
      <h2 style={{fontSize:15,fontWeight:500,marginBottom:"1.25rem",color:C.text}}>{editEvent?"Edit event":"Add event"}</h2>
      <div style={{marginBottom:14}}><FLabel>Event name</FLabel><FInput value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Summer campaign launch" autoFocus/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><FLabel>Start date</FLabel><FInput type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
        <div><FLabel>End date</FLabel><FInput type="date" value={end} onChange={e=>setEnd(e.target.value)}/></div>
      </div>
      <div style={{marginBottom:14}}>
        <FLabel>Category</FLabel>
        <select value={cat} onChange={e=>setCat(e.target.value)} style={{width:"100%",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.text,background:C.surface,fontFamily:"inherit",outline:"none"}}>
          {Object.entries(CATS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
      </div>
      <div style={{marginBottom:14}}><FLabel>Subcategory / detail</FLabel><FInput value={sub} onChange={e=>setSub(e.target.value)} placeholder="e.g. Instagram, Email, Q3 Promo"/></div>
      <div style={{marginBottom:14}}>
        <FLabel>Notes</FLabel>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Context, links, deliverables…"
          style={{width:"100%",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.text,background:C.surface,outline:"none",fontFamily:"inherit",resize:"vertical",minHeight:80}}
          onFocus={e=>e.target.style.borderColor=C.orange} onBlur={e=>e.target.style.borderColor=C.borderStrong}/>
      </div>
      <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,cursor:"pointer"}}>
        <input type="checkbox" checked={hold} onChange={e=>setHold(e.target.checked)} style={{width:14,height:14,accentColor:C.orange}}/>
        <span style={{fontSize:13,color:C.text2}}>Mark as HOLD (tentative)</span>
      </label>
      <div style={{marginBottom:14}}>
        <FLabel>Department</FLabel>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
          {DEPTS.map(d=>(
            <span key={d} onClick={()=>togDept(d)} style={{border:`0.5px solid ${depts.includes(d)?C.dark:C.borderStrong}`,borderRadius:20,padding:"3px 10px",fontSize:11.5,cursor:"pointer",color:depts.includes(d)?"#fff":C.text2,background:depts.includes(d)?C.dark:C.surface,transition:"all .15s"}}>
              {d}
            </span>
          ))}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <FLabel>Tag people</FLabel>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
          {PEOPLE.map(p=>(
            <span key={p.initials} onClick={()=>togPerson(p.initials)} style={{border:`0.5px solid ${people.includes(p.initials)?p.color:C.borderStrong}`,borderRadius:20,padding:"3px 10px",fontSize:11.5,cursor:"pointer",color:people.includes(p.initials)?"#fff":C.text2,background:people.includes(p.initials)?p.color:C.surface,transition:"all .15s"}}>
              {p.name}
            </span>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:"1.25rem",flexWrap:"wrap"}}>
        {editEvent && <button onClick={()=>onDelete(editEvent.id)} style={{background:"none",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:"6px 14px",fontSize:13,cursor:"pointer",color:C.text3,fontFamily:"inherit"}} onMouseEnter={e=>{e.target.style.borderColor=C.orange;e.target.style.color=C.orange;}} onMouseLeave={e=>{e.target.style.borderColor=C.borderStrong;e.target.style.color=C.text3;}}>Delete</button>}
        <button onClick={onClose} style={{background:"none",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:"6px 16px",fontSize:13,cursor:"pointer",color:C.text,fontFamily:"inherit"}}>Cancel</button>
        <button onClick={handleSave} style={{background:C.orange,border:"none",borderRadius:8,padding:"6px 16px",fontSize:13,cursor:"pointer",color:"#fff",fontWeight:500,fontFamily:"inherit"}}>Save event</button>
      </div>
    </Modal>
  );
}

// ── THEME EDIT FORM ───────────────────────────────────────────────────────────
function ThemeForm({ open, onClose, monthIndex, themes, onSave }) {
  const t = themes[monthIndex] || DEFAULT_THEMES[monthIndex] || {};

  const [theme, setTheme] = useState(t.theme||"");
  const [desc,  setDesc]  = useState(t.desc||"");

  useEffect(()=>{
    if (!open) return;
    const t2 = themes[monthIndex] || DEFAULT_THEMES[monthIndex] || {};
    setTag(t2.tag||""); setTheme(t2.theme||""); setDesc(t2.desc||""); setGoals([...(t2.goals||["","",""])]);

      <div style={{marginBottom:12}}><div style={{fontSize:11.5,color:C.text2,marginBottom:3}}>Description</div><FInput value={desc} onChange={e=>setDesc(e.target.value)} multiline placeholder="Monthly theme description…"/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>

          <div key={i}><div style={{fontSize:11.5,color:C.text2,marginBottom:3}}>Goal {i+1}</div><FInput value={goals[i]||""} onChange={e=>setGoals(g=>{const ng=[...g];ng[i]=e.target.value;return ng;})}/></div>

        <button onClick={()=>{ onSave(monthIndex,{tag,theme,desc,goals}); onClose(); }} style={{background:C.orange,border:"none",borderRadius:8,padding:"6px 16px",fontSize:13,cursor:"pointer",color:"#fff",fontWeight:500,fontFamily:"inherit"}}>Save theme</button>
      </div>
    </Modal>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function NeighborlyCalendar() {
  const isMobile = useIsMobile();
  const [events,    setEvents]    = useState(() => rd("events")  || SAMPLE_EVENTS);
  const [goals,     setGoals]     = useState(() => rd("goals")   || {});
  const [themes,    setThemes]    = useState(() => rd("themes")  || JSON.parse(JSON.stringify(DEFAULT_THEMES)));
  const [curDate,   setCurDate]   = useState(() => new Date(2026,3,1));
  const [mode,      setMode]      = useState("edit");
  const [filter,    setFilter]    = useState("all");
  const [sidebarId, setSidebarId] = useState(null);
  const [formOpen,  setFormOpen]  = useState(false);
  const [editEvt,   setEditEvt]   = useState(null);
  const [formDate,  setFormDate]  = useState("");
  const [themeOpen, setThemeOpen] = useState(false);
  const [dragId,    setDragId]    = useState(null);
  const [dropCell,  setDropCell]  = useState(null);

  const today = new Date(); today.setHours(0,0,0,0);
  const yr = curDate.getFullYear(), mo = curDate.getMonth();
  const mKey = mkKey(curDate);

  // persist
  const saveEvents = useCallback((evts) => { setEvents(evts); wr("events",evts); }, []);
  const saveGoals  = useCallback((g)    => { setGoals(g);  wr("goals",g);  }, []);
  const saveThemes = useCallback((t)    => { setThemes(t); wr("themes",t); }, []);

  const theme = themes[mo] || DEFAULT_THEMES[mo] || {};
  const monthGoals = goals[mKey] || [false,false,false];

  const toggleGoal = (i) => {
    const ng = [...monthGoals]; ng[i] = !ng[i];
    const newGoals = {...goals, [mKey]: ng};
    saveGoals(newGoals);
  };

  // Navigation
  const changeMonth = (d) => { const nd = new Date(curDate); nd.setMonth(nd.getMonth()+d); setCurDate(nd); setSidebarId(null); };
  const goToday = () => { setCurDate(new Date()); setSidebarId(null); };

  // Calendar cells
  const first=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate(), dip=new Date(yr,mo,0).getDate();
  const cells=[];
  for(let i=first-1;i>=0;i--) cells.push({d:dip-i,o:true,mo:mo-1,yr:mo===0?yr-1:yr});
  for(let i=1;i<=dim;i++) cells.push({d:i,o:false,mo:mo,yr:yr});
  for(let i=1;i<=42-cells.length;i++) cells.push({d:i,o:true,mo:mo+1,yr:mo===11?yr+1:yr});

  const filtered = events.filter(e => filter==="all" || e.cat===filter);
  const dsOf = (c) => c.yr+"-"+String(c.mo+1).padStart(2,"0")+"-"+String(c.d).padStart(2,"0");

  // Drag & drop
  const handleDragStart = (e, id) => { setDragId(id); e.dataTransfer.setData("text/plain", id); e.dataTransfer.effectAllowed="move"; };
  const handleDragEnd = () => { setDragId(null); setDropCell(null); };
  const handleDragOver = (e, ds) => { e.preventDefault(); setDropCell(ds); };
  const handleDrop = (e, ds) => {
    e.preventDefault(); setDropCell(null);
    const id = e.dataTransfer.getData("text/plain") || dragId;
    if (!id) return;
    const ev = events.find(x=>x.id===id);
    if (!ev) return;
    const dur = Math.round((new Date(ev.end+"T00:00:00")-new Date(ev.start+"T00:00:00"))/86400000);
    const newEnd = addDays(ds, dur);
    saveEvents(events.map(x=>x.id===id ? {...x,start:ds,end:newEnd} : x));
    if (sidebarId===id) setSidebarId(id); // refresh sidebar
  };

  // Event actions
  const openAdd = (ds="") => { if(mode==="present")return; setEditEvt(null); setFormDate(ds); setFormOpen(true); };
  const openEdit = (id) => { if(mode==="present")return; setEditEvt(events.find(e=>e.id===id)||null); setFormOpen(true); };
  const handleSave = (ev) => { saveEvents(events.find(e=>e.id===ev.id) ? events.map(e=>e.id===ev.id?ev:e) : [...events,ev]); setSidebarId(ev.id); };
  const handleDelete = (id) => { saveEvents(events.filter(e=>e.id!==id)); setSidebarId(null); setFormOpen(false); };
  const handleUpdateActions = (id, actions) => { saveEvents(events.map(e=>e.id===id?{...e,actions}:e)); };

  const sidebarEvent = events.find(e=>e.id===sidebarId) || null;

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:C.bg,minHeight:"100vh",color:C.text,display:"flex",flexDirection:"column"}}>
      {/* Present mode banner */}
      {mode==="present" && (
        <div style={{background:C.dark,color:"rgba(255,255,255,.6)",fontSize:11.5,padding:"7px 1.25rem",textAlign:"center",letterSpacing:".04em",flexShrink:0}}>
          <strong style={{color:C.yellow}}>Presentation view</strong> &nbsp;·&nbsp; Read-only &nbsp;·&nbsp; Click any event to see details
        </div>
      )}

      {/* NAV */}

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {/* Mode toggle */}
          <div style={{display:"flex",background:C.surface2,borderRadius:8,padding:3,gap:2}}>
            {[["edit","Edit"],["present","Present"]].map(([m,label])=>(
              <button key={m} onClick={()=>setMode(m)} style={{padding:isMobile?"5px 10px":"5px 14px",borderRadius:6,fontSize:isMobile?11:12,fontWeight:500,cursor:"pointer",border:"none",background:mode===m?(m==="present"?C.dark:C.surface):"transparent",color:mode===m?(m==="present"?C.yellow:C.text):C.text2,boxShadow:mode===m&&m!=="present"?"0 1px 3px rgba(0,0,0,.09)":"none",transition:"all .15s",fontFamily:"inherit"}}>
                {label}
              </button>
            ))}
          </div>
          {!isMobile && <a href="index.html" style={{fontSize:12,color:C.text2,textDecoration:"none",display:"flex",alignItems:"center",gap:5,padding:"5px 12px",border:`0.5px solid ${C.borderStrong}`,borderRadius:8}}>
            ← Portal
          </a>}
        </div>
      </nav>

      {/* APP SHELL */}
      <div style={{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 50px)"}}>
        {/* MAIN */}
        <div style={{flex:1,overflowY:"auto",minWidth:0}}>
          <div style={{padding:isMobile?"0.75rem 0.75rem 5rem":"1.25rem 1.5rem 3rem"}}>

            {/* THEME BANNER */}
            <div onClick={()=>mode==="edit"&&setThemeOpen(true)}
              style={{border:`0.5px solid ${C.border}`,borderLeftWidth:3,borderLeftColor:theme.color||C.blue,padding:"1.25rem 1.5rem",marginBottom:"1rem",background:C.surface2,borderRadius:"0 12px 12px 0",cursor:mode==="edit"?"pointer":"default",transition:"background .15s"}}
              onMouseEnter={e=>{if(mode==="edit")e.currentTarget.style.background=C.surface;}}
              onMouseLeave={e=>e.currentTarget.style.background=C.surface2}>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"minmax(0,1fr) minmax(260px,360px)",gap:"1.5rem",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:22,fontWeight:600,letterSpacing:"-.03em",color:theme.color||C.blue,marginBottom:5}}>{theme.tag||"Month"}</div>
                  <div style={{fontSize:16,fontWeight:500,color:C.text,marginBottom:3}}>{theme.theme}</div>
                  {!isMobile && <div style={{fontSize:13,color:C.text2,lineHeight:1.5}}>{theme.desc}</div>}
                  {mode==="edit" && <div style={{fontSize:11,color:C.text3,marginTop:6,display:"flex",alignItems:"center",gap:4}}>Click to edit theme &amp; goals</div>}
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:500,color:C.text3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Monthly goals</div>
                  {(!isMobile || true) && (theme.goals||[]).map((g,i)=>(
                    <label key={i} onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,cursor:"pointer"}}>
                      <input type="checkbox" checked={monthGoals[i]||false} onChange={()=>toggleGoal(i)} style={{width:14,height:14,accentColor:C.orange,flexShrink:0}}/>
                      <span style={{fontSize:12.5,color:C.text,lineHeight:1.4,textDecoration:monthGoals[i]?"line-through":"none",opacity:monthGoals[i]?.6:1}}>{g}</span>
                    </label>
                  ))}
                </div>
              </div>
            </div>

            {/* TOP BAR */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isMobile?".5rem":".85rem",gap:8,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:isMobile?5:8}}>
                <button onClick={()=>changeMonth(-1)} style={{background:"none",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:isMobile?"4px 8px":"5px 10px",cursor:"pointer",color:C.text,display:"flex",alignItems:"center",fontFamily:"inherit"}}>‹</button>
                <span style={{fontSize:isMobile?14:17,fontWeight:500,color:C.text,minWidth:isMobile?110:150,textAlign:"center"}}>{curDate.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</span>
                <button onClick={()=>changeMonth(1)} style={{background:"none",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:isMobile?"4px 8px":"5px 10px",cursor:"pointer",color:C.text,display:"flex",alignItems:"center",fontFamily:"inherit"}}>›</button>
                <button onClick={goToday} style={{background:"none",border:`0.5px solid ${C.borderStrong}`,borderRadius:8,padding:isMobile?"4px 8px":"5px 12px",cursor:"pointer",color:C.text,fontSize:isMobile?11:12,fontFamily:"inherit"}}>Today</button>
              </div>
              {mode==="edit" && !isMobile && (
                <button onClick={()=>openAdd()} style={{background:C.orange,border:"none",borderRadius:8,padding:"7px 14px",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:6,fontFamily:"inherit"}}>
                  + Add event
                </button>
              )}
              {mode==="edit" && isMobile && (
                <button onClick={()=>openAdd()} style={{position:"fixed",bottom:24,right:20,zIndex:150,width:52,height:52,borderRadius:"50%",background:C.orange,border:"none",cursor:"pointer",color:"#fff",fontSize:24,fontWeight:300,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(232,113,66,.45)",fontFamily:"inherit"}}>
                  +
                </button>
              )}
            </div>

            {/* FILTERS */}
            <div style={{display:"flex",gap:6,flexWrap:isMobile?"nowrap":"wrap",marginBottom:".85rem",overflowX:isMobile?"auto":"visible",paddingBottom:isMobile?4:0,WebkitOverflowScrolling:"touch"}}>
              {[{key:"all",label:"All",color:C.dark}, ...Object.entries(CATS).map(([k,v])=>({key:k,label:v.label,color:v.color}))].map(f=>(
                <span key={f.key} onClick={()=>setFilter(f.key)} style={{border:`0.5px solid ${filter===f.key?"transparent":C.borderStrong}`,borderRadius:20,padding:"4px 12px",fontSize:11.5,cursor:"pointer",flexShrink:0,color:filter===f.key?"#fff":C.text2,background:filter===f.key?f.color:C.surface,transition:"all .15s"}}>
                  {f.label}
                </span>
              ))}
            </div>

            {/* GRID HEADER */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:1,fontSize:isMobile?9:11}}>
              {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>(
                <div key={d} style={{textAlign:"center",fontSize:isMobile?9:11.5,color:C.text3,padding:isMobile?"4px 0":"7px 0",fontWeight:500}}>{isMobile?d[0]:d}</div>
              ))}
            </div>

            {/* CALENDAR GRID */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:C.border,border:`0.5px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
              {cells.map((c,ci)=>{
                const ds = dsOf(c);
                const cd = new Date(c.yr,c.mo,c.d); cd.setHours(0,0,0,0);
                const isTod = cd.getTime()===today.getTime();
                const cellEvs = filtered.filter(e=>e.start<=ds&&e.end>=ds);
                const show = cellEvs.slice(0,3), more = cellEvs.length-3;
                const isDropTarget = dropCell===ds && mode==="edit";

                return (
                  <div key={ci}
                    onDragOver={mode==="edit"?e=>{e.preventDefault();handleDragOver(e,ds);}:undefined}
                    onDragLeave={mode==="edit"?()=>setDropCell(null):undefined}
                    onDrop={mode==="edit"?e=>handleDrop(e,ds):undefined}
                    onClick={mode==="edit"?()=>openAdd(ds):undefined}
                    style={{background:isDropTarget?"#fdf7d8":C.surface,minHeight:isMobile?70:130,padding:isMobile?"4px 3px":"7px 6px",overflow:"hidden",position:"relative",cursor:mode==="edit"?"pointer":"default",transition:"background .1s",outline:isDropTarget?`2px dashed ${C.yellow}`:"none"}}>
                    <div style={{fontSize:isMobile?9:11.5,fontWeight:500,width:isMobile?16:22,height:isMobile?16:22,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:isMobile?2:4,borderRadius:"50%",background:isTod?C.orange:"transparent",color:isTod?"#fff":c.o?C.text3:C.text,flexShrink:0}}>
                      {c.d}
                    </div>
                    {show.map(ev=>{
                      const cat = CATS[ev.cat]||CATS.campaign;
                      const isSelected = ev.id===sidebarId;
                      const isDragging = ev.id===dragId;
                      return (
                        <div key={ev.id}
                          draggable={mode==="edit"}
                          onDragStart={mode==="edit"?e=>{e.stopPropagation();handleDragStart(e,ev.id);}:undefined}
                          onDragEnd={handleDragEnd}
                          onClick={e=>{e.stopPropagation(); setSidebarId(sidebarId===ev.id?null:ev.id);}}
                          style={{borderRadius:isMobile?4:7,padding:isMobile?"3px 3px":"5px 7px",fontSize:11.5,fontWeight:500,marginBottom:isMobile?2:3,cursor:"pointer",display:"grid",gridTemplateColumns:isMobile?"8px minmax(0,1fr)":(mode==="edit"?"12px 16px minmax(0,1fr)":"16px minmax(0,1fr)"),alignItems:"start",gap:5,background:ev.hold?"transparent":cat.bg,color:ev.hold?C.text2:cat.text,border:ev.hold?`1.5px dashed ${C.tan}`:isSelected?`2px solid ${C.orange}`:`0.5px solid rgba(0,0,0,0.06)`,fontStyle:ev.hold?"italic":"normal",boxShadow:isSelected?"0 0 0 1px "+C.orange:"0 1px 2px rgba(0,0,0,.03)",opacity:isDragging?.4:1,transition:"opacity .15s,box-shadow .15s"}}>
                          {mode==="edit" && !isMobile && <span style={{cursor:"grab",color:C.text3,fontSize:10,display:"flex",alignItems:"center",paddingTop:2}}>⠿</span>}
                          <div style={{width:isMobile?6:16,height:isMobile?6:16,borderRadius:"50%",background:ev.hold?"transparent":cat.color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:isMobile?4:0}}>
                              {!ev.hold && !isMobile && <CatIcon path={cat.icon} color="#fff" size={9}/>}
                            </div>
                          <div style={{display:isMobile?"none":"block"}}>
                            <div style={{fontSize:11.5,fontWeight:600,lineHeight:1.2,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",textOverflow:"ellipsis"}}>{ev.name}</div>
                            {ev.sub && <div style={{fontSize:10,opacity:.7,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ev.sub}</div>}
                          </div>
                        </div>
                      );
                    })}
                    {more>0 && <div style={{fontSize:isMobile?8:10,color:C.text3,padding:"1px 2px"}}>+{more}</div>}
                  </div>
                );
              })}
            </div>

          </div>
        </div>

        {/* SIDEBAR */}
        {isMobile ? (
          sidebarEvent && (
            <>
              <div className="mobile-sidebar-overlay" onClick={()=>setSidebarId(null)}/>
              <div className="mobile-sidebar-sheet">
                <div style={{width:"100%",height:4,background:C.border,borderRadius:2,margin:"10px auto",width:40}}/>
                <Sidebar event={sidebarEvent} mode={mode} onClose={()=>setSidebarId(null)} onEdit={id=>{openEdit(id);}} onDelete={id=>{handleDelete(id);setSidebarId(null);}} onUpdateActions={handleUpdateActions}/>
              </div>
            </>
          )
        ) : (
          <div style={{width:sidebarEvent?340:0,flexShrink:0,overflow:"hidden",transition:"width .28s cubic-bezier(0.4,0,0.2,1)",display:"flex",flexDirection:"column"}}>
            {sidebarEvent && (
              <Sidebar event={sidebarEvent} mode={mode} onClose={()=>setSidebarId(null)} onEdit={id=>{openEdit(id);}} onDelete={id=>{handleDelete(id);setSidebarId(null);}} onUpdateActions={handleUpdateActions}/>
            )}
          </div>
        )}
      </div>

      {/* MODALS */}
      <EventForm open={formOpen} onClose={()=>{setFormOpen(false);setEditEvt(null);}} onSave={handleSave} onDelete={handleDelete} editEvent={editEvt} initialDate={formDate}/>
      <ThemeForm open={themeOpen} onClose={()=>setThemeOpen(false)} monthIndex={mo} themes={themes} onSave={(idx,data)=>{ const nt={...themes,[idx]:{...themes[idx],...data}}; saveThemes(nt); }}/>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(NeighborlyCalendar)
);
</script>
</body>
</html>
