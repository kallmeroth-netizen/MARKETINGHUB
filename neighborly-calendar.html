<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Calendar — Neighborly</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F7F6F3;--surface:#fff;--surface2:#F0EEE9;
    --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);
    --text:#1A1916;--text-2:#6B6960;--text-3:#9E9C96;
    --dark:#1f2328;--yellow:#eace49;--yellow-light:#fdf7d8;--yellow-dark:#7a6b00;
    --green:#7bbd91;--green-light:#e4f5ea;--green-dark:#2a5c38;
    --orange:#e87142;--orange-light:#fdeee7;--orange-dark:#8a3518;
    --blue:#6280bd;--blue-light:#eaeef8;--blue-dark:#2d4480;
    --tan:#dbc6a2;--tan-light:#f7f0e4;--tan-dark:#5a4520;
    --lav:#cbc9d6;--lav-light:#f0eff5;--lav-dark:#4a4760;
    --radius-md:8px;--radius-lg:12px;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  nav{background:var(--surface);border-bottom:0.5px solid var(--border-strong);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:50}
  .nav-brand{font-size:14px;font-weight:600;letter-spacing:-0.02em;color:var(--text);display:flex;align-items:center;gap:8px;text-decoration:none}
  .nav-dot{width:7px;height:7px;background:var(--yellow);border-radius:50%}
  .nav-back{font-size:12px;color:var(--text-2);text-decoration:none;display:flex;align-items:center;gap:5px;padding:5px 12px;border:0.5px solid var(--border-strong);border-radius:var(--radius-md);transition:background 0.15s}
  .nav-back:hover{background:var(--surface2)}
  .wrap{padding:1.25rem 1.5rem 3rem;max-width:1300px;margin:0 auto}
  .theme-banner{border-radius:var(--radius-lg);border:0.5px solid var(--border);border-left-width:3px;padding:1.25rem 1.5rem;margin-bottom:1rem;background:var(--surface2);border-radius:0 var(--radius-lg) var(--radius-lg) 0}
  .theme-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:.75rem}
  .theme-tag{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:6px}
  .theme-name{font-size:17px;font-weight:500;color:var(--text);margin-bottom:3px}
  .theme-desc{font-size:13px;color:var(--text-2);max-width:420px;line-height:1.5}
  .goals-wrap{display:flex;flex-direction:column;gap:8px;min-width:220px}
  .goals-label{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .goal-row{display:flex;align-items:center;gap:8px;cursor:pointer}
  .goal-row input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--yellow);flex-shrink:0}
  .goal-row span{font-size:12.5px;color:var(--text);line-height:1.4}
  .goal-row.done span{text-decoration:line-through;color:var(--text-3)}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:12px;flex-wrap:wrap}
  .nav-group{display:flex;align-items:center;gap:8px}
  .month-label{font-size:17px;font-weight:500;color:var(--text);min-width:150px;text-align:center}
  .nav-btn{background:none;border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:5px 10px;cursor:pointer;color:var(--text);font-size:13px;display:flex;align-items:center}
  .nav-btn:hover{background:var(--surface2)}
  .add-btn{background:var(--dark);border:none;border-radius:var(--radius-md);padding:7px 14px;cursor:pointer;color:var(--yellow);font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif}
  .add-btn:hover{opacity:.9}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
  .filter-pill{border:0.5px solid var(--border-strong);border-radius:20px;padding:4px 12px;font-size:11.5px;cursor:pointer;color:var(--text-2);background:var(--surface);transition:all .15s}
  .filter-pill.active{color:var(--dark);border-color:transparent}
  .grid-header{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:1px}
  .day-label{text-align:center;font-size:11.5px;color:var(--text-3);padding:7px 0;font-weight:500}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
  .cal-cell{background:var(--surface);min-height:130px;padding:7px 6px;cursor:pointer;transition:background .1s;overflow:hidden;min-width:0}
  .cal-cell:hover{background:var(--surface2)}
  .cal-cell.other-month .day-num{color:var(--text-3)}
  .cal-cell.today .day-num{background:var(--dark);color:var(--yellow);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .day-num{font-size:11.5px;font-weight:500;color:var(--text);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;flex-shrink:0}
  .event-chip{border-radius:4px;padding:2px 6px;font-size:11px;font-weight:500;margin-bottom:2px;cursor:pointer;white-space:normal;word-break:break-word;line-height:1.3;display:block;width:100%}
  .event-chip:hover{opacity:.85}
  .event-chip.hold{border:1.5px dashed var(--tan);background:transparent!important;color:var(--text-2)!important;font-style:italic}
  .more-tag{font-size:10px;color:var(--text-3);padding:1px 4px}
  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.32);display:none;align-items:center;justify-content:center;z-index:200}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:1.5rem;width:430px;max-width:95vw;max-height:88vh;overflow-y:auto}
  .modal h2{font-size:15px;font-weight:500;margin-bottom:1.25rem;color:var(--text)}
  .field-row{margin-bottom:11px}
  .field-row label{display:block;font-size:11.5px;color:var(--text-2);margin-bottom:3px}
  .field-row input,.field-row select,.field-row textarea{width:100%;border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:7px 10px;font-size:13px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif}
  .field-row textarea{resize:vertical;min-height:55px}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap}
  .tag-sel{border:0.5px solid var(--border-strong);border-radius:20px;padding:3px 10px;font-size:11.5px;cursor:pointer;color:var(--text-2);background:var(--surface)}
  .tag-sel.sel{color:var(--dark);border-color:transparent}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
  .btn-cancel{background:none;border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:6px 16px;font-size:13px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif}
  .btn-save{background:var(--dark);border:none;border-radius:var(--radius-md);padding:6px 16px;font-size:13px;cursor:pointer;color:var(--yellow);font-weight:500;font-family:'DM Sans',sans-serif}
  .btn-del{background:none;border:0.5px solid var(--orange);border-radius:var(--radius-md);padding:6px 14px;font-size:13px;cursor:pointer;color:var(--orange);font-family:'DM Sans',sans-serif}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html"><div class="nav-dot"></div>Neighborly</a>
  <a class="nav-back" href="index.html">&#8592; Portal home</a>
</nav>

<div class="wrap">
  <div class="theme-banner" id="themeBanner">
    <div class="theme-top">
      <div>
        <div class="theme-tag" id="themeTag"></div>
        <div class="theme-name" id="themeName"></div>
        <div class="theme-desc" id="themeDesc"></div>
      </div>
      <div class="goals-wrap">
        <div class="goals-label">Monthly goals</div>
        <label class="goal-row" id="gr0"><input type="checkbox" id="g0" onchange="tg(0)"><span id="gt0"></span></label>
        <label class="goal-row" id="gr1"><input type="checkbox" id="g1" onchange="tg(1)"><span id="gt1"></span></label>
        <label class="goal-row" id="gr2"><input type="checkbox" id="g2" onchange="tg(2)"><span id="gt2"></span></label>
      </div>
    </div>
  </div>

  <div class="top-bar">
    <div class="nav-group">
      <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      <button class="nav-btn" onclick="goToday()" style="font-size:12px;padding:5px 10px">Today</button>
    </div>
    <button class="add-btn" onclick="openAdd()"><i class="ti ti-plus"></i> Add event</button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="grid-header" id="gridHeader"></div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Add event</h2>
    <div class="field-row"><label>Event name</label><input type="text" id="evName" placeholder="e.g. Summer campaign launch"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field-row"><label>Start date</label><input type="date" id="evStart"></div>
      <div class="field-row"><label>End date</label><input type="date" id="evEnd"></div>
    </div>
    <div class="field-row"><label>Category</label>
      <select id="evCat">
        <option value="campaign">Campaign / promotion</option>
        <option value="social">Social media</option>
        <option value="keydate">Key date</option>
        <option value="ops">Internal ops</option>
        <option value="event">Event / activation</option>
        <option value="bizupdate">Biz update</option>
        <option value="launch">Launch date</option>
      </select>
    </div>
    <div class="field-row"><label>Subcategory</label><input type="text" id="evSub" placeholder="e.g. Instagram, Email, Holiday"></div>
    <div class="field-row" style="display:flex;align-items:center;gap:10px">
      <input type="checkbox" id="evHold" style="width:14px;height:14px;accent-color:var(--yellow);flex-shrink:0">
      <label for="evHold" style="font-size:13px;cursor:pointer;margin:0">Mark as HOLD (tentative)</label>
    </div>
    <div class="field-row"><label>Department</label><div class="tag-row" id="deptTags"></div></div>
    <div class="field-row"><label>Tag people</label><div class="tag-row" id="peopleTags"></div></div>
    <div class="field-row"><label>Notes</label><textarea id="evNotes" placeholder="Details, links, deliverables…"></textarea></div>
    <div class="modal-btns">
      <button class="btn-del" id="btnDel" onclick="deleteEv()" style="display:none"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEv()">Save</button>
    </div>
  </div>
</div>

<script>
const CATS={
  campaign:{label:'Campaign',color:'#eace49',bg:'#fdf7d8',text:'#7a6b00'},
  social:{label:'Social',color:'#7bbd91',bg:'#e4f5ea',text:'#2a5c38'},
  keydate:{label:'Key date',color:'#dbc6a2',bg:'#f7f0e4',text:'#5a4520'},
  ops:{label:'Ops',color:'#888780',bg:'#F1EFE8',text:'#444441'},
  event:{label:'Event',color:'#e87142',bg:'#fdeee7',text:'#8a3518'},
  bizupdate:{label:'Biz update',color:'#6280bd',bg:'#eaeef8',text:'#2d4480'},
  launch:{label:'Launch',color:'#1f2328',bg:'#e5e3d6',text:'#1f2328'}
};
const DEPTS=['Marketing','Operations','Creative','Sales','Leadership'];
const PEOPLE=[
  {name:'Alex M',initials:'AM',color:'#eace49',tc:'#7a6b00'},
  {name:'Jordan T',initials:'JT',color:'#7bbd91',tc:'#2a5c38'},
  {name:'Riley S',initials:'RS',color:'#e87142',tc:'#8a3518'},
  {name:'Casey B',initials:'CB',color:'#dbc6a2',tc:'#5a4520'},
  {name:'Morgan L',initials:'ML',color:'#6280bd',tc:'#2d4480'}
];
const THEMES={
  0:{theme:'New Year, New Push',desc:'Kick off Q1 with energy — introduce new offerings and reset brand positioning.',tag:'January',color:'#eace49',tagBg:'#fdf7d8',tagText:'#7a6b00',goals:['Launch Q1 campaign brief','Finalize key dates for spring','Set team content cadence']},
  1:{theme:'Love Your Community',desc:'Lean into Valentine\'s Day — warm campaigns highlighting relationships and loyalty.',tag:'February',color:'#e87142',tagBg:'#fdeee7',tagText:'#8a3518',goals:['Publish 2 Valentine\'s campaigns','Grow email list by 5%','Brief spring activation plan']},
  2:{theme:'Spring Forward',desc:'Seasonal refresh across all channels. New product spotlights and activation prep.',tag:'March',color:'#7bbd91',tagBg:'#e4f5ea',tagText:'#2a5c38',goals:['Spring creative assets delivered','Confirm Q2 launch dates','Launch affiliate partner outreach']},
  3:{theme:'Growth Season',desc:'Double down on paid and organic reach. Earth Day tie-ins and Q2 pipeline building.',tag:'April',color:'#7bbd91',tagBg:'#e4f5ea',tagText:'#2a5c38',goals:['Earth Day activation live','Increase social posting to 5x/week','Q2 biz update to leadership']},
  4:{theme:'Momentum Month',desc:'Mother\'s Day, Memorial Day — the biggest content and promo window of H1.',tag:'May',color:'#dbc6a2',tagBg:'#f7f0e4',tagText:'#5a4520',goals:["Mother's Day campaign executed","Memorial Day promo live by May 20",'Newsletter open rate above 30%']},
  5:{theme:'Summer Launch',desc:'Pride Month, summer kickoff, and peak engagement season. Go bold on activations.',tag:'June',color:'#e87142',tagBg:'#fdeee7',tagText:'#8a3518',goals:['Summer product launch date confirmed','Pride campaign published','Plan Q3 influencer partnerships']},
  6:{theme:'Peak Season',desc:'Fourth of July and mid-summer — high traffic, high intent. Focus on conversion.',tag:'July',color:'#e87142',tagBg:'#fdeee7',tagText:'#8a3518',goals:['July 4th promo executed','Retargeting campaigns running','Mid-year biz update published']},
  7:{theme:'Back to Routine',desc:'Post-summer refocus. Back to school energy and early fall product seeding.',tag:'August',color:'#6280bd',tagBg:'#eaeef8',tagText:'#2d4480',goals:['Back-to-school campaign live','Fall launch date locked in','Reorder fall inventory by Aug 15']},
  8:{theme:'Fall Into It',desc:'Labor Day through autumn vibes — warm tones and early holiday planning begins.',tag:'September',color:'#dbc6a2',tagBg:'#f7f0e4',tagText:'#5a4520',goals:['Fall campaign creative locked','Holiday planning kickoff','Q3 biz update to team']},
  9:{theme:'Holiday Runway',desc:'October is the launchpad for Q4. Halloween, holiday teasers, key dates confirmed.',tag:'October',color:'#dbc6a2',tagBg:'#f7f0e4',tagText:'#5a4520',goals:['Halloween activation executed','Holiday launch dates finalized','Q4 key dates on calendar']},
  10:{theme:'Peak Holiday',desc:'Thanksgiving, Black Friday, Cyber Monday — the highest-stakes window of the year.',tag:'November',color:'#eace49',tagBg:'#fdf7d8',tagText:'#7a6b00',goals:['BFCM launch date live','Email sequences scheduled','Biz update: Q4 forecast shared']},
  11:{theme:'Year-End Strong',desc:'Holiday gifting, end-of-year wrap-ups, and setting the stage for January.',tag:'December',color:'#6280bd',tagBg:'#eaeef8',tagText:'#2d4480',goals:['Holiday gifting campaign live','Year-in-review biz update published','Q1 launch dates drafted']}
};

let goalState={},events=[],editId=null,selDepts=[],selPeople=[],activeFilter='all';
let currentDate=new Date();
const today=new Date();today.setHours(0,0,0,0);
function uid(){return Math.random().toString(36).slice(2,9)}

// Seed some sample events
events=[
  {id:uid(),name:'HOLD — Campaign',start:'2025-05-05',end:'2025-05-05',cat:'campaign',sub:'',depts:[],people:[],notes:'',hold:true},
  {id:uid(),name:"Mother's Day Activation",start:'2025-05-10',end:'2025-05-11',cat:'event',sub:'In-store',depts:['Marketing'],people:['AM'],notes:''},
  {id:uid(),name:'Summer Collection Launch',start:'2025-05-15',end:'2025-05-15',cat:'launch',sub:'Product',depts:['Marketing','Creative'],people:['AM','RS'],notes:''},
  {id:uid(),name:'Memorial Day Promo',start:'2025-05-23',end:'2025-05-26',cat:'campaign',sub:'Promo',depts:['Marketing','Sales'],people:['AM','CB'],notes:'20% site-wide'},
  {id:uid(),name:'Q2 Business Update',start:'2025-05-13',end:'2025-05-13',cat:'bizupdate',sub:'Internal',depts:['Leadership'],people:['ML'],notes:''},
];

function mk(){return currentDate.getFullYear()+'-'+currentDate.getMonth()}
function tg(i){const k=mk();if(!goalState[k])goalState[k]=[false,false,false];goalState[k][i]=document.getElementById('g'+i).checked;document.getElementById('gr'+i).classList.toggle('done',goalState[k][i])}

function renderTheme(){
  const m=currentDate.getMonth(),t=THEMES[m],k=mk();
  if(!goalState[k])goalState[k]=[false,false,false];
  const tag=document.getElementById('themeTag');
  tag.textContent=t.tag;tag.style.background=t.tagBg;tag.style.color=t.tagText;
  document.getElementById('themeName').textContent=t.theme;
  document.getElementById('themeDesc').textContent=t.desc;
  const b=document.getElementById('themeBanner');
  b.style.borderLeftColor=t.color;
  for(let i=0;i<3;i++){document.getElementById('gt'+i).textContent=t.goals[i];document.getElementById('g'+i).checked=goalState[k][i];document.getElementById('gr'+i).classList.toggle('done',goalState[k][i])}
}

function renderFilters(){
  const f=document.getElementById('filters');
  const all=[{key:'all',label:'All events',color:'#1f2328',bg:'#eace49'},...Object.entries(CATS).map(([k,v])=>({key:k,label:v.label,color:v.color,bg:v.bg}))];
  f.innerHTML=all.map(x=>`<span class="filter-pill${activeFilter===x.key?' active':''}" style="${activeFilter===x.key?'background:'+x.color+';color:'+(x.key==='all'?'#eace49':'#1f2328'):''}" onclick="setFilter('${x.key}')">${x.label}</span>`).join('');
}
function setFilter(k){activeFilter=k;renderFilters();renderCal()}

function renderCal(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  document.getElementById('monthLabel').textContent=new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('gridHeader').innerHTML=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="day-label">${d}</div>`).join('');
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
  const cells=[];
  for(let i=first-1;i>=0;i--)cells.push({d:dip-i,o:true,mo:m-1,yr:m===0?y-1:y});
  for(let i=1;i<=dim;i++)cells.push({d:i,o:false,mo:m,yr:y});
  for(let i=1;i<=42-cells.length;i++)cells.push({d:i,o:true,mo:m+1,yr:m===11?y+1:y});
  const filtered=events.filter(e=>activeFilter==='all'||e.cat===activeFilter);
  document.getElementById('calGrid').innerHTML=cells.map(c=>{
    const cd=new Date(c.yr,c.mo,c.d);cd.setHours(0,0,0,0);
    const isTod=cd.getTime()===today.getTime();
    const ds=`${c.yr}-${String(c.mo+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}`;
    const evs=filtered.filter(e=>e.start<=ds&&e.end>=ds);
    const show=evs.slice(0,3),more=evs.length-3;
    return `<div class="cal-cell${c.o?' other-month':''}${isTod?' today':''}" onclick="openAdd('${ds}')">
      <div class="day-num">${c.d}</div>
      ${show.map(e=>`<div class="event-chip${e.hold?' hold':''}" style="${e.hold?'':'background:'+CATS[e.cat].bg+';color:'+CATS[e.cat].text}" onclick="event.stopPropagation();openEdit('${e.id}')">${e.hold?'⊘ ':''}${e.name}</div>`).join('')}
      ${more>0?`<div class="more-tag">+${more} more</div>`:''}
    </div>`;
  }).join('');
}

function changeMonth(d){currentDate.setMonth(currentDate.getMonth()+d);renderTheme();renderCal()}
function goToday(){currentDate=new Date();renderTheme();renderCal()}

function renderTagSels(){
  document.getElementById('deptTags').innerHTML=DEPTS.map(d=>`<span class="tag-sel${selDepts.includes(d)?' sel':''}" style="${selDepts.includes(d)?'background:#1f2328;color:#eace49;border-color:#1f2328':''}" onclick="togD('${d}')">${d}</span>`).join('');
  document.getElementById('peopleTags').innerHTML=PEOPLE.map(p=>`<span class="tag-sel${selPeople.includes(p.initials)?' sel':''}" style="${selPeople.includes(p.initials)?'background:'+p.color+';color:'+p.tc+';border-color:'+p.color:''}" onclick="togP('${p.initials}')">${p.name}</span>`).join('');
}
function togD(d){selDepts.includes(d)?selDepts=selDepts.filter(x=>x!==d):selDepts.push(d);renderTagSels()}
function togP(p){selPeople.includes(p)?selPeople=selPeople.filter(x=>x!==p):selPeople.push(p);renderTagSels()}

function openAdd(ds=''){
  editId=null;
  document.getElementById('modalTitle').textContent='Add event';
  document.getElementById('evName').value='';
  document.getElementById('evStart').value=ds;
  document.getElementById('evEnd').value=ds;
  document.getElementById('evCat').value='campaign';
  document.getElementById('evSub').value='';
  document.getElementById('evNotes').value='';
  document.getElementById('evHold').checked=false;
  document.getElementById('btnDel').style.display='none';
  selDepts=[];selPeople=[];renderTagSels();
  document.getElementById('modalBg').classList.add('open');
}
function openEdit(id){
  const e=events.find(x=>x.id===id);if(!e)return;
  editId=id;
  document.getElementById('modalTitle').textContent='Edit event';
  document.getElementById('evName').value=e.name;
  document.getElementById('evStart').value=e.start;
  document.getElementById('evEnd').value=e.end;
  document.getElementById('evCat').value=e.cat;
  document.getElementById('evSub').value=e.sub||'';
  document.getElementById('evNotes').value=e.notes||'';
  document.getElementById('evHold').checked=!!e.hold;
  document.getElementById('btnDel').style.display='block';
  selDepts=[...e.depts];selPeople=[...e.people];renderTagSels();
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');editId=null}
function saveEv(){
  const name=document.getElementById('evName').value.trim(),start=document.getElementById('evStart').value;
  if(!name||!start){alert('Please add a name and start date.');return;}
  const ev={id:editId||uid(),name,start,end:document.getElementById('evEnd').value||start,cat:document.getElementById('evCat').value,sub:document.getElementById('evSub').value,depts:[...selDepts],people:[...selPeople],notes:document.getElementById('evNotes').value,hold:document.getElementById('evHold').checked};
  if(editId){events=events.map(e=>e.id===editId?ev:e)}else{events.push(ev)}
  closeModal();renderCal();
}
function deleteEv(){if(!editId)return;events=events.filter(e=>e.id!==editId);closeModal();renderCal()}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal()});

renderTheme();renderFilters();renderCal();
</script>
</body>
</html>
