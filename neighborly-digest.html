<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e87142">
<title>Morning Digest — Neighborly</title>
<link rel="manifest" href="/manifest.json">
<style>
@font-face{font-family:'TAYAmaya';src:url('TAYAmaya.otf') format('opentype');}
@font-face{font-family:'Tuppence';src:url('Tuppence.otf') format('opentype');}
@font-face{font-family:'Futura PT Demi';src:url('FuturaPTDemi.ttf') format('truetype');}
:root{
  --ink:#1f2328;--cream:#F7F6F3;--cream-warm:#fffdf7;--surface:#fff;--surface-2:#F0EEE9;
  --text-2:#3a3d44;--text-3:#7a7770;--border:rgba(0,0,0,.08);
  --orange:#e87142;--orange-l:#fdeee7;--orange-d:#a32d2d;--green-d:#2a7a4b;
  --pos:#2a7a4b;--neg:#a32d2d;
  --f-sans:'DM Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
  --f-eyebrow:'Futura PT Demi','Jost',sans-serif;--f-display:'TAYAmaya','DM Sans',sans-serif;
  --sh-sm:0 1px 3px rgba(0,0,0,.06);--sh-md:0 4px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{font-family:var(--f-sans);background:var(--cream);color:var(--ink);display:flex;justify-content:center;}
.eyebrow{font-family:var(--f-eyebrow);font-size:9.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--text-3);}
#sheet{position:relative;width:100%;max-width:460px;min-height:100vh;background:var(--cream);overflow:hidden;
       padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
#load{position:fixed;inset:0;z-index:20;background:var(--cream-warm);display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;transition:opacity .6s ease;}
#load.hide{opacity:0;pointer-events:none;}
#load video{width:210px;height:auto;}
#load .ld{font-family:var(--f-eyebrow);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}
#content{opacity:0;transition:opacity .5s ease;}
#content.in{opacity:1;}
.hd{padding:20px 20px 6px;}
.hd .title{font-family:var(--f-display);font-size:33px;line-height:1;margin:3px 0 3px;}
.hd .date{font-size:12px;color:var(--text-3);}
.sec{padding:12px 20px 0;}
.sec-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px;}
.sec-h .st{font-family:var(--f-eyebrow);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);}
.sec-h .ss{font-size:10.5px;color:var(--text-3);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.kpi-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:10px 12px;box-shadow:var(--sh-sm);opacity:0;transform:translateY(9px);transition:all .5s cubic-bezier(.2,.8,.3,1);}
.kpi-card.in{opacity:1;transform:none;}
.kpi-card .kl{font-family:var(--f-eyebrow);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-3);}
.kpi-card .kv{font-size:21px;font-weight:600;letter-spacing:-.01em;margin-top:3px;}
.kpi-card .kc{font-size:10.5px;margin-top:3px;display:flex;align-items:center;gap:4px;}
.kc .chg{font-weight:600;}.pos{color:var(--pos);}.neg{color:var(--neg);}.kc .kcl{color:var(--text-3);}
.slim{background:var(--surface);border:.5px solid var(--border);border-radius:12px;box-shadow:var(--sh-sm);padding:9px 13px;display:flex;align-items:center;gap:11px;margin-bottom:8px;}
.slim.hi{background:linear-gradient(100deg,var(--orange-l),var(--surface));}
.slim .rk{font-family:var(--f-display);font-size:20px;color:var(--orange);line-height:1;flex:0 0 auto;}
.slim .sb{flex:1;min-width:0;}
.slim .se{font-family:var(--f-eyebrow);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-3);}
.slim .sn{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slim .sv{font-size:17px;font-weight:600;flex:0 0 auto;}
.rankjump{display:flex;align-items:center;gap:6px;background:#eaf6ee;border-radius:10px;padding:5px 10px;flex:0 0 auto;}
.rankjump .from{font-size:12px;color:var(--text-3);text-decoration:line-through;}
.rankjump .arrow{width:13px;height:13px;color:var(--green-d);}
.rankjump .to{font-size:15px;font-weight:600;color:var(--green-d);}
.chart-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:var(--sh-sm);display:flex;gap:14px;align-items:center;}
.donut-wrap{flex:0 0 100px;}
.donut{width:100px;height:100px;border-radius:50%;position:relative;clip-path:circle(0% at 50% 50%);transition:clip-path .9s cubic-bezier(.3,.9,.3,1);}
.donut.in{clip-path:circle(72% at 50% 50%);}
.donut::after{content:'';position:absolute;inset:21px;background:var(--surface);border-radius:50%;}
.donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
.donut .center .cv{font-size:15px;font-weight:600;}
.donut .center .cl{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);font-family:var(--f-eyebrow);}
.legend{flex:1;display:flex;flex-direction:column;gap:5px;}
.lg{display:flex;align-items:center;gap:7px;font-size:11.5px;opacity:0;transform:translateX(9px);transition:all .4s;}
.lg.in{opacity:1;transform:none;}
.lg .dot{width:8px;height:8px;border-radius:2px;flex:0 0 8px;}
.lg .ln{flex:1;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lg .lp{font-weight:600;}
.cmp{display:flex;background:var(--surface);border:.5px solid var(--border);border-radius:12px;box-shadow:var(--sh-sm);overflow:hidden;}
.cmp-col{flex:1;padding:11px 14px;}
.cmp-col+.cmp-col{border-left:.5px solid var(--border);}
.cmp-loc{font-family:var(--f-eyebrow);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);}
.cmp-net{font-size:20px;font-weight:600;margin:3px 0 2px;}
.cmp-sub{font-size:10.5px;color:var(--text-3);}
.cmp-bar{height:6px;border-radius:5px;background:var(--surface-2);margin-top:8px;overflow:hidden;}
.cmp-fill{height:100%;width:0;border-radius:5px;transition:width .9s cubic-bezier(.2,.8,.25,1);}
.foot{padding:16px 20px 22px;}
.cta{display:block;text-align:center;background:var(--ink);color:var(--cream-warm);font-weight:600;font-size:13px;padding:13px;border-radius:100px;box-shadow:var(--sh-md);letter-spacing:.03em;font-family:var(--f-eyebrow);text-transform:uppercase;text-decoration:none;}
</style>
</head>
<body>
<div id="sheet">
  <div id="load">
    <video id="loadvid" muted playsinline autoplay loop poster="LineDrawingNeighborly_safari.png" src="LineDrawingNeighborly_cream.mp4"></video>
    <div class="ld">Pulling yesterday's numbers</div>
  </div>
  <div id="content">
    <div class="hd">
      <div class="eyebrow">Morning digest</div>
      <div class="title">Yesterday</div>
      <div class="date" id="dDate">—</div>
    </div>
    <div class="sec"><div class="kpi-grid" id="kpis"></div></div>
    <div class="sec" id="standouts"></div>
    <div class="sec">
      <div class="sec-h"><div class="st">Sales by channel</div><div class="ss" id="chTotal"></div></div>
      <div class="chart-card">
        <div class="donut-wrap"><div class="donut" id="donut"><div class="center"><div class="cv" id="offPrem">—</div><div class="cl">Off-prem</div></div></div></div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-h"><div class="st">Westlake Village vs Brentwood</div></div>
      <div class="cmp" id="cmp"></div>
    </div>
    <div class="foot"><a class="cta" href="neighborly-dashboard.html">Open dashboard</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="np-data.js"></script>
<script>
// Morning Digest — reads the SAME live feed the dashboard uses
// (dashboard-daily Edge Function + nbly_pmix_summary_daily RPC), and
// falls back to the committed /daily-data.json snapshot if the live
// calls aren't reachable, so the page always renders something.
const CONCEPT_LABELS={whatsGabyCooking:"What's Gaby Cooking",miniKabob:"Mini Kabob",socialMonk:"Social Monk",mixtape:"Mixtape",palermoPizzaClub:"Palermo Pizza Club",neighborlyCookies:"Neighborly Cookies",marketplace:"Marketplace",catering:"Catering",beverages:"Beverages",wine:"Wine",beer:"Beer"};
const CH_META={dineIn:['Dine-in','#e87142'],webTakeOut:['Web take-out','#6280bd'],thirdParty:['3rd party','#7bbd91'],kioskTakeOut:['Kiosk take-out','#eace49'],webDelivery:['Web delivery','#cbc9d6'],catering:['Catering','#dbc6a2'],marketplace:['Marketplace','#a32d2d'],curbside:['Curbside','#7a7770']};

const fmtInt=v=>Math.round(+v).toLocaleString();
const fmtDollarRound=v=>'$'+Math.round(+v).toLocaleString();
const pct=(a,b)=>b?((a-b)/Math.abs(b)*100):0;
const fmtPct=v=>(v>=0?'+':'−')+Math.abs(v).toFixed(1)+'%';
const fmtPts=v=>(v>=0?'+':'−')+Math.abs(v).toFixed(1)+' pts';
const titleCase=s=>String(s||'').toLowerCase().replace(/\b([a-z])/g,m=>m.toUpperCase());
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function authHeaders(){ try{const s=await NPData.getSession();return s?{Authorization:'Bearer '+s.access_token}:{};}catch(e){return {};} }

async function loadDigest(){
  let daily=null, items=null;
  try{
    const {data,error}=await NPData.supabase.functions.invoke('dashboard-daily',{body:{},headers:await authHeaders()});
    if(!error) daily=data;
  }catch(e){}
  if(!daily){ daily=await fetch('daily-data.json',{cache:'no-store'}).then(r=>r.json()).catch(()=>null); }
  try{
    const {data,error}=await NPData.supabase.rpc('nbly_pmix_summary_daily',{});
    if(!error) items=data;
  }catch(e){}
  return {daily,items};
}

function prettyDate(raw){ // "Monday 06/29/26" -> "Monday, June 29"
  if(!raw) return '';
  const m=String(raw).match(/([A-Za-z]+)\s+(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(!m) return raw;
  const MON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${m[1]}, ${MON[+m[2]-1]} ${+m[3]}`;
}

function renderKPIs(T,S){
  const off=T.offPremisePct||0, offAvg=(S.offPremisePct!=null)?S.offPremisePct:(100-(S.onPremisePct||0));
  const kpis=[
    {kl:'Net sales',kv:fmtDollarRound(T.netSales),chg:fmtPct(pct(T.netSales,S.netSales)),good:T.netSales>=(S.netSales||0)},
    {kl:'Check count',kv:fmtInt(T.checkCount),chg:fmtPct(pct(T.checkCount,S.checkCount)),good:T.checkCount>=(S.checkCount||0)},
    {kl:'Avg check',kv:'$'+(+T.avgCheck).toFixed(2),chg:fmtPct(pct(T.avgCheck,S.avgCheck)),good:T.avgCheck>=(S.avgCheck||0)},
    {kl:'Off premise %',kv:(+off).toFixed(1)+'%',chg:fmtPts(off-offAvg),good:true},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>`
    <div class="kpi-card"><div class="kl">${k.kl}</div>
    <div class="kv" data-target="${k.kv}">${k.kv.replace(/[0-9]/g,'0')}</div>
    <div class="kc"><span class="chg ${k.good?'pos':'neg'}">${k.chg}</span><span class="kcl">vs 6-week avg</span></div></div>`).join('');
}

function topItem(T){
  const pm=T.pmix||{}; let best=null;
  for(const k in pm){ if(best===null||pm[k]>pm[best]) best=k; }
  if(best===null) return null;
  const share=T.netSales?Math.round(pm[best]/T.netSales*100):null;
  return {name:CONCEPT_LABELS[best]||titleCase(best),val:fmtDollarRound(pm[best]),share};
}

function biggestMover(items){
  // Accept a few possible shapes from the RPC; find the item that climbed the most.
  const arr=(items&&(items.locations&&(items.locations.total||items.locations.wlv)||items.total||items.items||items))||[];
  if(!Array.isArray(arr)||!arr.length) return null;
  let best=null;
  for(const it of arr){ const d=+(it.rank_delta||0); if(d>0&&(best===null||d>best.rank_delta)) best={...it,rank_delta:d}; }
  if(!best) return null;
  const to=+best.day_rank||null, from=(to!=null)?to+best.rank_delta:null;
  return {name:titleCase(best.name||best.item||''),from,to};
}

function renderStandouts(ti,mv){
  let html='';
  if(ti) html+=`<div class="slim hi"><div class="rk">01</div>
    <div class="sb"><div class="se">Top item · by net sales</div><div class="sn">${ti.name}</div></div>
    <div class="sv">${ti.val}</div></div>`;
  if(mv&&mv.from&&mv.to) html+=`<div class="slim">
    <div class="sb"><div class="se">Biggest mover</div><div class="sn">${mv.name}</div></div>
    <div class="rankjump"><span class="from">#${mv.from}</span>
    <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    <span class="to">#${mv.to}</span></div></div>`;
  document.getElementById('standouts').innerHTML=html;
}

function renderChannels(T){
  const ch=T.channels||{};
  const rows=Object.keys(ch).filter(k=>ch[k]>0&&CH_META[k]).map(k=>({n:CH_META[k][0],v:ch[k],c:CH_META[k][1]})).sort((a,b)=>b.v-a.v);
  const tot=rows.reduce((s,x)=>s+x.v,0)||1;
  let acc=0, stops=[];
  rows.forEach(x=>{const a0=acc/tot*360;acc+=x.v;const a1=acc/tot*360;stops.push(`${x.c} ${a0}deg ${a1}deg`);});
  document.getElementById('donut').style.background=`conic-gradient(from -90deg, ${stops.join(', ')})`;
  document.getElementById('offPrem').textContent=Math.round(T.offPremisePct||0)+'%';
  document.getElementById('chTotal').textContent=fmtDollarRound(T.netSales)+' total';
  document.getElementById('legend').innerHTML=rows.slice(0,5).map(x=>`
    <div class="lg"><span class="dot" style="background:${x.c}"></span><span class="ln">${x.n}</span><span class="lp">${Math.round(x.v/tot*100)}%</span></div>`).join('');
}

function renderCompare(w,b){
  const L=[{n:'Westlake Village',net:w.netSales,checks:w.checkCount,avg:w.avgCheck,c:'#e87142'},
           {n:'Brentwood',net:b.netSales,checks:b.checkCount,avg:b.avgCheck,c:'#6280bd'}];
  const max=Math.max(...L.map(l=>l.net))||1;
  document.getElementById('cmp').innerHTML=L.map(l=>`
    <div class="cmp-col"><div class="cmp-loc">${l.n}</div><div class="cmp-net">${fmtDollarRound(l.net)}</div>
    <div class="cmp-sub">${fmtInt(l.checks)} checks · $${(+l.avg).toFixed(2)}</div>
    <div class="cmp-bar"><div class="cmp-fill" data-w="${Math.round(l.net/max*100)}" style="background:${l.c}"></div></div></div>`).join('');
}

function countUp(el){const target=el.dataset.target,num=parseFloat(target.replace(/[^0-9.]/g,''))||0,prefix=target.startsWith('$')?'$':'',dec=(target.split('.')[1]||'').length,t0=performance.now();
  (function tick(now){const p=Math.min(1,(now-t0)/800),e=1-Math.pow(1-p,3),val=num*e;
  el.textContent=prefix+val.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
  if(p<1)requestAnimationFrame(tick);else el.textContent=target;})(performance.now());}

function reveal(){
  document.getElementById('load').classList.add('hide');
  document.getElementById('content').classList.add('in');
  document.querySelectorAll('.kpi-card').forEach((c,i)=>setTimeout(()=>{c.classList.add('in');countUp(c.querySelector('.kv'));},120+i*95));
  setTimeout(()=>document.getElementById('donut').classList.add('in'),520);
  document.querySelectorAll('.lg').forEach((l,i)=>setTimeout(()=>l.classList.add('in'),650+i*80));
  document.querySelectorAll('.cmp-fill').forEach((f,i)=>setTimeout(()=>f.style.width=f.dataset.w+'%',780+i*150));
}

(async function main(){
  // Auth gate — same as the other hub pages. If NPData isn't ready, keep going (fallback render).
  try{ if(window.NPData&&NPData.guardPage) await NPData.guardPage(['admin','team','guest']); }catch(e){}
  const [{daily,items}]=await Promise.all([loadDigest(), sleep(1400)]);
  if(!daily){ document.getElementById('load').querySelector('.ld').textContent='No data available'; return; }
  const T=daily.total?.today||daily.total||{}, S=daily.total?.sixWeekAvg||{};
  const W=daily.wlv?.today||{}, B=daily.bw?.today||{};
  document.getElementById('dDate').textContent=prettyDate(daily.date)+' · All locations';
  renderKPIs(T,S);
  renderStandouts(topItem(T), biggestMover(items));
  renderChannels(T);
  renderCompare(W,B);
  reveal();
})();
</script>
</body>
</html>
