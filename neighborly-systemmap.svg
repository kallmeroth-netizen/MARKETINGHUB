  <text x="971" y="798" font-size="10.5" fill="#6b7178">neighborly-pmixops.html</text>
  <circle cx="976" cy="820" r="5" fill="#2f6f6a"/><circle cx="992" cy="820" r="5" fill="#c0392b"/>
  <text x="1004" y="824" font-size="11" fill="#2a2f34">Flash (by category) + Toast (item-level) · computed once, Marketing links here</text>

  <!-- ============ CONNECTORS ============ -->
  <!-- sources -> data layer -->
  <line x1="340" y1="190" x2="393" y2="200" stroke="#2f6f6a" stroke-width="2.2" marker-end="url(#aTeal)"/>
  <line x1="340" y1="334" x2="393" y2="300" stroke="#e87142" stroke-width="2.2" marker-end="url(#aOrange)"/>
  <line x1="340" y1="444" x2="393" y2="372" stroke="#5a4a7a" stroke-width="2.2" marker-end="url(#aLav)"/>
  <line x1="340" y1="560" x2="393" y2="510" stroke="#c0392b" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#aRed)"/>

  <!-- data layer -> front door -->
  <line x1="645" y1="330" x2="693" y2="320" stroke="#1f2328" stroke-width="2.4" marker-end="url(#aInk)"/>

  <!-- front door -> portals -->
  <path d="M888 280 C 925 250, 930 160, 953 145" fill="none" stroke="#e87142" stroke-width="2" marker-end="url(#aOrange)"/>
  <path d="M888 332 C 928 320, 930 200, 953 200" fill="none" stroke="#9aa0a6" stroke-width="2" marker-end="url(#aGrey)"/>
  <path d="M888 384 C 928 430, 930 520, 953 527" fill="none" stroke="#2f6f6a" stroke-width="2.4" marker-end="url(#aTeal)"/>

  <!-- ============ LEGEND ============ -->
  <rect x="40" y="700" width="600" height="170" rx="12" fill="#ffffff" stroke="#d9d5cc"/>
  <text x="60" y="728" font-size="14" font-weight="700" fill="#1f2328">Legend — colour = data source</text>
  <circle cx="68" cy="752" r="6" fill="#2f6f6a"/><text x="82" y="757" font-size="12.5" fill="#2a2f34">Daily Sales Email Flash (sales + labor + comps + pmix)</text>
  <circle cx="68" cy="778" r="6" fill="#e87142"/><text x="82" y="783" font-size="12.5" fill="#2a2f34">KPI Tracker (marketing / campaigns / ROAS)</text>
  <circle cx="68" cy="804" r="6" fill="#5a4a7a"/><text x="82" y="809" font-size="12.5" fill="#2a2f34">Ovation (guest feedback / sentiment)</text>
  <circle cx="68" cy="830" r="6" fill="#c0392b"/><text x="82" y="835" font-size="12.5" fill="#2a2f34">Toast POS — Phase 2 feed (dashed): OT, by-job, before/after, item-level</text>
  <line x1="60" y1="852" x2="96" y2="852" stroke="#c0392b" stroke-width="2.2" stroke-dasharray="6 4"/>
  <text x="104" y="857" font-size="11.5" fill="#6b7178">dashed = not in the email flash; needs a new Toast/timeclock export</text>

  <!-- Phasing note -->
  <rect x="660" y="700" width="800" height="170" rx="12" fill="#eef5f3" stroke="#bcd8d2"/>
  <text x="682" y="728" font-size="14" font-weight="700" fill="#1f4e49">Build phasing</text>
  <text x="682" y="752" font-size="12.5" fill="#234"><tspan font-weight="700">Phase 1 — no new data.</tspan> Drive Ops “Operations Flash” from daily-data.json you already get:</text>
  <text x="700" y="772" font-size="12" fill="#2a2f34">sales fcst(6-wk proxy) vs actual · SPLH &amp; hours (total + FOH/BOH) · labor % · comps by reason · PMIX · all day→year rollups · per location.</text>
  <text x="682" y="800" font-size="12.5" fill="#234"><tspan font-weight="700">Phase 2 — add ONE Toast/timeclock feed.</tspan> Unlocks the rest:</text>
  <text x="700" y="820" font-size="12" fill="#2a2f34">OT hours &amp; OT % · hours before open / after close · by-job granularity · item-level comps &amp; PMIX · a true budget/forecast number.</text>
  <text x="682" y="850" font-size="11.5" fill="#3a6b65" font-style="italic">Same data layer feeds both Marketing and Ops — one source of truth, two faces.</text>
</svg>
