  <rect x="712" y="362" width="176" height="44" rx="8" fill="#e3efec"/>
  <circle cx="728" cy="384" r="6" fill="#2f6f6a"/>
  <text x="742" y="380" font-size="12.5" font-weight="700" fill="#1f2328">Ops</text>
  <text x="742" y="396" font-size="11" fill="#6b7178">neighborlyops</text>

