<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1120" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aTeal" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#2f6f6a"/></marker>
    <marker id="aOrange" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#e87142"/></marker>
    <marker id="aLav" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#5a4a7a"/></marker>
    <marker id="aRed" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#c0392b"/></marker>
    <marker id="aInk" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#1f2328"/></marker>
    <marker id="aGrey" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#9aa0a6"/></marker>
  </defs>

  <rect x="0" y="0" width="1500" height="1120" fill="#faf7f2"/>

  <!-- ===== Title ===== -->
  <text x="40" y="42" font-size="26" font-weight="700" fill="#1f2328">Neighborly — Portals &amp; Data System Map</text>
  <text x="40" y="66" font-size="14" fill="#6b7178">What feeds what: data sources &#8594; data layer &#8594; front door &#8594; portal pages. Hand-off for the tech team.</text>

  <!-- ===== Lane headers ===== -->
  <text x="40"  y="100" font-size="13" font-weight="700" letter-spacing="1.5" fill="#8a8f96">DATA SOURCES (INPUTS)</text>
  <text x="395" y="100" font-size="13" font-weight="700" letter-spacing="1.5" fill="#8a8f96">DATA LAYER</text>
  <text x="695" y="100" font-size="13" font-weight="700" letter-spacing="1.5" fill="#8a8f96">FRONT DOOR</text>
  <text x="955" y="100" font-size="13" font-weight="700" letter-spacing="1.5" fill="#8a8f96">PORTALS &amp; PAGES</text>

  <!-- ============ DATA SOURCES ============ -->
  <!-- S1 Email Flash -->
  <rect x="40" y="110" width="300" height="160" rx="12" fill="#e3efec" stroke="#2f6f6a" stroke-width="1.5"/>
  <text x="58" y="136" font-size="15" font-weight="700" fill="#1f4e49">① Daily Sales Email Flash</text>
  <text x="58" y="156" font-size="11.5" fill="#3a6b65" font-style="italic">You forward it daily &#8594; parsed into the data layer</text>
  <text x="58" y="180" font-size="12" fill="#2a2f34">• Net sales · avg check · check count</text>
  <text x="58" y="198" font-size="12" fill="#2a2f34">• Labor: FOH/BOH hrs + cost, SPLH, labor %</text>
  <text x="58" y="216" font-size="12" fill="#2a2f34">• Comps by reason (9 types)</text>
  <text x="58" y="234" font-size="12" fill="#2a2f34">• PMIX by category · dayparts · channels</text>
  <text x="58" y="252" font-size="12" fill="#2a2f34">• Per location · WTD/PTD/QTD/YTD · 6-wk avg</text>

  <!-- S2 KPI Tracker -->
  <rect x="40" y="288" width="300" height="92" rx="12" fill="#fdeee7" stroke="#e87142" stroke-width="1.5"/>
  <text x="58" y="314" font-size="15" font-weight="700" fill="#a3431f">② KPI Tracker</text>
  <text x="58" y="336" font-size="12" fill="#2a2f34">• Marketing KPIs</text>
  <text x="58" y="356" font-size="12" fill="#2a2f34">• Campaigns · channels · ROAS · leaderboard</text>

  <!-- S3 Ovation -->
  <rect x="40" y="398" width="300" height="92" rx="12" fill="#f0eff5" stroke="#5a4a7a" stroke-width="1.5"/>
  <text x="58" y="424" font-size="15" font-weight="700" fill="#473860">③ Ovation upload</text>
  <text x="58" y="446" font-size="12" fill="#2a2f34">• Guest feedback</text>
  <text x="58" y="466" font-size="12" fill="#2a2f34">• Ratings · sentiment · reviews</text>

  <!-- S4 Toast POS (Phase 2) -->
  <rect x="40" y="508" width="300" height="130" rx="12" fill="#fbeae8" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="58" y="534" font-size="15" font-weight="700" fill="#9c2b1e">④ Toast POS upload</text>
  <text x="58" y="554" font-size="11.5" fill="#9c2b1e" font-style="italic">Detail the flash does NOT carry — Phase 2 feed</text>
  <text x="58" y="578" font-size="12" fill="#2a2f34">• Timeclock: OT, hours before open / after close</text>
  <text x="58" y="596" font-size="12" fill="#2a2f34">• By-job (server, line, host, …)</text>
  <text x="58" y="614" font-size="12" fill="#2a2f34">• Item-level comps · item-level PMIX</text>

  <!-- ============ DATA LAYER ============ -->
  <rect x="395" y="110" width="250" height="528" rx="12" fill="#ffffff" stroke="#d9d5cc" stroke-width="1.5"/>
  <text x="412" y="134" font-size="14" font-weight="700" fill="#1f2328">JSON in repo</text>
  <text x="412" y="150" font-size="11" fill="#8a8f96">single source of truth · refreshed daily</text>

  <rect x="412" y="166" width="216" height="100" rx="9" fill="#f4f1ea" stroke="#e3e0d8"/>
  <text x="426" y="188" font-size="12.5" font-weight="700" fill="#2f6f6a">daily-data.json</text>
  <text x="426" y="208" font-size="11" fill="#2a2f34">sales + labor + comps</text>
  <text x="426" y="224" font-size="11" fill="#2a2f34">+ pmix + rollups</text>
  <text x="426" y="240" font-size="11" fill="#2a2f34">per location (wlv / bw / total)</text>
  <text x="426" y="256" font-size="11" fill="#8a8f96">← Email Flash</text>

  <rect x="412" y="278" width="216" height="60" rx="9" fill="#f4f1ea" stroke="#e3e0d8"/>
  <text x="426" y="300" font-size="12.5" font-weight="700" fill="#1f2328">daily-data-index + archives</text>
  <text x="426" y="320" font-size="11" fill="#2a2f34">history (day-by-day snapshots)</text>

  <rect x="412" y="350" width="216" height="60" rx="9" fill="#f4f1ea" stroke="#e3e0d8"/>
  <text x="426" y="372" font-size="12.5" font-weight="700" fill="#5a4a7a">guests data</text>
  <text x="426" y="392" font-size="11" fill="#2a2f34">← Ovation feedback</text>

  <rect x="412" y="422" width="216" height="60" rx="9" fill="#f4f1ea" stroke="#e3e0d8"/>
  <text x="426" y="444" font-size="12.5" font-weight="700" fill="#e87142">marketing / KPI fields</text>
  <text x="426" y="464" font-size="11" fill="#2a2f34">← KPI Tracker</text>

  <rect x="412" y="494" width="216" height="58" rx="9" fill="#fff6f4" stroke="#e6c4bd" stroke-dasharray="5 4"/>
  <text x="426" y="516" font-size="12.5" font-weight="700" fill="#c0392b">labor-detail.json  (new)</text>
  <text x="426" y="536" font-size="11" fill="#2a2f34">← Toast (Phase 2)</text>

  <!-- ============ FRONT DOOR ============ -->
  <rect x="695" y="200" width="210" height="240" rx="12" fill="#ffffff" stroke="#1f2328" stroke-width="1.5"/>
  <text x="712" y="226" font-size="14" font-weight="700" fill="#1f2328">index.html</text>
  <text x="712" y="244" font-size="11" fill="#8a8f96">cosmetic passcode gate</text>

  <rect x="712" y="258" width="176" height="44" rx="8" fill="#fdeee7"/>
  <circle cx="728" cy="280" r="6" fill="#e87142"/>
  <text x="742" y="276" font-size="12.5" font-weight="700" fill="#1f2328">Team</text>
  <text x="742" y="292" font-size="11" fill="#6b7178">neighborly</text>

  <rect x="712" y="310" width="176" height="44" rx="8" fill="#eeedf1"/>
  <circle cx="728" cy="332" r="6" fill="#9aa0a6"/>
  <text x="742" y="328" font-size="12.5" font-weight="700" fill="#1f2328">Guest</text>
