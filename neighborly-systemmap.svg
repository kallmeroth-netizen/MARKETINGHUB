  <!-- Marketing Hub -->
  <rect x="955" y="110" width="505" height="54" rx="10" fill="#e87142"/>
  <text x="975" y="137" font-size="16" font-weight="700" fill="#ffffff">MARKETING HUB</text>
  <text x="975" y="154" font-size="11.5" fill="#fdeee7">Team / Guest · unchanged</text>

  <!-- mkt cards: col A x955 w245, col B x1215 w245 -->
  <!-- r1 -->
  <rect x="955" y="178" width="245" height="82" rx="9" fill="#ffffff" stroke="#e3e0d8"/>
  <text x="971" y="202" font-size="13" font-weight="700" fill="#1f2328">Performance Marketing</text>
  <text x="971" y="220" font-size="10.5" fill="#6b7178">neighborly-dashboard.html</text>
  <circle cx="976" cy="240" r="5" fill="#e87142"/><circle cx="992" cy="240" r="5" fill="#2f6f6a"/>
  <text x="1004" y="244" font-size="10.5" fill="#2a2f34">KPI + Flash</text>

  <rect x="1215" y="178" width="245" height="82" rx="9" fill="#ffffff" stroke="#e3e0d8"/>
  <text x="1231" y="202" font-size="13" font-weight="700" fill="#1f2328">Brand Assets</text>
  <text x="1231" y="220" font-size="10.5" fill="#6b7178">neighborly-assets.html</text>
  <circle cx="1236" cy="240" r="5" fill="#9aa0a6"/>
  <text x="1248" y="244" font-size="10.5" fill="#2a2f34">static (no live feed)</text>

  <!-- r2 -->
  <rect x="955" y="272" width="245" height="82" rx="9" fill="#ffffff" stroke="#e3e0d8"/>
  <text x="971" y="296" font-size="13" font-weight="700" fill="#1f2328">Sales &amp; Pmix</text>
  <text x="971" y="314" font-size="10.5" fill="#6b7178">neighborly-pmix.html</text>
  <circle cx="976" cy="334" r="5" fill="#2f6f6a"/>
  <text x="988" y="338" font-size="10.5" fill="#2a2f34">Flash</text>

  <rect x="1215" y="272" width="245" height="82" rx="9" fill="#ffffff" stroke="#e3e0d8"/>
  <text x="1231" y="296" font-size="13" font-weight="700" fill="#1f2328">Social</text>
  <text x="1231" y="314" font-size="10.5" fill="#6b7178">neighborly-social.html</text>
  <circle cx="1236" cy="334" r="5" fill="#e87142"/>
  <text x="1248" y="338" font-size="10.5" fill="#2a2f34">KPI (coming soon)</text>

  <!-- r3 -->
  <rect x="955" y="366" width="245" height="82" rx="9" fill="#ffffff" stroke="#e3e0d8"/>
  <text x="971" y="390" font-size="13" font-weight="700" fill="#1f2328">Marketing Calendar</text>
  <text x="971" y="408" font-size="10.5" fill="#6b7178">neighborly-calendar.html</text>
  <circle cx="976" cy="428" r="5" fill="#e87142"/>
  <text x="988" y="432" font-size="10.5" fill="#2a2f34">KPI / manual</text>

  <rect x="1215" y="366" width="245" height="82" rx="9" fill="#ffffff" stroke="#e3e0d8"/>
  <text x="1231" y="390" font-size="13" font-weight="700" fill="#1f2328">Guest Intelligence</text>
  <text x="1231" y="408" font-size="10.5" fill="#6b7178">neighborly-guests.html</text>
  <circle cx="1236" cy="428" r="5" fill="#5a4a7a"/>
  <text x="1248" y="432" font-size="10.5" fill="#2a2f34">Ovation</text>

  <!-- Operations Hub -->
  <rect x="955" y="500" width="505" height="54" rx="10" fill="#2f6f6a"/>
  <text x="975" y="527" font-size="16" font-weight="700" fill="#ffffff">OPERATIONS HUB</text>
  <text x="975" y="544" font-size="11.5" fill="#e3efec">Ops · proposed name: “Operations Flash”</text>

  <!-- ops cards stacked x955 w505 -->
  <rect x="955" y="568" width="505" height="80" rx="9" fill="#ffffff" stroke="#cfe0dc"/>
  <text x="971" y="592" font-size="13.5" font-weight="700" fill="#1f2328">Sales &amp; Forecasting</text>
  <text x="971" y="610" font-size="10.5" fill="#6b7178">neighborly-sales.html</text>
  <circle cx="976" cy="632" r="5" fill="#2f6f6a"/>
  <text x="988" y="636" font-size="11" fill="#2a2f34">Flash — actual + rollups + restaurant/catering; forecast = 6-wk-avg proxy (→ real budget)</text>

  <rect x="955" y="662" width="505" height="80" rx="9" fill="#ffffff" stroke="#cfe0dc"/>
  <text x="971" y="686" font-size="13.5" font-weight="700" fill="#1f2328">Labor &amp; SPLH</text>
  <text x="971" y="704" font-size="10.5" fill="#6b7178">neighborly-labor.html</text>
  <circle cx="976" cy="726" r="5" fill="#2f6f6a"/><circle cx="992" cy="726" r="5" fill="#c0392b"/>
  <text x="1004" y="730" font-size="11" fill="#2a2f34">Flash (SPLH, hrs, labor%, FOH/BOH) + Toast (OT, by-job, before/after) — Phase 2</text>

  <rect x="955" y="756" width="505" height="80" rx="9" fill="#ffffff" stroke="#cfe0dc"/>
